<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>캘린더 - 해외컨설팅</title>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<style>
:root, html[data-theme="light"] { --bg:#fff; --bg2:#f7f7f5; --bg3:#f0efe9; --text:#1a1a1a; --text2:#6b6b6b; --text3:#a8a8a8; --border:rgba(0,0,0,0.09); --border2:rgba(0,0,0,0.16); --r:10px; --r-sm:6px; }
html[data-theme="dark"] { --bg:#1c1c1c;--bg2:#242424;--bg3:#2a2a28; --text:#f0efe9;--text2:#9a9a94;--text3:#606060; --border:rgba(255,255,255,0.09);--border2:rgba(255,255,255,0.16); }
@media (prefers-color-scheme: dark) { html:not([data-theme="light"]) { --bg:#1c1c1c;--bg2:#242424;--bg3:#2a2a28; --text:#f0efe9;--text2:#9a9a94;--text3:#606060; --border:rgba(255,255,255,0.09);--border2:rgba(255,255,255,0.16); } }
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:var(--bg3);color:var(--text);min-height:100vh}
.layout{display:flex;min-height:100vh}
.mobile-header { display: none; padding: 14px 20px; background: var(--bg); border-bottom: .5px solid var(--border); align-items: center; gap: 14px; position: sticky; top: 0; z-index: 100; }
.sidebar{width:220px;background:var(--bg);border-right:.5px solid var(--border);padding:20px 14px;flex-shrink:0;display:flex;flex-direction:column;gap:20px;position:sticky;top:0;height:100vh;overflow-y:auto}
.logo{font-size:15px;font-weight:700;padding:0 6px}
.sb-label{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;padding:0 6px;margin-bottom:6px}
.sb-btn{display:flex;align-items:center;gap:8px;width:100%;padding:7px 8px;border:none;background:none;color:var(--text2);font-size:13px;border-radius:var(--r-sm);cursor:pointer;text-align:left;transition:all .12s}
.sb-btn:hover{background:var(--bg2);color:var(--text)}
.sb-btn.active{background:var(--bg3);color:var(--text);font-weight:500}
.sb-btn .icon{font-size:14px;width:18px;text-align:center}
.mb-chip{display:flex;align-items:center;gap:7px;padding:5px 6px;border-radius:var(--r-sm);cursor:pointer;transition:all .12s}
.mb-chip.off{opacity:.35}
.av{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0}
.proj-chip{display:flex;align-items:center;gap:7px;padding:5px 6px;border-radius:var(--r-sm);cursor:pointer;font-size:13px;color:var(--text2)}
.proj-chip.active{color:var(--text);font-weight:500}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.main{flex:1;padding:24px;overflow:auto;min-width:0}
.page{display:none}.page.active{display:block}
.page-header{display:flex;align-items:center;gap:10px;margin-bottom:20px;justify-content:space-between}
.page-title{font-size:18px;font-weight:700;white-space:nowrap}
.card{background:var(--bg);border:.5px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:14px}
.card-title{font-size:11px;font-weight:700;color:var(--text2);margin-bottom:12px;text-transform:uppercase}
.btn{padding:7px 14px;border-radius:var(--r-sm);font-size:13px;cursor:pointer;border:none;font-family:inherit;transition:opacity .12s}
.btn-primary{background:var(--text);color:var(--bg)}
.btn-secondary{background:none;color:var(--text);border:.5px solid var(--border2)}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-danger-sm{padding:3px 8px;background:none;color:#A32D2D;border:.5px solid #F09595;border-radius:var(--r-sm);font-size:11px;cursor:pointer}
.chip{padding:4px 12px;border-radius:20px;font-size:12px;cursor:pointer;border:.5px solid var(--border2);background:var(--bg);color:var(--text2)}
.chip.active{background:var(--text);color:var(--bg);border-color:var(--text)}
.tag{font-size:11px;padding:1px 7px;border-radius:10px;font-weight:500;white-space:nowrap}
.tag-vacation{background:#E1F5EE;color:#0F6E56} .tag-work{background:#E6F1FB;color:#185FA5} .tag-trip{background:#FAEEDA;color:#854F0B} .tag-meeting{background:#EEEDFE;color:#3C3489} .tag-proposal{background:#FBEAF0;color:#993556} .tag-personal{background:#F1EFE8;color:#5F5E5A} .tag-project{background:#EAF3DE;color:#2E5A0E}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.form-row.full{grid-template-columns:1fr}
.fl{font-size:11px;color:var(--text2);margin-bottom:4px}
input,select,textarea{width:100%;padding:7px 10px;border:.5px solid var(--border2);border-radius:var(--r-sm);background:var(--bg);color:var(--text);font-size:13px}
.cal-grid{display:grid;grid-template-columns:repeat(7, 1fr);gap:1px;background:var(--border);border:.5px solid var(--border);border-radius:var(--r);overflow:hidden}
.cal-hdr{background:var(--bg2);padding:7px 4px;text-align:center;font-size:11px;color:var(--text2);font-weight:600}
.cal-day{background:var(--bg);min-height:86px;padding:5px;cursor:pointer}
.cal-day.today .dn{background:var(--text);color:var(--bg);border-radius:50%}
.dn{font-size:12px;width:20px;height:20px;display:flex;align-items:center;justify-content:center;margin-bottom:3px}
.cal-day.sun .dn{color:#D85A30}.cal-day.sat .dn{color:#378ADD}
.ep{font-size:11px;padding:2px 5px;border-radius:3px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;font-weight:500}
.li{display:flex;gap:11px;padding:11px 14px;background:var(--bg);border:.5px solid var(--border);border-radius:var(--r);align-items:flex-start;cursor:pointer}
.li.is-past { opacity: 0.5; filter: grayscale(0.8); }
.li.is-past .li-title { text-decoration: line-through; color: var(--text3); }
.overview-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
@media(max-width:900px){.overview-grid{grid-template-columns:1fr}}
.proj-card{background:var(--bg);border:.5px solid var(--border);border-radius:var(--r);overflow:hidden}
.proj-card-header{padding:12px 16px;display:flex;align-items:center;gap:10px;border-bottom:.5px solid var(--border)}
.proj-color-bar{width:4px;height:36px;border-radius:2px;flex-shrink:0}
.proj-card-body{padding:12px 16px}
.member-tag{display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:20px;font-size:11px;margin:2px;border:.5px solid var(--border)}
.task-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:.5px solid var(--border);font-size:13px}
.todo-item { display:flex; align-items:center; gap:8px; font-size:13px; padding:6px 0; border-bottom:.5px solid var(--border2); }
.todo-item.done { text-decoration:line-through; color:var(--text3); }
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:200;align-items:center;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:var(--bg);border-radius:var(--r);padding:22px;width:420px;max-width:94vw;max-height:88vh;overflow-y:auto;border:1px solid var(--border2)}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:8px 22px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .2s;z-index:300}
.toast.show{opacity:1}
@media(max-width:680px){ .sidebar { position: fixed; left: -260px; z-index: 200; width: 240px; } .sidebar.show { left: 0; } .mobile-header { display: flex; } }
</style>
</head>
<body>
<div class="layout">
<div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>
<div class="sidebar">
<div><div class="logo">캘린더</div><div class="logo-sub">해외컨설팅</div></div>
<div class="sb-label">메뉴</div>
<button class="sb-btn active" id="nav-cal" onclick="goPage('cal')"><span class="icon">📅</span>캘린더</button>
<button class="sb-btn" id="nav-overview" onclick="goPage('overview')"><span class="icon">📊</span>사업 현황</button>
<button class="sb-btn" id="nav-proposal" onclick="goPage('proposal')"><span class="icon">📝</span>제안 현황</button>
<button class="sb-btn" id="nav-members" onclick="goPage('members')"><span class="icon">👥</span>멤버 현황</button>
<button class="sb-btn" id="nav-personal" onclick="goPage('personal')"><span class="icon">👤</span>내 일정</button>
<button class="sb-btn" id="nav-todo" onclick="goPage('todo')"><span class="icon">✅</span>할일</button>
<button class="sb-btn" id="nav-setup" onclick="goPage('setup')"><span class="icon">⚙️</span>설정</button>
<div class="sb-label">멤버 필터</div><div id="sb-members"></div>
<div class="sb-label">사업 필터</div><div id="sb-projects"></div>
<div style="margin-top:auto; border-top:.5px solid var(--border); padding-top:12px;"><div class="sb-label">내 계정</div><div style="display:flex;align-items:center;gap:7px;padding:5px 6px;cursor:pointer;" onclick="openChangeSelf()"><div class="av" id="self-av"></div><span style="font-size:13px" id="self-name">—</span></div></div>
</div>
<div class="main">
<div class="mobile-header"><button class="menu-btn" onclick="toggleSidebar()">☰</button><div style="font-weight:700;">캘린더</div></div>
<div id="status-bar" style="display:none"></div>

<div id="page-cal" class="page active">
  <div class="page-header"><div style="display:flex;gap:8px;align-items:center;"><button class="btn btn-secondary btn-sm" onclick="changeMonth(-1)">◀</button><span id="month-title" style="font-size:18px;font-weight:700"></span><button class="btn btn-secondary btn-sm" onclick="changeMonth(1)">▶</button></div><div style="display:flex;gap:6px"><button class="chip active" id="vm-cal" onclick="setVM('cal')">달력</button><button class="chip" id="vm-list" onclick="setVM('list')">목록</button></div></div>
  <div class="legend"><div class="legend-item"><div class="dot" style="background:#1D9E75"></div>휴가</div><div class="legend-item"><div class="dot" style="background:#378ADD"></div>업무</div><div class="legend-item"><div class="dot" style="background:#EF9F27"></div>출장</div><div class="legend-item"><div class="dot" style="background:#533AB7"></div>회의</div><div class="legend-item"><div class="dot" style="background:#993556"></div>제안</div></div>
  <div id="cal-container"></div>
</div>

<div id="page-overview" class="page">
  <div class="page-header"><span class="page-title">사업 현황</span><label style="font-size:12px;color:var(--text2);cursor:pointer;"><input type="checkbox" id="ov-hide-past" onchange="toggleHidePast(this.checked)" checked> 과거 숨기기</label></div>
  <div id="overview-container"></div>
</div>

<div id="page-proposal" class="page">
  <div class="page-header"><span class="page-title">제안 참여 현황</span><label style="font-size:12px;color:var(--text2);cursor:pointer;white-space:nowrap;"><input type="checkbox" id="prop-hide-past" onchange="renderProposals()" checked> 완료/지난 제안 숨기기</label></div>
  <div id="proposal-container"></div>
</div>

<div id="page-members" class="page"><div class="page-header"><span class="page-title">멤버 현황</span></div><div id="members-container"></div></div>

<div id="page-personal" class="page">
  <div class="page-header"><span class="page-title">내 일정</span><div style="display:flex;gap:8px;align-items:center;"><label style="font-size:12px;color:var(--text2);cursor:pointer;white-space:nowrap;"><input type="checkbox" id="pf-hide-past" onchange="renderPersonalList()"> 지난 일정 숨기기</label><button class="btn btn-primary btn-sm" onclick="openAddEvent()">+ 일정 추가</button></div></div>
  <div class="card"><div class="filter-chips"><button class="chip active" id="pf-all" onclick="filterP('all')">전체</button><button class="chip" id="pf-public" onclick="filterP('public')">공유됨</button><button class="chip" id="pf-private" onclick="filterP('private')">비공개</button></div><div id="personal-list"></div></div>
</div>

<div id="page-todo" class="page">
  <div class="page-header"><span class="page-title">할일</span><label style="font-size:12px;color:var(--text2);cursor:pointer;white-space:nowrap;"><input type="checkbox" id="todo-hide-done" onchange="toggleHideDone(this.checked)"> 완료 숨기기</label></div>
  <div class="overview-grid"><div class="card" style="display:flex;flex-direction:column;max-height:80vh;"><div class="card-title" style="color:#D85A30">🔥 Must-Do</div><input type="text" id="todo-must-in" placeholder="+ 핵심 추가" onkeypress="if(event.key==='Enter') addTodo('must', this.value)"><div id="todo-must-list" style="overflow-y:auto;margin-top:12px;display:flex;flex-direction:column;gap:4px"></div></div><div class="card" style="display:flex;flex-direction:column;max-height:80vh;"><div class="card-title" style="color:#185FA5">☕ Should-Do</div><input type="text" id="todo-should-in" placeholder="+ 서브 추가" onkeypress="if(event.key==='Enter') addTodo('should', this.value)"><div id="todo-should-list" style="overflow-y:auto;margin-top:12px;display:flex;flex-direction:column;gap:4px"></div></div></div>
</div>

<div id="page-setup" class="page">
  <div class="page-header"><span class="page-title">설정</span></div>
  <div class="card" style="max-width:580px;"><div class="card-title">화면 테마</div><div style="display:flex;gap:10px;"><button class="btn btn-primary" id="btn-theme-sys" onclick="setTheme('sys')">시스템</button><button class="btn btn-secondary" id="btn-theme-light" onclick="setTheme('light')">라이트</button><button class="btn btn-secondary" id="btn-theme-dark" onclick="setTheme('dark')">다크</button></div></div>
  <div class="card" style="max-width:580px;"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px"><div class="card-title" style="margin:0">팀원 관리 <span id="mb-count"></span></div><button class="btn btn-primary btn-sm" onclick="openAddMember()">+ 추가</button></div><div id="member-manage-list"></div></div>
  <div class="card" style="max-width:580px;"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px"><div class="card-title" style="margin:0">사업 관리 <span id="proj-count"></span></div><button class="btn btn-primary btn-sm" onclick="openAddProject()">+ 추가</button></div><div id="project-manage-list"></div></div>
</div>
</div>
</div>

<div class="modal-bg" id="modal"><div class="modal"><div class="modal-hdr"><div class="modal-title" id="modal-title" style="font-weight:700"></div><button onclick="closeModal()" style="border:none;background:none;cursor:pointer;font-size:18px">✕</button></div><div id="modal-body"></div></div></div>
<div class="toast" id="toast"></div>

<script>
const SK = 'tc2_'; function ls(k,v){if(v===undefined)return localStorage.getItem(SK+k);v===null?localStorage.removeItem(SK+k):localStorage.setItem(SK+k,v);}
const firebaseConfig = { apiKey: "AIzaSyCTAM7S7UhrjZBWnF1_-u9EazhRtZZorNQ", authDomain: "team-calendar-e30d3.firebaseapp.com", projectId: "team-calendar-e30d3", storageBucket: "team-calendar-e30d3.firebasestorage.app", messagingSenderId: "211860835628", appId: "1:211860835628:web:87e84b5cdbc4387bd1b089" };
firebase.initializeApp(firebaseConfig); const db = firebase.firestore();

let selfId = ls('selfId')||''; let members=[], projects=[], events=[], tasks=[], assigns=[], todos=[];
let hiddenMb = new Set(); let selProj = 'all'; let vm = 'cal', ovMode = 'board', pFilter = 'all'; const today = new Date(); let curY = today.getFullYear(), curM = today.getMonth(); let hidePast = true;

const TL = {vacation:'휴가',work:'업무',trip:'출장',meeting:'회의',proposal:'제안',personal:'개인'};
const TT = {vacation:'tag-vacation',work:'tag-work',trip:'tag-trip',meeting:'tag-meeting',proposal:'tag-proposal',personal:'tag-personal'};
const mb = id => members.find(m=>m.id===id); const pj = id => projects.find(p=>p.id===id); const ini = n => (n||'?').slice(0,2);
function lighten(hex){ const m={'#378ADD':'#E6F1FB','#1D9E75':'#E1F5EE','#D85A30':'#FAECE7','#EF9F27':'#FAEEDA','#533AB7':'#EEEDFE','#993556':'#FBEAF0','#3B6D11':'#EAF3DE','#185FA5':'#B5D4F4','#E91E63':'#FCE4EC','#9C27B0':'#F3E5F5','#673AB7':'#EDE7F6','#3F51B5':'#E8EAF6','#03A9F4':'#E1F5FE','#00BCD4':'#E0F7FA','#009688':'#E0F2F1','#4CAF50':'#E8F5E9','#8BC34A':'#F1F8E9','#CDDC39':'#F9FBE7','#FFC107':'#FFFDE7','#FF9800':'#FFF3E0','#FF5722':'#FBE9E7','#795548':'#EFEBE9','#9E9E9E':'#FAFAFA','#607D8B':'#ECEFF1'}; return m[hex]||'#F1EFE8'; }
function parseDateSafely(d) { if(!d) return new Date(0); let s=String(d).trim(); if(/^\d{4}-\d{2}-\d{2}$/.test(s)) return new Date(s+'T00:00:00'); return new Date(s); }
function fmtDate(d){ if(!d) return ''; const dt=parseDateSafely(d); return `${dt.getMonth()+1}/${dt.getDate()}`; }
function fmtDateFull(d){ if(!d) return ''; const dt=parseDateSafely(d); return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`; }
function inDay(e,y,m,d){ const s=parseDateSafely(e.start), en=parseDateSafely(e.end||e.start); s.setHours(0,0,0,0); en.setHours(23,59,59); const day=new Date(y,m,d); return day>=s && day<=en; }

async function apiSave(p, cb){ try { const {action,id,...data}=p; let col=action.includes('Event')?'events':action.includes('Member')?'members':action.includes('Project')?'projects':action.includes('Task')?'tasks':action.includes('Assign')?'assigns':'todos'; if(action.startsWith('add')||action.startsWith('update')) await db.collection(col).doc(id).set(data,{merge:true}); else await db.collection(col).doc(id).delete(); if(cb) cb(); } catch(e){ showToast('오류: '+e.message); } }

function startRealtimeListeners(){
  db.collection("events").onSnapshot(s=>{events=s.docs.map(d=>({id:d.id,...d.data()})); refreshAll();});
  db.collection("members").onSnapshot(s=>{members=s.docs.map(d=>({id:d.id,...d.data()})); if(!selfId&&members.length) selfId=members[0].id; refreshAll();});
  db.collection("projects").onSnapshot(s=>{projects=s.docs.map(d=>({id:d.id,...d.data()})); refreshAll();});
  db.collection("tasks").onSnapshot(s=>{tasks=s.docs.map(d=>({id:d.id,...d.data()})); refreshAll();});
  db.collection("assigns").onSnapshot(s=>{assigns=s.docs.map(d=>({id:d.id,...d.data()})); refreshAll();});
  db.collection("todos").onSnapshot(s=>{todos=s.docs.map(d=>({id:d.id,...d.data()})); refreshAll();});
}

function refreshAll(){ buildSidebar(); renderCal(); renderOverview(); renderProposals(); renderMembersPage(); renderPersonalList(); renderTodos(); renderMemberManageList(); renderProjectManageList(); }

function buildSidebar(){
  const mc=document.getElementById('sb-members'); mc.innerHTML=''; members.forEach(m=>{ const d=document.createElement('div'); d.className='mb-chip'+(hiddenMb.has(m.id)?' off':''); d.onclick=()=>{hiddenMb.has(m.id)?hiddenMb.delete(m.id):hiddenMb.add(m.id); refreshAll();}; d.innerHTML=`<div class="av" style="background:${lighten(m.color)};color:${m.color}">${ini(m.name)}</div><span style="font-size:13px">${m.name}</span>`; mc.appendChild(d); });
  const pc=document.getElementById('sb-projects'); pc.innerHTML=`<div class="proj-chip ${selProj==='all'?'active':''}" onclick="selProj='all';refreshAll()"><div class="dot" style="background:#888"></div>전체</div>`; projects.forEach(p=>{ const d=document.createElement('div'); d.className='proj-chip '+(selProj===p.id?'active':''); d.innerHTML=`<div class="dot" style="background:${p.color}"></div>${p.name}`; d.onclick=()=>{selProj=p.id;refreshAll();}; pc.appendChild(d); });
  const s=members.find(m=>m.id===selfId)||{name:'—',color:'#888'}; document.getElementById('self-av').textContent=ini(s.name); document.getElementById('self-av').style.background=lighten(s.color); document.getElementById('self-name').textContent=s.name;
}

function renderCal(){
  const fd=new Date(curY,curM,1).getDay(), ld=new Date(curY,curM+1,0).getDate(); let h='<div class="cal-grid">'; ['일','월','화','수','목','금','토'].forEach(d=>h+=`<div class="cal-hdr">${d}</div>`);
  for(let i=0;i<fd;i++)h+='<div class="cal-day" style="background:var(--bg2)"></div>';
  const vis=events.filter(e=>(e.public||e.who===selfId)&&(!hiddenMb.has(e.who))&&(selProj==='all'||e.project===selProj));
  for(let d=1;d<=ld;d++){
    const isT=d===today.getDate()&&curM===today.getMonth()&&curY===today.getFullYear();
    h+=`<div class="cal-day ${isT?'today':''}" onclick="dayClick(${d})"><div class="dn">${d}</div>`;
    vis.filter(e=>{
      if(e.type==='proposal'){ const s=parseDateSafely(e.start), en=parseDateSafely(e.end||e.start); return (s.getDate()===d&&s.getMonth()===curM&&s.getFullYear()===curY) || (en.getDate()===d&&en.getMonth()===curM&&en.getFullYear()===curY); }
      return inDay(e,curY,curM,d);
    }).slice(0,4).forEach(e=>{
      let t=e.title; if(e.type==='proposal'){ const s=parseDateSafely(e.start); t=(s.getDate()===d?'[제안시작] ':'[입찰마감] ')+e.title; }
      const c=e.type==='vacation'?'#1D9E75':e.type==='work'?'#378ADD':e.type==='trip'?'#EF9F27':e.type==='meeting'?'#533AB7':e.type==='proposal'?'#993556':'#888';
      h+=`<div class="ep" style="background:${lighten(c)};color:${c}" onclick="event.stopPropagation();showEv('${e.id}')">${t}</div>`;
    });
    h+='</div>';
  }
  document.getElementById('cal-container').innerHTML=h+'</div>'; document.getElementById('month-title').textContent=`${curY}년 ${curM+1}월`;
}

function renderOverview(){
  let h='<div class="overview-grid">'; projects.filter(p=>(selProj==='all'||p.id===selProj) && !p.isProposal).forEach(p=>{
    const pa=assigns.filter(a=>a.projectId===p.id); const pt=tasks.filter(t=>t.project===p.id); const pe=events.filter(e=>e.project===p.id&&e.type!=='proposal');
    const statusSelect = `<select style="border:1px solid var(--border2); background:var(--bg); color:var(--text2); font-size:11px; padding:2px 4px; border-radius:4px; cursor:pointer; margin-left:auto;" onchange="apiSave({action:'updateProject', id:'${p.id}', status:this.value})"><option value="진행중" ${p.status==='진행중'?'selected':''}>진행중</option><option value="완료" ${p.status==='완료'?'selected':''}>완료</option><option value="보류" ${p.status==='보류'?'selected':''}>보류</option></select>`;
    h+=`<div class="proj-card"><div class="proj-card-header"><div class="proj-color-bar" style="background:${p.color}"></div><div style="flex:1;"><div style="font-weight:700; display:flex; align-items:center;">${p.name} ${statusSelect}</div><div style="font-size:11px;color:var(--text2)">${fmtDateFull(p.start)}~${fmtDateFull(p.end)}</div></div></div><div class="proj-card-body">${pa.map(a=>`<span class="member-tag">${mb(a.memberId)?.name||'?'}</span>`).join('')}<div style="margin-top:10px">${pt.map(t=>`<div class="task-row">${t.title}</div>`).join('')}</div></div></div>`;
  });
  document.getElementById('overview-container').innerHTML=h+'</div>';
}

function renderProposals() {
  const container = document.getElementById('proposal-container'); const hidePastProp = document.getElementById('prop-hide-past')?.checked;
  const startOfToday = new Date(); startOfToday.setHours(0, 0, 0, 0);
  let propProjects = projects.filter(p => p.isProposal).map(p => {
    let _isPast = false; if (p.status === '완료') _isPast = true;
    else if (p.end) { const endDate = parseDateSafely(p.end); endDate.setHours(23, 59, 59, 999); if (endDate < startOfToday) _isPast = true; }
    return { ...p, _isPast };
  });
  if (hidePastProp) propProjects = propProjects.filter(p => !p._isPast);
  propProjects.sort((a, b) => (a._isPast !== b._isPast) ? (a._isPast ? 1 : -1) : 0);
  let h = '<div class="overview-grid">'; 
  propProjects.forEach(p => {
    const pAssigns = assigns.filter(a => a.projectId === p.id);
    const pe = events.filter(e => e.project === p.id && e.type === 'proposal');
    const statusSelect = `<select style="border:1px solid var(--border2); background:var(--bg); color:var(--text2); font-size:11px; padding:2px 4px; border-radius:4px; cursor:pointer; margin-left:auto;" onchange="apiSave({action:'updateProject', id:'${p.id}', status:this.value})"><option value="제안중" ${p.status==='제안중'?'selected':''}>제안중</option><option value="진행중" ${p.status==='진행중'?'selected':''}>진행중</option><option value="완료" ${p.status==='완료'?'selected':''}>완료</option></select>`;
    const cardStyle = p._isPast ? "opacity:0.5; filter:grayscale(0.8);" : "";
    h += `<div class="card" style="margin-bottom:0; display:flex; flex-direction:column; ${cardStyle}"><div style="display:flex; align-items:center; gap:8px; margin-bottom:14px; border-bottom:2px solid ${p.color}; padding-bottom:8px;"><div class="dot" style="background:${p.color}"></div><div style="font-weight:700; font-size:15px; display:flex; align-items:center; flex:1; ${p._isPast?'text-decoration:line-through':''}">${p.name} ${statusSelect}</div></div><div style="background:var(--bg2); padding:14px; border-radius:var(--r-sm); flex:1;"><div style="font-size:11px; color:var(--text2); margin-bottom:4px; font-weight:700;">참여 인원 (${pAssigns.length}명)</div>${pAssigns.map(a=>{const m=mb(a.memberId); return m?`<div style="font-size:13px;padding:4px 0">${m.name} | ${a.role||'-'}</div>`:''}).join('')}<div style="margin-top:12px; font-size:12px;">${pe.map(e=>`<div style="color:var(--text2); margin-top:4px;">📍 <span style="color:#993556; cursor:pointer;" onclick="showEv('${e.id}')">${e.title}</span> (${fmtDate(e.start)}~${fmtDate(e.end)})</div>`).join('')}</div></div></div>`;
  });
  container.innerHTML = h + '</div>';
}

function renderMembersPage(){
  let h='<div class="member-overview">'; members.forEach(m2=>{
    const ma=assigns.filter(a=>a.memberId===m2.id); 
    h+=`<div class="member-card"><div class="member-card-header"><div class="av" style="width:36px;height:36px;font-size:13px;background:${lighten(m2.color)};color:${m2.color}">${ini(m2.name)}</div><div style="flex:1"><div style="font-weight:600">${m2.name}</div><div style="font-size:12px;color:var(--text2)">${m2.role||'-'}</div></div></div><div class="member-card-body">${ma.map(a=>{const p=pj(a.projectId); return p?`<div style="font-size:13px;padding:4px 0">● ${p.name}</div>`:''}).join('')}</div></div>`;
  });
  document.getElementById('members-container').innerHTML=h;
}

function renderPersonalList() {
  const container = document.getElementById('personal-list'); const hideP = document.getElementById('pf-hide-past')?.checked;
  let mine = events.filter(e => e.who===selfId && (pFilter==='all'||(pFilter==='public'?e.public:!e.public))).map(e => ({...e, _p: parseDateSafely(e.end||e.start)<today}));
  if(hideP) mine=mine.filter(e=>!e._p);
  h=''; mine.forEach(e=>{ h+=`<div class="li ${e._p?'is-past':''}" onclick="showEv('${e.id}')"><div class="li-info"><div class="li-title">${e.title}</div><div class="li-meta">${fmtDateFull(e.start)}~${fmtDateFull(e.end)}</div></div><button onclick="event.stopPropagation();apiSave({action:'deleteEvent',id:'${e.id}'})" style="border:none;background:none;cursor:pointer;color:var(--text3)">✕</button></div>`; });
  container.innerHTML=h||'<div class="empty">내역이 없습니다</div>';
}

function renderTodos() {
  const hideD=ls('hideDone')==='Y'; document.getElementById('todo-hide-done').checked=hideD;
  let my=todos.filter(t=>t.who===selfId); if(hideD) my=my.filter(t=>t.done!=="TRUE");
  my.sort((a,b)=>(a.done==="TRUE")-(b.done==="TRUE"));
  let mh='', sh=''; my.forEach(t=>{
    const html=`<div class="todo-item ${t.done==='TRUE'?'done':''}"> <input type="checkbox" ${t.done==='TRUE'?'checked':''} onchange="toggleTodo('${t.id}')"> <span style="flex:1" onclick="openEditTodo('${t.id}')">${t.text}</span> <button onclick="apiSave({action:'deleteTodo',id:'${t.id}'})" style="border:none;background:none;cursor:pointer;color:var(--text3)">✕</button></div>`;
    if(t.type==='must') mh+=html; else sh+=html;
  });
  document.getElementById('todo-must-list').innerHTML=mh; document.getElementById('todo-should-list').innerHTML=sh;
}

function renderMemberManageList(){ 
  document.getElementById('mb-count').textContent=`(${members.length})`; let h=''; 
  members.forEach(m2=>{ h+=`<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:.5px solid var(--border)"><div class="av" style="width:30px;height:30px;font-size:11px;background:${lighten(m2.color)};color:${m2.color}">${ini(m2.name)}</div><div style="flex:1;"><div style="font-size:13px;font-weight:500">${m2.name}</div></div><div style="display:flex;gap:5px;"><button class="btn btn-secondary btn-sm" onclick="openEditMember('${m2.id}')">수정</button></div></div>`; });
  document.getElementById('member-manage-list').innerHTML=h; 
}

function renderProjectManageList(){
  const realProjects = projects.filter(p => !p.isProposal); const proposals = projects.filter(p => p.isProposal);
  document.getElementById('proj-count').textContent=`(${projects.length})`; 
  let h = '<div style="font-size:12px; font-weight:700; color:var(--text2); margin-top:10px; margin-bottom:6px;">📊 수주 / 실행 사업</div>';
  realProjects.forEach(p=>{ h+=`<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:.5px solid var(--border)"><div class="dot" style="background:${p.color}"></div><div style="flex:1;font-size:13px">${p.name}</div><button class="btn btn-secondary btn-sm" onclick="openManageProjectMembers('${p.id}')">인원</button><button class="btn btn-secondary btn-sm" onclick="openEditProject('${p.id}')">수정</button></div>`; });
  h += '<div style="font-size:12px; font-weight:700; color:#993556; margin-top:20px; margin-bottom:6px;">📝 제안 사업</div>';
  proposals.forEach(p=>{ h+=`<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:.5px solid var(--border)"><div class="dot" style="background:#993556"></div><div style="flex:1;font-size:13px">${p.name}</div><button class="btn btn-secondary btn-sm" onclick="openManageProjectMembers('${p.id}')">인원</button><button class="btn btn-secondary btn-sm" onclick="openEditProject('${p.id}')">수정</button></div>`; });
  document.getElementById('project-manage-list').innerHTML=h;
}

// 모달 및 입력 제어
function openAddEvent(){ document.getElementById('modal-body').innerHTML=`<input type="text" id="ev-title" placeholder="제목" style="margin-bottom:8px"><div class="form-row"><div><div class="fl">시작</div><input type="date" id="ev-start" value="${fmtDateFull(today)}"></div><div><div class="fl">종료</div><input type="date" id="ev-end" value="${fmtDateFull(today)}"></div></div><select id="ev-type" style="margin-top:8px"><option value="work">업무</option><option value="proposal">제안</option><option value="vacation">휴가</option></select><select id="ev-proj" style="margin-top:8px"><option value="">사업 선택</option>${projects.map(p=>`<option value="${p.id}">${p.name}</option>`).join('')}</select><button class="btn btn-primary" style="width:100%;margin-top:14px" onclick="submitEvent()">추가</button>`; openModal('일정 추가'); }
function submitEvent(){ const t=document.getElementById('ev-title').value, s=document.getElementById('ev-start').value, e=document.getElementById('ev-end').value, ty=document.getElementById('ev-type').value, pr=document.getElementById('ev-proj').value; if(!t||!s) return; apiSave({action:'addEvent',id:'ev_'+Date.now(),title:t,start:s,end:e||s,type:ty,project:pr,who:selfId,public:true}, closeModal); }
function toggleTodo(id){ const t=todos.find(x=>x.id===id); apiSave({...t, action:'updateTodo', done:t.done==='TRUE'?'FALSE':'TRUE'}); }
function toggleHideDone(v){ ls('hideDone',v?'Y':'N'); renderTodos(); }
function openAddProject(){ document.getElementById('modal-body').innerHTML=`<input type="text" id="pf-name" placeholder="이름" style="margin-bottom:8px"><select id="pf-is-prop"><option value="false">수주 사업</option><option value="true">제안 사업</option></select><input type="date" id="pf-end" style="margin-top:8px"><button class="btn btn-primary" style="width:100%;margin-top:14px" onclick="apiSave({action:'addProject',id:'pj_'+Date.now(),name:document.getElementById('pf-name').value,isProposal:document.getElementById('pf-is-prop').value==='true',end:document.getElementById('pf-end').value,status:'진행중',color:'#378ADD'}, closeModal)">추가</button>`; openModal('사업 추가'); }
function openManageProjectMembers(pid){ const p=pj(pid); document.getElementById('modal-body').innerHTML=`<div style="font-size:13px;margin-bottom:12px">${assigns.filter(a=>a.projectId===pid).map(a=>`<div>${mb(a.memberId)?.name} | ${a.role} <button onclick="apiSave({action:'deleteAssign',id:'${a.id}'},()=>openManageProjectMembers('${pid}'))">✕</button></div>`).join('')}</div><select id="am-sel">${members.map(m=>`<option value="${m.id}">${m.name}</option>`).join('')}</select><input type="text" id="am-role" placeholder="역할" style="margin-top:8px"><button class="btn btn-primary" style="width:100%;margin-top:8px" onclick="apiSave({action:'addAssign',id:'as_'+Date.now(),projectId:'${pid}',memberId:document.getElementById('am-sel').value,role:document.getElementById('am-role').value},()=>openManageProjectMembers('${pid}'))">배정</button>`; openModal(p.name + ' 인원 관리'); }

function openModal(t){ document.getElementById('modal-title').textContent=t; document.getElementById('modal').classList.add('show'); }
function closeModal(){ document.getElementById('modal').classList.remove('show'); }
function showToast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000); }
function showEv(id){ const e=events.find(v=>v.id===id); openModal(e.title); document.getElementById('modal-body').innerHTML=`<div style="font-size:14px">${fmtDateFull(e.start)} ~ ${fmtDateFull(e.end)}<br>유형: ${TL[e.type]}</div>`; }
function dayClick(d){ const de=events.filter(e=>inDay(e,curY,curM,d)); if(!de.length) return; document.getElementById('modal-body').innerHTML=de.map(e=>`<div onclick="showEv('${e.id}')" style="cursor:pointer;padding:8px;border-bottom:1px solid var(--border)">${e.title}</div>`).join(''); openModal(`${curM+1}/${d} 일정`); }
function goPage(p){ ['cal','overview','proposal','members','personal','todo','setup'].forEach(id=>{ const pg=document.getElementById('page-'+id); if(pg) pg.classList.toggle('active',id===p); const nav=document.getElementById('nav-'+id); if(nav) nav.classList.toggle('active',id===p); }); refreshAll(); }
function changeMonth(d){ curM+=d; if(curM>11){curM=0;curY++;} if(curM<0){curM=11;curY--;} renderCal(); }
function setTheme(t){ ls('theme',t); location.reload(); }

startRealtimeListeners();
</script>
