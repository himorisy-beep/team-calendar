<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>해외컨설팅 통합 관리</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        :root, html[data-theme="light"] { --bg:#fff; --bg2:#f7f7f5; --bg3:#f0efe9; --text:#1a1a1a; --text2:#6b6b6b; --text3:#a8a8a8; --border:rgba(0,0,0,0.09); --border2:rgba(0,0,0,0.16); --r:10px; --r-sm:6px; }
        html[data-theme="dark"] { --bg:#1c1c1c;--bg2:#242424;--bg3:#2a2a28; --text:#f0efe9;--text2:#9a9a94;--text3:#606060; --border:rgba(255,255,255,0.09);--border2:rgba(255,255,255,0.16); }
        @media (prefers-color-scheme: dark) { html:not([data-theme="light"]) { --bg:#1c1c1c;--bg2:#242424;--bg3:#2a2a28; --text:#f0efe9;--text2:#9a9a94;--text3:#606060; --border:rgba(255,255,255,0.09);--border2:rgba(255,255,255,0.16); } }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, 'Apple SD Gothic Neo', sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; overflow-x: hidden; }
        .layout { display: flex; min-height: 100vh; }
        .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 150; }
        .sidebar { width: 230px; background: var(--bg); border-right: .5px solid var(--border); padding: 20px 14px; flex-shrink: 0; display: flex; flex-direction: column; gap: 20px; position: sticky; top: 0; height: 100vh; overflow-y: auto; z-index: 200; transition: left 0.3s; }
        .logo { font-size: 16px; font-weight: 700; padding: 0 6px; }
        .logo-sub { font-size: 11px; color: var(--text3); margin-top: 2px; padding: 0 6px; }
        .sb-label { font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; margin: 15px 0 5px 6px; }
        .sb-btn { display: flex; align-items: center; gap: 10px; width: 100%; padding: 10px 12px; border: none; background: none; color: var(--text2); font-size: 14px; border-radius: var(--r-sm); cursor: pointer; text-align: left; }
        .sb-btn:hover { background: var(--bg2); }
        .sb-btn.active { background: var(--bg3); color: var(--text); font-weight: 600; }
        .mb-chip { display: flex; align-items: center; gap: 8px; padding: 6px; border-radius: var(--r-sm); cursor: pointer; transition: 0.1s; }
        .mb-chip.off { opacity: 0.3; }
        .proj-chip { display: flex; align-items: center; gap: 8px; padding: 6px; border-radius: var(--r-sm); cursor: pointer; font-size: 13px; color: var(--text2); }
        .proj-chip.active { color: var(--text); font-weight: 600; background: var(--bg2); }
        .main { flex: 1; padding: 24px; min-width: 0; }
        .mobile-header { display: none; padding: 14px 20px; background: var(--bg); border-bottom: .5px solid var(--border); align-items: center; gap: 14px; position: sticky; top: 0; z-index: 100; }
        .page { display: none; }
        .page.active { display: block; }
        .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 10px; }
        .page-title { font-size: 20px; font-weight: 700; }
        .card { background: var(--bg); border: .5px solid var(--border); border-radius: var(--r); padding: 18px; margin-bottom: 16px; }
        .card-title { font-size: 11px; font-weight: 700; color: var(--text2); margin-bottom: 12px; text-transform: uppercase; }
        .btn { padding: 8px 16px; border-radius: var(--r-sm); font-size: 13px; cursor: pointer; border: none; font-family: inherit; }
        .btn-primary { background: var(--text); color: var(--bg); }
        .btn-secondary { background: var(--bg2); color: var(--text2); border: .5px solid var(--border2); }
        .btn-danger-sm { padding: 3px 8px; background: none; color: #D85A30; border: 1px solid #F09595; border-radius: var(--r-sm); font-size: 11px; cursor: pointer; }
        .av { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; flex-shrink: 0; }
        .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        .tag { font-size: 11px; padding: 1px 7px; border-radius: 10px; font-weight: 500; }
        .tag-vacation{background:#E1F5EE;color:#0F6E56} .tag-work{background:#E6F1FB;color:#185FA5} .tag-proposal{background:#FBEAF0;color:#993556}
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: var(--border); border-radius: var(--r); overflow: hidden; }
        .cal-hdr { background: var(--bg2); padding: 10px; text-align: center; font-size: 11px; color: var(--text2); font-weight: 600; }
        .cal-day { background: var(--bg); min-height: 110px; padding: 6px; cursor: pointer; border-bottom: 0.5px solid var(--border); }
        .dn { font-size: 13px; margin-bottom: 6px; display: inline-block; width: 22px; height: 22px; text-align: center; line-height: 22px; }
        .today .dn { background: var(--text); color: var(--bg); border-radius: 50%; }
        .ep { font-size: 10px; padding: 2px 5px; border-radius: 4px; margin-bottom: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 600; }
        .li { display: flex; gap: 14px; padding: 14px; background: var(--bg); border: .5px solid var(--border); border-radius: var(--r); align-items: center; margin-bottom: 8px; cursor: pointer; }
        .li.is-past { opacity: 0.4; filter: grayscale(1); }
        .member-tag { display: inline-flex; align-items: center; gap: 5px; padding: 3px 8px; border-radius: 20px; font-size: 11px; margin: 2px; border: .5px solid var(--border); background: var(--bg2); }
        .todo-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: .5px solid var(--border2); }
        .todo-item.done span { text-decoration: line-through; color: var(--text3); }
        .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 1000; align-items: center; justify-content: center; }
        .modal-bg.show { display: flex; }
        .modal { background: var(--bg); border-radius: var(--r); padding: 24px; width: 440px; max-width: 94vw; max-height: 90vh; overflow-y: auto; border: 1px solid var(--border2); position: relative; }
        .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--text); color: var(--bg); padding: 10px 24px; border-radius: 24px; font-size: 13px; opacity: 0; transition: 0.3s; z-index: 2000; pointer-events: none; }
        .toast.show { opacity: 1; }
        .overview-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        @media(max-width: 768px) { .sidebar { position: fixed; left: -240px; } .sidebar.show { left: 0; } .mobile-header { display: flex; } .main { padding: 16px; } .overview-grid { grid-template-columns: 1fr; } .sidebar-overlay.show { display: block; } }
    </style>
</head>
<body>
    <div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>
    <div class="layout">
        <div class="sidebar" id="sidebar">
            <div><div class="logo">캘린더</div><div class="logo-sub">해외컨설팅</div></div>
            <div class="sb-label">메뉴</div>
            <button class="sb-btn active" id="nav-cal" onclick="goPage('cal')">📅 캘린더</button>
            <button class="sb-btn" id="nav-overview" onclick="goPage('overview')">📊 사업 현황</button>
            <button class="sb-btn" id="nav-proposal" onclick="goPage('proposal')">📝 제안 현황</button>
            <button class="sb-btn" id="nav-members" onclick="goPage('members')">👥 멤버 현황</button>
            <button class="sb-btn" id="nav-personal" onclick="goPage('personal')">👤 내 일정</button>
            <button class="sb-btn" id="nav-todo" onclick="goPage('todo')">✅ 할일</button>
            <button class="sb-btn" id="nav-setup" onclick="goPage('setup')">⚙️ 설정</button>
            <div class="sb-label">멤버 필터</div><div id="sb-members"></div>
            <div class="sb-label">사업 필터</div><div id="sb-projects"></div>
            <div style="margin-top:auto; padding-top:15px; border-top:1px solid var(--border);">
                <div class="sb-btn" onclick="openChangeSelf()" style="padding: 10px 8px;">
                    <div id="self-av" class="av"></div>
                    <div style="display:flex; flex-direction:column;">
                        <span id="self-name" style="font-size:13px; font-weight:600;">계정 선택</span>
                        <span style="font-size:10px; color:var(--text3);">변경하려면 클릭</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="main">
            <div class="mobile-header"><button onclick="toggleSidebar()" style="background:none; border:none; font-size:20px; cursor:pointer;">☰</button><div style="font-weight:700;">해외컨설팅</div></div>
            <div id="page-cal" class="page active">
                <div class="page-header"><div style="display:flex; align-items:center; gap:12px;"><button class="btn btn-secondary btn-sm" onclick="changeMonth(-1)">◀</button><span id="month-title" class="page-title"></span><button class="btn btn-secondary btn-sm" onclick="changeMonth(1)">▶</button></div><button class="btn btn-primary btn-sm" onclick="openAddEvent()">+ 일정 추가</button></div>
                <div id="cal-container"></div>
            </div>
            <div id="page-overview" class="page">
                <div class="page-header"><span class="page-title">사업 현황</span><label style="font-size:12px; cursor:pointer;"><input type="checkbox" id="ov-hide-past" onchange="renderOverview()" checked> 과거 사업 숨기기</label></div>
                <div id="overview-container" class="overview-grid"></div>
            </div>
            <div id="page-proposal" class="page">
                <div class="page-header"><span class="page-title">제안 현황</span><label style="font-size:12px; cursor:pointer;"><input type="checkbox" id="prop-hide-past" onchange="renderProposals()" checked> 완료 제안 숨기기</label></div>
                <div id="proposal-container" class="overview-grid"></div>
            </div>
            <div id="page-members" class="page"><div class="page-title" style="margin-bottom:20px;">멤버 현황</div><div id="members-container" class="overview-grid"></div></div>
            <div id="page-personal" class="page"><div class="page-header"><span class="page-title">내 일정</span><label style="font-size:12px;"><input type="checkbox" id="pf-hide-past" onchange="renderPersonalList()"> 과거 일정 숨기기</label></div><div id="personal-list"></div></div>
            <div id="page-todo" class="page">
                <div class="page-header"><span class="page-title">할일</span><label style="font-size:12px;"><input type="checkbox" id="todo-hide-done" onchange="renderTodos()"> 완료 숨기기</label></div>
                <div class="overview-grid">
                    <div class="card"><div class="card-title" style="color:#D85A30">🔥 Must-Do</div><input type="text" placeholder="+ 핵심 할일 추가 (Enter)" style="width:100%; padding:10px; margin-bottom:12px; border:1px solid var(--border2); border-radius:var(--r-sm);" onkeypress="if(event.key==='Enter') addTodo('must', this.value)"><div id="todo-must-list"></div></div>
                    <div class="card"><div class="card-title" style="color:#185FA5">☕ Should-Do</div><input type="text" placeholder="+ 서브 할일 추가 (Enter)" style="width:100%; padding:10px; margin-bottom:12px; border:1px solid var(--border2); border-radius:var(--r-sm);" onkeypress="if(event.key==='Enter') addTodo('should', this.value)"><div id="todo-should-list"></div></div>
                </div>
            </div>
            <div id="page-setup" class="page">
                <div class="page-title" style="margin-bottom:24px;">시스템 설정</div>
                <div class="card"><div class="card-title">팀원 관리</div><div id="member-manage-list"></div><button class="btn btn-secondary btn-sm" onclick="openAddMember()" style="margin-top:12px;">+ 팀원 추가</button></div>
                <div class="card"><div class="card-title">사업/제안 관리</div><div id="project-manage-list"></div><button class="btn btn-secondary btn-sm" onclick="openAddProject()" style="margin-top:12px;">+ 사업/제안 추가</button></div>
            </div>
        </div>
    </div>
    <div class="modal-bg" id="modal"><div class="modal"><div id="modal-title" style="font-weight:700; font-size:16px; margin-bottom:20px; border-bottom:1px solid var(--border); padding-bottom:10px;"></div><div id="modal-body"></div><button onclick="closeModal()" style="position:absolute; top:20px; right:20px; background:none; border:none; cursor:pointer; font-size:20px;">✕</button></div></div>
    <div class="toast" id="toast"></div>

    <script>
        // --- 1. 전역 상태 및 초기화 ---
        const firebaseConfig = { apiKey: "AIzaSyCTAM7S7UhrjZBWnF1_-u9EazhRtZZorNQ", authDomain: "team-calendar-e30d3.firebaseapp.com", projectId: "team-calendar-e30d3", storageBucket: "team-calendar-e30d3.firebasestorage.app", messagingSenderId: "211860835628", appId: "1:211860835628:web:87e84b5cdbc4387bd1b089" };
        firebase.initializeApp(firebaseConfig); const db = firebase.firestore();
        let selfId = localStorage.getItem('tc2_selfId') || '';
        let members=[], projects=[], events=[], todos=[], assigns=[], tasks=[];
        let curY = new Date().getFullYear(), curM = new Date().getMonth();
        let hiddenMb = new Set(); let selProj = 'all';
        const PALETTE = ["#378ADD","#1D9E75","#D85A30","#EF9F27","#533AB7","#993556","#3B6D11","#185FA5","#E91E63","#9C27B0","#673AB7","#3F51B5","#03A9F4","#00BCD4","#009688","#4CAF50","#8BC34A","#CDDC39","#FFC107","#FF9800","#FF5722","#795548","#9E9E9E","#607D8B"];

        const mb = id => members.find(m => m.id === id); const pj = id => projects.find(p => p.id === id);
        const ini = n => (n || '?').slice(0, 2); function parseDate(d) { return d ? new Date(d + 'T00:00:00') : new Date(0); }
        function showToast(m) { const t=document.getElementById('toast'); t.innerText=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000); }

        async function apiSave(p, cb) {
            const {action, id, ...data} = p;
            let col = action.includes('Event') ? 'events' : action.includes('Project') ? 'projects' : action.includes('Member') ? 'members' : action.includes('Todo') ? 'todos' : action.includes('Assign') ? 'assigns' : 'tasks';
            try { if(action.startsWith('add') || action.startsWith('update')) await db.collection(col).doc(id).set(data, {merge:true}); else await db.collection(col).doc(id).delete(); if(cb) cb(); } catch(e) { console.error(e); }
        }

        // --- 2. 렌더링 함수 (핵심 로직) ---
        function refreshAll() {
            renderSidebar(); renderCal(); renderOverview(); renderProposals(); renderMembersPage(); renderPersonalList(); renderTodos(); renderMemberManage(); renderProjectManage();
        }

        function renderSidebar() {
            const mc = document.getElementById('sb-members'); mc.innerHTML = '';
            members.forEach(m => {
                const d = document.createElement('div'); d.className = 'mb-chip' + (hiddenMb.has(m.id)?' off':'');
                d.onclick = () => { hiddenMb.has(m.id) ? hiddenMb.delete(m.id) : hiddenMb.add(m.id); refreshAll(); };
                d.innerHTML = `<div class="av" style="background:${m.color}20; color:${m.color}">${ini(m.name)}</div><span style="font-size:13px;">${m.name}</span>`; mc.appendChild(d);
            });
            const pc = document.getElementById('sb-projects'); pc.innerHTML = `<div class="proj-chip ${selProj==='all'?'active':''}" onclick="selProj='all';refreshAll()"><div class="dot" style="background:#888"></div>전체</div>`;
            projects.forEach(p => {
                const d = document.createElement('div'); d.className = 'proj-chip ' + (selProj===p.id?'active':'');
                d.onclick = () => { selProj = p.id; refreshAll(); };
                d.innerHTML = `<div class="dot" style="background:${p.color}"></div><span style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${p.name}</span>`; pc.appendChild(d);
            });
            const s = mb(selfId) || {name:'-', color:'#888'};
            document.getElementById('self-av').style.cssText = `background:${s.color}20; color:${s.color};`; document.getElementById('self-av').innerText = ini(s.name); document.getElementById('self-name').innerText = s.name;
        }

        function renderCal() {
            document.getElementById('month-title').innerText = `${curY}년 ${curM+1}월`;
            const fd = new Date(curY, curM, 1).getDay(); const ld = new Date(curY, curM + 1, 0).getDate();
            let h = '<div class="cal-grid">'; ['일','월','화','수','목','금','토'].forEach(d => h += `<div class="cal-hdr">${d}</div>`);
            for(let i=0; i<fd; i++) h += '<div class="cal-day" style="background:var(--bg2)"></div>';
            const vis = events.filter(e => !hiddenMb.has(e.who) && (selProj==='all' || e.project === selProj));
            for(let d=1; d<=ld; d++) {
                const isT = d === new Date().getDate() && curM === new Date().getMonth() && curY === new Date().getFullYear();
                h += `<div class="cal-day ${isT?'today':''}" onclick="dayClick(${d})"><div class="dn">${d}</div>`;
                vis.forEach(e => {
                    const sd = parseDate(e.start), ed = parseDate(e.end || e.start); const cur = new Date(curY, curM, d);
                    if (e.type === 'proposal') {
                        if (sd.getDate()===d && sd.getMonth()===curM && sd.getFullYear()===curY) h += `<div class="ep" style="background:#FBEAF0; color:#993556; border:1px solid #993556;">[제안시작] ${e.title}</div>`;
                        if (ed.getDate()===d && ed.getMonth()===curM && ed.getFullYear()===curY) h += `<div class="ep" style="background:#993556; color:white;">[입찰마감] ${e.title}</div>`;
                    } else if (cur >= sd && cur <= ed) {
                        const c = e.type==='vacation'?'#1D9E75':e.type==='work'?'#378ADD':'#888';
                        h += `<div class="ep" style="background:${c}; color:white;" onclick="event.stopPropagation(); showEv('${e.id}')">${e.title}</div>`;
                    }
                }); h += '</div>';
            }
            document.getElementById('cal-container').innerHTML = h + '</div>';
        }

        function renderOverview() {
            const container = document.getElementById('overview-container'); container.innerHTML = '';
            const hide = document.getElementById('ov-hide-past').checked;
            projects.filter(p => !p.isProposal).forEach(p => {
                if(hide && p.status === '완료') return;
                const pa = assigns.filter(a => a.projectId === p.id); const pt = tasks.filter(t => t.project === p.id);
                const d = document.createElement('div'); d.className = 'card';
                d.innerHTML = `<div style="border-left:5px solid ${p.color}; padding-left:15px;"><div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;"><span style="font-weight:700;">${p.name}</span><select onchange="apiSave({action:'updateProject', id:'${p.id}', status:this.value})" style="font-size:11px;"><option ${p.status==='진행중'?'selected':''}>진행중</option><option ${p.status==='완료'?'selected':''}>완료</option></select></div><div style="font-size:11px; color:var(--text2); margin-bottom:10px;">${p.start || '-'} ~ ${p.end || '-'}</div><div style="margin-bottom:8px;">${pa.map(a => `<span class="member-tag">${mb(a.memberId)?.name || '?'}<small style="margin-left:4px; opacity:0.6;">${a.role||''}</small></span>`).join('')}</div><div style="font-size:12px; line-height:1.6;">${pt.map(t => `<div>• ${t.title}</div>`).join('') || '<span style="color:var(--text3)">세부 업무 없음</span>'}</div></div>`;
                container.appendChild(d);
            });
        }

        function renderProposals() {
            const container = document.getElementById('proposal-container'); container.innerHTML = '';
            const hide = document.getElementById('prop-hide-past').checked;
            projects.filter(p => p.isProposal).forEach(p => {
                const isPast = p.status === '완료' || (p.end && parseDate(p.end) < new Date());
                if(hide && isPast) return;
                const pa = assigns.filter(a => a.projectId === p.id); const pe = events.filter(e => e.project === p.id && e.type === 'proposal');
                const d = document.createElement('div'); d.className = 'card'; d.style.opacity = isPast ? 0.5 : 1;
                d.innerHTML = `<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; border-bottom:2px solid ${p.color}; padding-bottom:8px;"><span style="font-weight:700; ${isPast?'text-decoration:line-through':''}">${p.name}</span><select onchange="apiSave({action:'updateProject', id:'${p.id}', status:this.value})" style="font-size:11px;"><option ${p.status==='제안중'?'selected':''}>제안중</option><option ${p.status==='완료'?'selected':''}>완료/드랍</option></select></div><div style="margin-bottom:10px;">${pa.map(a => `<span class="member-tag">${mb(a.memberId)?.name || '?'} <small>${a.role||''}</small></span>`).join('')}</div><div style="background:var(--bg2); padding:12px; border-radius:var(--r-sm); font-size:12px;"><div style="color:#993556; font-weight:700; margin-bottom:6px;">입찰마감: ${p.end || '-'}</div>${pe.map(e => `<div>📍 ${e.title}</div>`).join('') || '일정 정보 없음'}</div>`;
                container.appendChild(d);
            });
        }

        function renderPersonalList() {
            const list = document.getElementById('personal-list'); list.innerHTML = '';
            const hide = document.getElementById('pf-hide-past').checked;
            events.filter(e => e.who === selfId).sort((a,b) => parseDate(b.start) - parseDate(a.start)).forEach(e => {
                const isPast = parseDate(e.end || e.start) < new Date(); if(hide && isPast) return;
                list.innerHTML += `<div class="li ${isPast?'is-past':''}" onclick="showEv('${e.id}')"><div style="flex:1;"><b>${e.title}</b><div style="font-size:11px; color:var(--text2); margin-top:4px;">${e.start} ~ ${e.end}</div></div><button class="btn-danger-sm" onclick="event.stopPropagation(); apiSave({action:'deleteEvent', id:'${e.id}'})">삭제</button></div>`;
            });
        }

        function renderTodos() {
            const hide = document.getElementById('todo-hide-done').checked; const my = todos.filter(t => t.who === selfId);
            const draw = (id, type) => {
                const el = document.getElementById(id); el.innerHTML = ''; let items = my.filter(t => t.type === type);
                if(hide) items = items.filter(t => t.done !== 'TRUE');
                items.sort((a,b) => (a.done==='TRUE') - (b.done==='TRUE')).forEach(t => {
                    el.innerHTML += `<div class="todo-item ${t.done==='TRUE'?'done':''}"><input type="checkbox" ${t.done==='TRUE'?'checked':''} onchange="apiSave({action:'updateTodo', id:'${t.id}', done:this.checked?'TRUE':'FALSE'})"><span style="flex:1;">${t.text}</span><button style="border:none; background:none; cursor:pointer;" onclick="apiSave({action:'deleteTodo', id:'${t.id}'})">✕</button></div>`;
                });
            }; draw('todo-must-list', 'must'); draw('todo-should-list', 'should');
        }

        function renderMembersPage() {
            const container = document.getElementById('members-container'); container.innerHTML = '';
            members.forEach(m => {
                const ma = assigns.filter(a => a.memberId === m.id);
                container.innerHTML += `<div class="card"><div style="display:flex; align-items:center; gap:12px; margin-bottom:12px;"><div class="av" style="width:36px; height:36px; background:${m.color}20; color:${m.color}; font-size:14px;">${ini(m.name)}</div><div><div style="font-weight:700;">${m.name}</div><div style="font-size:11px; color:var(--text2);">${m.role || '-'}</div></div></div><div style="font-size:12px; color:var(--text2);">${ma.map(a => `<div style="padding:4px 0; border-top:1px solid var(--border);">● ${pj(a.projectId)?.name || '?'} <small>(${a.role||''})</small></div>`).join('') || '참여 사업 없음'}</div></div>`;
            });
        }

        function renderMemberManage() {
            const el = document.getElementById('member-manage-list'); el.innerHTML = '';
            members.forEach(m => el.innerHTML += `<div style="display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--border2); font-size:13px;"><span>${m.name} <small style="color:var(--text2)">(${m.role||'-'})</small></span><div style="display:flex; gap:5px;"><button class="btn btn-secondary btn-sm" onclick="openEditMember('${m.id}')">수정</button><button class="btn-danger-sm" onclick="apiSave({action:'deleteMember', id:'${m.id}'})">삭제</button></div></div>`);
        }

        function renderProjectManage() {
            const el = document.getElementById('project-manage-list'); el.innerHTML = '';
            projects.sort((a,b) => (a.isProposal === b.isProposal) ? 0 : a.isProposal ? 1 : -1).forEach(p => {
                el.innerHTML += `<div style="display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--border2); font-size:13px;"><div style="display:flex; align-items:center; gap:8px;"><div class="dot" style="background:${p.color}"></div><span>[${p.isProposal?'제안':'사업'}] ${p.name}</span></div><div style="display:flex; gap:5px;"><button class="btn btn-secondary btn-sm" onclick="manageMembers('${p.id}')">인원</button><button class="btn btn-secondary btn-sm" onclick="openEditProject('${p.id}')">수정</button></div></div>`;
            });
        }

        // --- 3. 모달 및 제어 함수 ---
        window.goPage = p => {
            document.querySelectorAll('.page').forEach(el=>el.classList.remove('active')); document.querySelectorAll('.sb-btn').forEach(el=>el.classList.remove('active'));
            document.getElementById('page-'+p).classList.add('active'); if(document.getElementById('nav-'+p)) document.getElementById('nav-'+p).classList.add('active');
            if(window.innerWidth<=768) toggleSidebar(); refreshAll();
        };
        window.toggleSidebar = () => { document.getElementById('sidebar').classList.toggle('show'); document.getElementById('overlay').classList.toggle('show'); };
        window.changeMonth = v => { curM+=v; if(curM>11){curM=0; curY++;} if(curM<0){curM=11; curY--;} renderCal(); };
        window.openModal = (t,b) => { document.getElementById('modal-title').innerText=t; document.getElementById('modal-body').innerHTML=b; document.getElementById('modal').classList.add('show'); };
        window.closeModal = () => document.getElementById('modal').classList.remove('show');

        window.openAddEvent = () => {
            const opts = projects.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
            openModal('일정 추가', `<input type="text" id="ef-title" placeholder="제목" style="width:100%; padding:10px; margin-bottom:10px;"><div style="display:flex; gap:10px; margin-bottom:10px;"><input type="date" id="ef-start" style="flex:1; padding:8px;"><input type="date" id="ef-end" style="flex:1; padding:8px;"></div><select id="ef-type" style="width:100%; padding:10px; margin-bottom:10px;"><option value="work">업무</option><option value="proposal">제안</option><option value="vacation">휴가</option></select><select id="ef-proj" style="width:100%; padding:10px; margin-bottom:15px;"><option value="">관련 사업 선택</option>${opts}</select><button class="btn btn-primary" style="width:100%" onclick="saveEv()">저장</button>`);
        };
        window.saveEv = () => { const p = {action:'addEvent', id:'ev_'+Date.now(), title:document.getElementById('ef-title').value, start:document.getElementById('ef-start').value, end:document.getElementById('ef-end').value, type:document.getElementById('ef-type').value, project:document.getElementById('ef-proj').value, who:selfId}; if(p.title && p.start) apiSave(p, closeModal); };

        window.openAddMember = () => {
            let b = `<input type="text" id="mf-name" placeholder="이름" style="width:100%; padding:10px; margin-bottom:10px;"><input type="text" id="mf-role" placeholder="역할" style="width:100%; padding:10px; margin-bottom:15px;"><div style="display:grid; grid-template-columns:repeat(8, 1fr); gap:6px; margin-bottom:15px;">`;
            PALETTE.forEach(c => b += `<div onclick="window._selC='${c}'" style="background:${c}; height:25px; border-radius:4px; cursor:pointer;"></div>`);
            openModal('팀원 추가', b + `</div><button class="btn btn-primary" style="width:100%" onclick="apiSave({action:'addMember', id:'mb_'+Date.now(), name:document.getElementById('mf-name').value, role:document.getElementById('mf-role').value, color:window._selC||'#888'}, closeModal)">등록</button>`);
        };

        window.openAddProject = () => {
            let b = `<input type="text" id="pf-name" placeholder="명칭" style="width:100%; padding:10px; margin-bottom:10px;"><select id="pf-isprop" style="width:100%; padding:10px; margin-bottom:10px;"><option value="false">수주 사업</option><option value="true">제안 사업</option></select><div style="display:flex; gap:10px; margin-bottom:15px;"><input type="date" id="pf-start" style="flex:1; padding:8px;"><input type="date" id="pf-end" style="flex:1; padding:8px;"></div><div style="display:grid; grid-template-columns:repeat(8, 1fr); gap:6px; margin-bottom:15px;">`;
            PALETTE.forEach(c => b += `<div onclick="window._selC='${c}'" style="background:${c}; height:25px; border-radius:4px; cursor:pointer;"></div>`);
            openModal('사업/제안 추가', b + `</div><button class="btn btn-primary" style="width:100%" onclick="apiSave({action:'addProject', id:'pj_'+Date.now(), name:document.getElementById('pf-name').value, isProposal:document.getElementById('pf-isprop').value==='true', start:document.getElementById('pf-start').value, end:document.getElementById('pf-end').value, status:'진행중', color:window._selC||'#378ADD'}, closeModal)">저장</button>`);
        };

        window.manageMembers = (pid) => {
            const cur = assigns.filter(a => a.projectId === pid); const un = members.filter(m => !cur.find(a => a.memberId === m.id));
            let h = `<div style="max-height:150px; overflow-y:auto; margin-bottom:15px; border:1px solid var(--border); padding:10px;">${cur.map(a => `<div style="display:flex; justify-content:space-between; padding:5px 0;"><span>${mb(a.memberId)?.name}</span><button onclick="apiSave({action:'deleteAssign', id:'${a.id}'}, ()=>manageMembers('${pid}'))">✕</button></div>`).join('')}</div><select id="as-sel" style="width:100%; padding:10px; margin-bottom:10px;">${un.map(m=>`<option value="${m.id}">${m.name}</option>`).join('')}</select><input type="text" id="as-role" placeholder="역할" style="width:100%; padding:10px; margin-bottom:15px;"><button class="btn btn-primary" style="width:100%" onclick="apiSave({action:'addAssign', id:'as_'+Date.now(), projectId:'${pid}', memberId:document.getElementById('as-sel').value, role:document.getElementById('as-role').value}, ()=>manageMembers('${pid}'))">배정</button>`;
            openModal('인원 배정', h);
        };

        window.openChangeSelf = () => { const opts = members.map(m=>`<option value="${m.id}" ${m.id===selfId?'selected':''}>${m.name}</option>`).join(''); openModal('계정 변경', `<select id="self-sel" style="width:100%; padding:12px; margin-bottom:15px;">${opts}</select><button class="btn btn-primary" style="width:100%" onclick="selfId=document.getElementById('self-sel').value; localStorage.setItem('tc2_selfId',selfId); closeModal(); refreshAll();">변경</button>`); };
        window.showEv = id => { const e = events.find(v=>v.id===id); if(e) openModal(e.title, `<p style="font-size:14px; color:var(--text2);">${e.start} ~ ${e.end}</p><button class="btn btn-danger-sm" style="margin-top:20px; width:100%;" onclick="apiSave({action:'deleteEvent', id:'${e.id}'}, closeModal)">일정 삭제</button>`); };
        window.dayClick = d => { const de = events.filter(e => { const sd=parseDate(e.start), ed=parseDate(e.end||e.start); const cur=new Date(curY, curM, d); return cur>=sd && cur<=ed; }); if(de.length) openModal(`${curM+1}월 ${d}일`, de.map(e => `<div style="padding:10px; border-bottom:1px solid var(--border2); cursor:pointer;" onclick="showEv('${e.id}')">${e.title}</div>`).join('')); };

        // --- 4. 실시간 동기화 시작 ---
        const cols = ["members", "projects", "events", "todos", "assigns", "tasks"];
        cols.forEach(col => {
            db.collection(col).onSnapshot(snap => {
                const data = snap.docs.map(d => ({id: d.id, ...d.data()}));
                if(col === 'members') members = data; else if(col === 'projects') projects = data; else if(col === 'events') events = data; else if(col === 'todos') todos = data; else if(col === 'assigns') assigns = data; else if(col === 'tasks') tasks = data;
                if(!selfId && members.length) { selfId = members[0].id; localStorage.setItem('tc2_selfId', selfId); }
                refreshAll();
            });
        });
    </script>
</body>
</html>
