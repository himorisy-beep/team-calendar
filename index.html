<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>캘린더</title>
<style>
:root{
  --bg:#fff; --bg2:#f7f7f5; --bg3:#f0efe9;
  --text:#1a1a1a; --text2:#6b6b6b; --text3:#a8a8a8;
  --border:rgba(0,0,0,0.09); --border2:rgba(0,0,0,0.16);
  --r:10px; --r-sm:6px;
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#1c1c1c; --bg2:#242424; --bg3:#2a2a28;
    --text:#f0efe9; --text2:#9a9a94; --text3:#606060;
    --border:rgba(255,255,255,0.09); --border2:rgba(255,255,255,0.16);
  }
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  background:var(--bg3); color:var(--text); min-height:100vh;
}
.layout{display:flex;min-height:100vh}
.mobile-header{
  display:none; padding:14px 20px; background:var(--bg);
  border-bottom:.5px solid var(--border); align-items:center; gap:14px;
  position:sticky; top:0; z-index:100;
}
.menu-btn{
  background:none; border:none; font-size:22px; cursor:pointer;
  color:var(--text); padding:0; line-height:1;
}
.sidebar-overlay{
  display:none; position:fixed; inset:0; background:rgba(0,0,0,.38); z-index:150;
}
.sidebar-overlay.show{display:block}
.sidebar{
  width:220px; background:var(--bg); border-right:.5px solid var(--border);
  padding:20px 14px; flex-shrink:0; display:flex; flex-direction:column; gap:20px;
  position:sticky; top:0; height:100vh; overflow-y:auto;
}
.logo{font-size:15px;font-weight:700;padding:0 6px}
.logo-sub{font-size:12px;color:var(--text3);font-weight:400;margin-top:2px;padding:0 6px}
.sb-label{
  font-size:10px; font-weight:700; color:var(--text3); letter-spacing:.07em;
  text-transform:uppercase; padding:0 6px; margin-bottom:6px;
}
.sb-btn{
  display:flex; align-items:center; gap:8px; width:100%; padding:7px 8px;
  border:none; background:none; color:var(--text2); font-size:13px;
  border-radius:var(--r-sm); cursor:pointer; text-align:left; transition:all .12s;
}
.sb-btn:hover{background:var(--bg2);color:var(--text)}
.sb-btn.active{background:var(--bg3);color:var(--text);font-weight:500}
.sb-btn .icon{font-size:14px;width:18px;text-align:center}
.mb-chip{
  display:flex; align-items:center; gap:7px; padding:5px 6px;
  border-radius:var(--r-sm); cursor:pointer; transition:all .12s;
}
.mb-chip:hover{background:var(--bg2)}
.mb-chip.off{opacity:.35}
.av{
  width:22px;height:22px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;
}
.mb-chip-name{font-size:13px}
.proj-chip{
  display:flex;align-items:center;gap:7px;padding:5px 6px;border-radius:var(--r-sm);
  cursor:pointer;font-size:13px;color:var(--text2);transition:all .12s;
}
.proj-chip:hover{background:var(--bg2)}
.proj-chip.active{color:var(--text);font-weight:500}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.main{flex:1;padding:24px;overflow:auto;min-width:0}
.page{display:none}
.page.active{display:block}
.page-header{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.page-title{font-size:18px;font-weight:700}
.card{
  background:var(--bg); border:.5px solid var(--border);
  border-radius:var(--r); padding:18px; margin-bottom:14px;
}
.card-title{
  font-size:12px;font-weight:600;color:var(--text2);margin-bottom:14px;
  text-transform:uppercase;letter-spacing:.05em;
}
.btn{
  padding:7px 14px;border-radius:var(--r-sm);font-size:13px;cursor:pointer;
  border:none;font-family:inherit;transition:opacity .12s;
}
.btn-primary{background:var(--text);color:var(--bg)}
.btn-primary:hover{opacity:.82}
.btn-secondary{background:none;color:var(--text);border:.5px solid var(--border2)}
.btn-secondary:hover{background:var(--bg2)}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-danger-sm{
  padding:3px 8px;background:none;color:#A32D2D;border:.5px solid #F09595;
  border-radius:var(--r-sm);font-size:11px;cursor:pointer;font-family:inherit
}
.chip{
  padding:4px 12px;border-radius:20px;font-size:12px;cursor:pointer;
  border:.5px solid var(--border2);background:var(--bg);color:var(--text2);
  transition:all .12s;
}
.chip.active{background:var(--text);color:var(--bg);border-color:var(--text)}
.tag{font-size:11px;padding:1px 7px;border-radius:10px;font-weight:500;white-space:nowrap}
.ev-vacation{background:#E1F5EE;color:#0F6E56}
.ev-work{background:#E6F1FB;color:#185FA5}
.ev-trip{background:#FAEEDA;color:#854F0B}
.ev-meeting{background:#EEEDFE;color:#3C3489}
.ev-personal{background:#F1EFE8;color:#5F5E5A}
.tag-vacation{background:#E1F5EE;color:#0F6E56}
.tag-work{background:#E6F1FB;color:#185FA5}
.tag-trip{background:#FAEEDA;color:#854F0B}
.tag-meeting{background:#EEEDFE;color:#3C3489}
.tag-personal{background:#F1EFE8;color:#5F5E5A}
.tag-project{background:#EAF3DE;color:#2E5A0E}
.tag-sub{background:#F1EFE8;color:#5F5E5A}
.tag-todo{background:#F1EFE8;color:#5F5E5A}
.tag-doing{background:#E6F1FB;color:#185FA5}
.tag-done{background:#E1F5EE;color:#0F6E56}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.form-row.full{grid-template-columns:1fr}
.fl{font-size:11px;color:var(--text2);margin-bottom:4px}
input,select,textarea{
  width:100%;padding:7px 10px;border:.5px solid var(--border2);border-radius:var(--r-sm);
  background:var(--bg);color:var(--text);font-size:13px;font-family:inherit;transition:border-color .12s
}
input:focus,select:focus,textarea:focus{outline:none;border-color:#378ADD}
.toggle-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.toggle{
  width:34px;height:18px;background:var(--border2);border-radius:9px;cursor:pointer;
  position:relative;transition:background .18s;flex-shrink:0;
}
.toggle.on{background:#1D9E75}
.toggle::after{
  content:'';position:absolute;width:14px;height:14px;background:#fff;border-radius:50%;
  top:2px;left:2px;transition:left .18s;
}
.toggle.on::after{left:18px}
.sub-row{display:none}
.sub-row.show{display:block}
.filter-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.empty{padding:2rem;text-align:center;color:var(--text3);font-size:13px}

.cal-grid{
  display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);
  border:.5px solid var(--border);border-radius:var(--r);overflow:hidden;width:100%;
}
.cal-hdr{
  background:var(--bg2);padding:7px 4px;text-align:center;font-size:11px;
  color:var(--text2);font-weight:600
}
.cal-day{
  background:var(--bg);min-height:86px;padding:5px;cursor:pointer;transition:background .1s;min-width:0;
}
.cal-day.empty{background:var(--bg2);cursor:default;pointer-events:none}
.cal-day.today .dn{background:var(--text);color:var(--bg);border-radius:50%}
.dn{
  font-size:12px;width:20px;height:20px;display:flex;align-items:center;justify-content:center;margin-bottom:3px
}
.cal-day.sun .dn{color:#D85A30}
.cal-day.sat .dn{color:#378ADD}
.ep{
  font-size:11px;padding:2px 5px;border-radius:3px;margin-bottom:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;max-width:100%;
  font-weight:500;
}
.more-p{font-size:11px;color:var(--text2);padding:1px 2px}
.legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px}
.legend-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2)}
.list-wrap{display:flex;flex-direction:column;gap:7px}
.li{
  display:flex;gap:11px;padding:11px 14px;background:var(--bg);border:.5px solid var(--border);
  border-radius:var(--r);align-items:flex-start;cursor:pointer;transition:border-color .12s
}
.li:hover{border-color:var(--border2)}
.li-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:5px}
.li-info{flex:1;min-width:0}
.li-title{font-size:14px;font-weight:500;margin-bottom:3px}
.li-meta{font-size:12px;color:var(--text2)}
.tag-row{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}

.overview-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
@media(max-width:900px){.overview-grid{grid-template-columns:1fr}}
.proj-card{background:var(--bg);border:.5px solid var(--border);border-radius:var(--r);overflow:hidden}
.proj-card-header{padding:12px 16px;display:flex;align-items:center;gap:10px;border-bottom:.5px solid var(--border)}
.proj-color-bar{width:4px;height:36px;border-radius:2px;flex-shrink:0}
.proj-card-title{font-size:14px;font-weight:600}
.proj-card-sub{font-size:12px;color:var(--text2);margin-top:1px}
.proj-card-body{padding:12px 16px}
.member-tag{
  display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:20px;
  font-size:12px;margin:2px;border:.5px solid var(--border)
}
.task-row{
  display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:.5px solid var(--border);font-size:13px
}
.task-row:last-child{border-bottom:none}
.task-assignee{display:flex;align-items:center;gap:5px;flex-shrink:0;min-width:72px}
.task-title{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.task-dates{font-size:11px;color:var(--text2);flex-shrink:0;white-space:nowrap}

.member-overview{display:flex;flex-direction:column;gap:10px}
.member-card{background:var(--bg);border:.5px solid var(--border);border-radius:var(--r);overflow:hidden}
.member-card-header{padding:12px 16px;display:flex;align-items:center;gap:10px;border-bottom:.5px solid var(--border)}
.member-card-info{flex:1}
.member-card-name{font-size:14px;font-weight:600}
.member-card-role{font-size:12px;color:var(--text2)}
.member-card-body{padding:12px 16px}
.proj-row{display:flex;align-items:flex-start;gap:10px;padding:6px 0;border-bottom:.5px solid var(--border);font-size:13px}
.proj-row:last-child{border-bottom:none}
.proj-row-name{min-width:100px;font-weight:500;display:flex;align-items:center;gap:6px}
.proj-tasks{flex:1;display:flex;flex-wrap:wrap;gap:4px}
.mini-task{
  font-size:11px;padding:2px 8px;border-radius:10px;border:.5px solid var(--border2);
  background:var(--bg2);color:var(--text2);white-space:nowrap;cursor:pointer
}
.mini-task.doing{background:#E6F1FB;color:#185FA5;border-color:#B5D4F4}
.mini-task.done{background:#E1F5EE;color:#0F6E56;border-color:#9FE1CB;text-decoration:line-through;opacity:.7}
.mini-task.overdue{background:#FAECE7;color:#D85A30;border-color:#F09595;font-weight:600}

.gantt-wrap{overflow-x:auto}
.gantt{min-width:700px}
.gantt-header{display:flex;margin-bottom:2px}
.gantt-label-col{width:200px;flex-shrink:0}
.gantt-timeline{flex:1;display:flex}
.gantt-day-hdr{text-align:center;font-size:10px;color:var(--text3);border-left:.5px solid var(--border);padding:3px 0}
.gantt-row{display:flex;align-items:center;margin-bottom:4px}
.gantt-label{
  width:200px;flex-shrink:0;font-size:12px;padding:0 8px 0 0;display:flex;align-items:center;gap:6px;overflow:hidden
}
.gantt-label-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gantt-bar-area{flex:1;position:relative;height:22px}
.gantt-bar{
  position:absolute;top:2px;bottom:2px;border-radius:3px;cursor:pointer;transition:opacity .12s;
  display:flex;align-items:center;padding:0 6px;font-size:10px;color:#fff;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;min-width:4px
}
.gantt-bar:hover{opacity:.82}

.todo-item{
  display:flex;align-items:center;gap:8px;font-size:13px;padding:6px 0;color:var(--text);
  border-bottom:.5px solid var(--border2)
}
.todo-item:last-child{border-bottom:none}
.todo-item.done{text-decoration:line-through;color:var(--text3)}
.todo-cb{width:16px;height:16px;cursor:pointer}
.todo-del{
  margin-left:auto;cursor:pointer;color:var(--text3);background:none;border:none;font-size:14px;padding:0 4px
}
.todo-del:hover{color:#A32D2D}

.modal-bg{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:200;align-items:center;justify-content:center
}
.modal-bg.show{display:flex}
.modal{
  background:var(--bg);border-radius:var(--r);padding:22px;width:400px;max-width:94vw;
  border:.5px solid var(--border2);max-height:88vh;overflow-y:auto
}
.modal-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px}
.modal-title{font-size:15px;font-weight:700}
.modal-close{border:none;background:none;cursor:pointer;color:var(--text2);font-size:18px;line-height:1}
.dr{display:flex;gap:10px;margin-bottom:9px;font-size:13px}
.dl{color:var(--text2);min-width:52px;flex-shrink:0}
.toast{
  position:fixed;bottom:22px;left:50%;transform:translateX(-50%);
  background:var(--text);color:var(--bg);padding:8px 22px;border-radius:20px;font-size:13px;
  opacity:0;transition:opacity .2s;z-index:300;pointer-events:none;white-space:nowrap
}
.toast.show{opacity:1}
.status-bar{padding:10px 14px;border-radius:var(--r-sm);font-size:13px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.sb-loading{background:#E6F1FB;color:#185FA5}
.sb-error{background:#FCEBEB;color:#A32D2D}
.spinner{
  width:13px;height:13px;border:2px solid currentColor;border-top-color:transparent;
  border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0
}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:680px){
  .sidebar{position:fixed;left:-260px;z-index:200;width:240px;transition:left .25s ease;box-shadow:2px 0 10px rgba(0,0,0,.1)}
  .sidebar.show{left:0}
  .main{padding:0}
  .page{padding:16px}
  .mobile-header{display:flex}
}
</style>
</head>
<body>
<div class="layout">
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar(false)"></div>

  <div class="sidebar">
    <div>
      <div class="logo">캘린더</div>
      <div class="logo-sub" id="sb-teamname">해외컨설팅</div>
    </div>

    <div>
      <div class="sb-label">메뉴</div>
      <button class="sb-btn active" id="nav-cal" onclick="goPage('cal')"><span class="icon">📅</span>캘린더</button>
      <button class="sb-btn" id="nav-overview" onclick="goPage('overview')"><span class="icon">📊</span>사업 현황</button>
      <button class="sb-btn" id="nav-members" onclick="goPage('members')"><span class="icon">👥</span>멤버 현황</button>
      <button class="sb-btn" id="nav-personal" onclick="goPage('personal')"><span class="icon">👤</span>내 일정</button>
      <button class="sb-btn" id="nav-todo" onclick="goPage('todo')"><span class="icon">✅</span>할일</button>
      <button class="sb-btn" id="nav-setup" onclick="goPage('setup')"><span class="icon">⚙️</span>설정</button>
    </div>

    <div>
      <div class="sb-label">멤버 필터</div>
      <div id="sb-members"></div>
    </div>

    <div>
      <div class="sb-label">사업 필터</div>
      <div id="sb-projects"></div>
    </div>

    <div style="margin-top:auto;border-top:.5px solid var(--border);padding-top:12px;">
      <div class="sb-label" style="margin-bottom:5px">내 계정</div>
      <div style="display:flex;align-items:center;gap:7px;padding:5px 6px;cursor:pointer;border-radius:var(--r-sm)" onclick="openChangeSelf()">
        <div class="av" id="self-av"></div>
        <span style="font-size:13px" id="self-name">—</span>
        <span style="font-size:11px;color:var(--text3);margin-left:auto">변경</span>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="mobile-header">
      <button class="menu-btn" onclick="toggleSidebar()">☰</button>
      <div style="font-weight:700;font-size:16px">캘린더</div>
    </div>

    <div id="status-bar" style="display:none"></div>

    <div id="page-cal" class="page active">
      <div class="page-header">
        <button class="btn btn-secondary btn-sm" onclick="changeMonth(-1)">◀</button>
        <span style="font-size:18px;font-weight:700" id="month-title"></span>
        <button class="btn btn-secondary btn-sm" onclick="changeMonth(1)">▶</button>
        <div style="margin-left:auto;display:flex;gap:6px">
          <button class="chip active" id="vm-cal" onclick="setVM('cal')">달력</button>
          <button class="chip" id="vm-list" onclick="setVM('list')">목록</button>
          <button class="btn btn-secondary btn-sm" onclick="loadAll(true)">↻</button>
        </div>
      </div>

      <div class="legend">
        <div class="legend-item"><div class="dot" style="background:#1D9E75"></div>휴가</div>
        <div class="legend-item"><div class="dot" style="background:#378ADD"></div>업무</div>
        <div class="legend-item"><div class="dot" style="background:#EF9F27"></div>출장</div>
        <div class="legend-item"><div class="dot" style="background:#533AB7"></div>회의</div>
      </div>

      <div id="cal-container"></div>
    </div>

    <div id="page-overview" class="page">
      <div class="page-header">
        <span class="page-title">사업 현황</span>
        <div style="margin-left:auto;display:flex;gap:6px;align-items:center;">
          <label style="font-size:12px;color:var(--text2);display:flex;align-items:center;gap:4px;cursor:pointer;margin-right:8px;">
            <input type="checkbox" id="ov-hide-past" onchange="toggleHidePast(this.checked)" checked> 과거 숨기기
          </label>
          <button class="chip active" id="ov-board" onclick="setOV('board')">보드</button>
          <button class="chip" id="ov-gantt" onclick="setOV('gantt')">간트</button>
        </div>
      </div>
      <div id="overview-container"></div>
    </div>

    <div id="page-members" class="page">
      <div class="page-header">
        <span class="page-title">멤버 현황</span>
        <div style="margin-left:auto;display:flex;gap:6px;align-items:center;">
          <label style="font-size:12px;color:var(--text2);display:flex;align-items:center;gap:4px;cursor:pointer;">
            <input type="checkbox" id="mb-hide-past" onchange="toggleHidePast(this.checked)" checked> 과거 숨기기
          </label>
        </div>
      </div>
      <div id="members-container"></div>
    </div>

    <div id="page-personal" class="page">
      <div class="page-header"><span class="page-title">내 일정</span></div>

      <div class="card">
        <div class="card-title">일정 추가/수정</div>
        <div class="form-row full"><input type="text" id="ev-title" placeholder="일정 제목"></div>
        <div class="form-row">
          <div><div class="fl">시작일</div><input type="date" id="ev-start"></div>
          <div><div class="fl">종료일</div><input type="date" id="ev-end"></div>
        </div>
        <div class="form-row full" style="margin-bottom:4px">
          <div>
            <div class="fl">유형</div>
            <select id="ev-type" onchange="onTypeChange()">
              <option value="vacation">휴가</option>
              <option value="work">업무</option>
              <option value="trip">출장</option>
              <option value="meeting">회의</option>
              <option value="personal">개인</option>
            </select>
          </div>
        </div>
        <div class="sub-row" id="sub-row" style="margin-bottom:8px">
          <div class="fl">세부 유형</div>
          <select id="ev-sub" onchange="onSubChange()"></select>
          <div id="sub-custom" style="display:none;margin-top:5px">
            <input type="text" id="ev-sub-txt" placeholder="직접 입력">
          </div>
        </div>
        <div class="form-row full" style="margin-bottom:8px">
          <div><div class="fl">사업 (선택)</div><select id="ev-proj"></select></div>
        </div>
        <div class="toggle-row">
          <div class="toggle on" id="pub-toggle" onclick="this.classList.toggle('on')"></div>
          <span style="font-size:13px;color:var(--text2)">팀 캘린더에 공유</span>
        </div>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-primary" id="ev-submit-btn" style="flex:1" onclick="submitEvent()">추가</button>
          <button class="btn btn-secondary" id="ev-cancel-btn" style="display:none;" onclick="resetEventForm()">취소</button>
        </div>
      </div>

<script>
const TL = {vacation:'휴가',work:'업무',trip:'출장',meeting:'회의',personal:'개인'};
const TC = {vacation:'ev-vacation',work:'ev-work',trip:'ev-trip',meeting:'ev-meeting',personal:'ev-personal'};
const TT = {vacation:'tag-vacation',work:'tag-work',trip:'tag-trip',meeting:'tag-meeting',personal:'tag-personal'};
const TV = {vacation:'#1D9E75',work:'#378ADD',trip:'#EF9F27',meeting:'#533AB7',personal:'#888'};
const STATUS_TAG = {'할 일':'tag-todo','진행중':'tag-doing','완료':'tag-done'};

const PALETTE = [
  {color:'#378ADD',bg:'#E6F1FB'},{color:'#1D9E75',bg:'#E1F5EE'},
  {color:'#D85A30',bg:'#FAECE7'},{color:'#EF9F27',bg:'#FAEEDA'},
  {color:'#533AB7',bg:'#EEEDFE'},{color:'#993556',bg:'#FBEAF0'},
  {color:'#3B6D11',bg:'#EAF3DE'},{color:'#185FA5',bg:'#B5D4F4'},
  {color:'#E91E63',bg:'#FCE4EC'},{color:'#9C27B0',bg:'#F3E5F5'},
  {color:'#673AB7',bg:'#EDE7F6'},{color:'#3F51B5',bg:'#E8EAF6'},
  {color:'#03A9F4',bg:'#E1F5FE'},{color:'#00BCD4',bg:'#E0F7FA'},
  {color:'#009688',bg:'#E0F2F1'},{color:'#4CAF50',bg:'#E8F5E9'},
  {color:'#8BC34A',bg:'#F1F8E9'},{color:'#CDDC39',bg:'#F9FBE7'},
  {color:'#FFC107',bg:'#FFFDE7'},{color:'#FF9800',bg:'#FFF3E0'},
  {color:'#FF5722',bg:'#FBE9E7'},{color:'#795548',bg:'#EFEBE9'},
  {color:'#9E9E9E',bg:'#FAFAFA'},{color:'#607D8B',bg:'#ECEFF1'}
];

const SK = 'tc2_';
function ls(k,v){
  if(v===undefined) return localStorage.getItem(SK+k);
  if(v===null) localStorage.removeItem(SK+k);
  else localStorage.setItem(SK+k,v);
}
function lsJ(k,v){
  if(v===undefined){
    const s = ls(k);
    return s ? JSON.parse(s) : null;
  }
  ls(k, JSON.stringify(v));
}

const today = new Date();
const todayStr = fmtDateFull(today);

let apiUrl = ls('apiUrl') || '';
let selfId = ls('selfId') || '';
let members = [];
let projects = [];
let events = [];
let tasks = [];
let assigns = [];
let todos = [];
let hiddenMb = new Set();
let selProj = 'all';
let vm = 'cal';
let ovMode = 'board';
let pFilter = 'all';
let hidePast = true;
let lastFetchNum = null;
let editingEventId = null;
let curY = today.getFullYear();
let curM = today.getMonth();

const mb = id => members.find(m=>String(m.id)===String(id));
const pj = id => projects.find(p=>String(p.id)===String(id));
const self = () => mb(selfId) || members[0] || {id:'',name:'—',color:'#888',bg:'#eee',role:''};
const ini = n => (n||'?').slice(0,2);

function lighten(hex){
  const hit = PALETTE.find(p=>p.color===hex);
  return hit ? hit.bg : '#F1EFE8';
}

function parseDateSafely(dStr){
  if(!dStr) return new Date(0);
  let str = String(dStr).trim().replace(/\(.*\)/g,'').trim();
  if(/^\d{4}-\d{2}-\d{2}$/.test(str)) return new Date(str+'T00:00:00');
  const dt = new Date(str);
  if(!isNaN(dt.getTime())) return dt;
  const match = str.match(/(20\d{2})[-/년 .]*(\d{1,2})[-/월 .]*(\d{1,2})/);
  if(match) return new Date(match[1], match[2]-1, match[3]);
  return new Date(0);
}
function fmtDate(d){
  if(!d) return '';
  const dt = parseDateSafely(d);
  if(isNaN(dt.getTime())) return d;
  return `${dt.getMonth()+1}/${dt.getDate()}`;
}
function fmtDateFull(d){
  if(!d) return '';
  const dt = parseDateSafely(d);
  if(isNaN(dt.getTime())) return d;
  return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
}
function daysBetween(a,b){
  const d1 = parseDateSafely(a); d1.setHours(0,0,0,0);
  const d2 = parseDateSafely(b); d2.setHours(0,0,0,0);
  return Math.round((d2-d1)/86400000);
}
function inDay(e,y,m,d){
  const s = parseDateSafely(e.start); s.setHours(0,0,0,0);
  const en = parseDateSafely(e.end || e.start); en.setHours(23,59,59,999);
  const day = new Date(y,m,d);
  return day >= s && day <= en;
}
function isPast(dateStr){
  if(!dateStr) return false;
  const target = new Date(today.getTime() - 7*24*60*60*1000);
  const en = parseDateSafely(dateStr);
  return en < target;
}
function isOverdue(t){
  if(!t.end || t.status==='완료') return false;
  const en = parseDateSafely(t.end); en.setHours(23,59,59,999);
  return en < new Date();
}

function showToast(m){
  const t = document.getElementById('toast');
  t.textContent = m;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2000);
}
function showStatus(m, type){
  const s = document.getElementById('status-bar');
  s.style.display = 'flex';
  s.className = 'status-bar sb-' + type;
  s.innerHTML = type==='loading' ? `<div class="spinner"></div>${m}` : m;
}
function hideStatus(){ document.getElementById('status-bar').style.display='none'; }
function openModal(t){
  document.getElementById('modal-title').textContent = t;
  document.getElementById('modal').classList.add('show');
}
function closeModal(){ document.getElementById('modal').classList.remove('show'); }
document.getElementById('modal').addEventListener('click', function(e){
  if(e.target === this) closeModal();
});

function toggleSidebar(force){
  const sb = document.querySelector('.sidebar');
  const ov = document.getElementById('sidebar-overlay');
  if(typeof force === 'boolean'){
    sb.classList.toggle('show', force);
    ov.classList.toggle('show', force);
  }else{
    sb.classList.toggle('show');
    ov.classList.toggle('show');
  }
}

async function apiFetch(params){
  if(!apiUrl) throw new Error('no_api');
  const url = apiUrl + '?' + new URLSearchParams(params);
  const r = await fetch(url);
  if(!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}
async function apiPost(params){
  if(!apiUrl) throw new Error('no_api');
  const url = apiUrl + '?' + new URLSearchParams(params);
  const r = await fetch(url);
  if(!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}
async function apiSave(body, onSuccess){
  if(!apiUrl){
    if(onSuccess) onSuccess();
    persistLocal();
    refreshAll();
    return true;
  }
  try{
    const r = await apiPost(body);
    if(r && r.error) throw new Error(r.error);
    await loadAll(false);
    if(onSuccess) onSuccess();
    return true;
  }catch(e){
    showToast('저장 실패: ' + e.message);
    return false;
  }
}

function persistLocal(){
  lsJ('members_local', members);
  lsJ('projects_local', projects);
  lsJ('events_local', events);
  lsJ('tasks_local', tasks);
  lsJ('assigns_local', assigns);
  lsJ('todos_local', todos);
}

function loadDemoIfNeeded(){
  const lm = lsJ('members_local');
  const lp = lsJ('projects_local');
  const le = lsJ('events_local');
  const lt = lsJ('tasks_local');
  const la = lsJ('assigns_local');
  const ltodo = lsJ('todos_local');

  if(lm && lp){
    members = lm || [];
    projects = lp || [];
    events = le || [];
    tasks = lt || [];
    assigns = la || [];
    todos = ltodo || [];
  }else{
    members = [
      {id:'mb_1',name:'김민준',color:'#378ADD',bg:'#E6F1FB',role:'팀장'},
      {id:'mb_2',name:'반세영',color:'#1D9E75',bg:'#E1F5EE',role:'연구원'}
    ];
    projects = [
      {id:'proj_1',name:'알파 프로젝트',color:'#3B6D11',status:'진행중',start:fmtDateFull(today),end:fmtDateFull(new Date(today.getTime()+14*86400000))}
    ];
    assigns = [
      {id:'as_1',memberId:'mb_1',projectId:'proj_1',role:'PM'},
      {id:'as_2',memberId:'mb_2',projectId:'proj_1',role:'연구'}
    ];
    tasks = [
      {id:'task_1',title:'착수보고 준비',project:'proj_1',assignee:'mb_2',start:fmtDateFull(today),end:fmtDateFull(new Date(today.getTime()+3*86400000)),status:'진행중',note:''}
    ];
    events = [
      {id:'ev_1',title:'주간회의',type:'meeting',subtype:'정기회의',start:fmtDateFull(today),end:fmtDateFull(today),who:'mb_1',project:'proj_1',public:true},
      {id:'ev_2',title:'자료검토',type:'work',subtype:'외근',start:fmtDateFull(today),end:fmtDateFull(today),who:'mb_2',project:'proj_1',public:true}
    ];
    todos = [];
    persistLocal();
  }
  if(!selfId && members.length){
    selfId = members[0].id;
    ls('selfId', selfId);
  }
}

async function loadAll(forceToast=false){
  if(!apiUrl){
    loadDemoIfNeeded();
    lastFetchNum = curY*12 + curM;
    refreshAll();
    if(forceToast) showToast('로컬 데이터 불러오기 완료');
    return;
  }

  showStatus('데이터 불러오는 중...', 'loading');
  try{
    const d1 = new Date(curY, curM - 3, 1);
    const d2 = new Date(curY, curM + 4, 0);
    const d = await apiFetch({
      action:'all',
      startDate: fmtDateFull(d1),
      endDate: fmtDateFull(d2)
    });

    events = d.events || [];
    members = d.members || [];
    projects = d.projects || [];
    tasks = d.tasks || [];
    assigns = d.assigns || [];
    todos = d.todos || [];

    if(!selfId && members.length){
      selfId = members[0].id;
      ls('selfId', selfId);
    }

    lastFetchNum = curY*12 + curM;
    hideStatus();
    refreshAll();
    if(forceToast) showToast('최신 데이터 동기화 완료');
  }catch(e){
    showStatus('불러오기 실패: ' + e.message, 'error');
    loadDemoIfNeeded();
    lastFetchNum = curY*12 + curM;
    refreshAll();
  }
}

function refreshAll(){
  buildSidebar();
  refreshProjSelect();
  renderCal();
  renderOverview();
  renderMembersPage();
  renderPersonalList();
  renderTodos();
  renderMemberManageList();
  renderProjectManageList();
  updateSelfUI();
}

function updateSelfUI(){
  const s = self();
  const av = document.getElementById('self-av');
  av.textContent = ini(s.name);
  av.style.background = lighten(s.color);
  av.style.color = s.color;
  document.getElementById('self-name').textContent = s.name;
}

function buildSidebar(){
  const mc = document.getElementById('sb-members');
  mc.innerHTML = '';
  members.forEach(m=>{
    const bg = lighten(m.color);
    const d = document.createElement('div');
    d.className = 'mb-chip' + (hiddenMb.has(m.id) ? ' off' : '');
    d.onclick = () => {
      if(hiddenMb.has(m.id)) hiddenMb.delete(m.id);
      else hiddenMb.add(m.id);
      buildSidebar();
      renderCal();
      renderOverview();
      renderMembersPage();
    };
    d.innerHTML = `<div class="av" style="background:${bg};color:${m.color}">${ini(m.name)}</div><span class="mb-chip-name">${m.name}</span>`;
    mc.appendChild(d);
  });

  const pc = document.getElementById('sb-projects');
  pc.innerHTML = `<div class="proj-chip${selProj==='all'?' active':''}" onclick="toggleProj('all')"><div class="dot" style="background:var(--text2)"></div>전체</div>`;
  projects.forEach(p=>{
    const d = document.createElement('div');
    d.className = 'proj-chip' + (selProj===p.id ? ' active' : '');
    d.innerHTML = `<div class="dot" style="background:${p.color}"></div>${p.name}`;
    d.onclick = ()=>toggleProj(p.id);
    pc.appendChild(d);
  });
}

function refreshProjSelect(){
  const sel = document.getElementById('ev-proj');
  if(!sel) return;
  const cur = sel.value;
  sel.innerHTML = '<option value="">— 없음</option>';
  projects.forEach(p=>{
    sel.innerHTML += `<option value="${p.id}" ${cur===p.id?'selected':''}>${p.name}</option>`;
  });
}

function getVisEv(){
  return events.filter(e=>{
    if(!e.public && e.who !== selfId) return false;
    if(hiddenMb.size && e.who !== 'all' && hiddenMb.has(e.who)) return false;
    if(selProj !== 'all' && e.project !== selProj) return false;
    return true;
  });
}

function renderCal(){
  document.getElementById('month-title').textContent = `${curY}년 ${curM+1}월`;
  if(vm === 'cal') renderCalGrid();
  else renderCalList();
}
function renderCalGrid(){
  const fd = new Date(curY,curM,1).getDay();
  const ld = new Date(curY,curM+1,0).getDate();
  const vis = getVisEv();
  let h = '<div class="cal-grid">';
  ['일','월','화','수','목','금','토'].forEach(d=>h += `<div class="cal-hdr">${d}</div>`);
  for(let i=0;i<fd;i++) h += '<div class="cal-day empty"></div>';

  for(let d=1;d<=ld;d++){
    const dow = (fd + d - 1) % 7;
    const isT = d===today.getDate() && curM===today.getMonth() && curY===today.getFullYear();
    const de = vis.filter(e=>inDay(e,curY,curM,d));
    h += `<div class="cal-day${isT?' today':''} ${dow===0?'sun':dow===6?'sat':''}" onclick="dayClick(${d})">`;
    h += `<div class="dn">${d}</div>`;
    de.slice(0,3).forEach(e=>{
      const m2 = mb(e.who);
      const nm = e.who==='all' ? '전체' : (m2 ? m2.name : '');
      const label = e.subtype ? `${nm} ${e.title} [${e.subtype}]` : `${nm} ${e.title}`;
      h += `<div class="ep ${TC[e.type]||''}" onclick="event.stopPropagation();showEv('${e.id}')" title="${label}">${label}</div>`;
    });
    if(de.length>3) h += `<div class="more-p">+${de.length-3}</div>`;
    h += '</div>';
  }
  h += '</div>';
  document.getElementById('cal-container').innerHTML = h;
}
function renderCalList(){
  const vis = getVisEv().sort((a,b)=>parseDateSafely(a.start)-parseDateSafely(b.start));
  if(!vis.length){
    document.getElementById('cal-container').innerHTML = '<div class="empty">표시할 일정이 없습니다</div>';
    return;
  }
  let h = '<div class="list-wrap">';
  vis.forEach(e=>{
    const m2 = mb(e.who);
    const p = pj(e.project || '');
    const bgCol = TV[e.type] || '#888';
    h += `<div class="li" onclick="showEv('${e.id}')">
      <div class="li-dot" style="background:${bgCol}"></div>
      <div class="li-info">
        <div class="li-title">${e.title}</div>
        <div class="li-meta">${fmtDateFull(e.start)}${e.end!==e.start?' ~ '+fmtDateFull(e.end):''} · ${e.who==='all'?'전체팀':(m2?m2.name:e.who)}</div>
        <div class="tag-row">
          <span class="tag ${TT[e.type]||''}">${TL[e.type]||e.type}</span>
          ${e.subtype?`<span class="tag tag-sub">${e.subtype}</span>`:''}
          ${p?`<span class="tag tag-project">${p.name}</span>`:''}
        </div>
      </div>
    </div>`;
  });
  h += '</div>';
  document.getElementById('cal-container').innerHTML = h;
}

function renderOverview(){
  if(ovMode==='board') renderBoard();
  else renderGantt();
}
function renderBoard(){
  const vp = projects.filter(p=>selProj==='all' || p.id===selProj);
  if(!vp.length){
    document.getElementById('overview-container').innerHTML = '<div class="empty">사업이 없습니다</div>';
    return;
  }
  let h = '<div class="overview-grid">';
  vp.forEach(p=>{
    const projAssigns = assigns.filter(a=>a.projectId===p.id && !hiddenMb.has(a.memberId));
    const projTasks = tasks.filter(t=>
      t.project===p.id &&
      !hiddenMb.has(t.assignee) &&
      (!hidePast || !isPast(t.end) || t.status!=='완료')
    );
    const projEvents = events.filter(e=>
      e.project===p.id &&
      ['work','meeting','trip'].includes(e.type) &&
      !hiddenMb.has(e.who) &&
      (!hidePast || !isPast(e.end))
    );

    const memberTags = projAssigns.map(a=>{
      const m2 = mb(a.memberId);
      if(!m2) return '';
      return `<span class="member-tag"><div class="av" style="width:16px;height:16px;font-size:8px;background:${lighten(m2.color)};color:${m2.color}">${ini(m2.name)}</div>${m2.name}${a.role?` <span style="color:var(--text3);font-size:10px">${a.role}</span>`:''}</span>`;
    }).join('');

    const taskRows = projTasks.map(t=>{
      const a = mb(t.assignee);
      const isOd = isOverdue(t);
      return `<div class="task-row">
        <div class="task-assignee">
          ${a ? `<div class="av" style="width:18px;height:18px;font-size:8px;background:${lighten(a.color)};color:${a.color}">${ini(a.name)}</div><span style="font-size:12px">${a.name}</span>` : `<span style="color:var(--text3);font-size:12px">미배정</span>`}
        </div>
        <div class="task-title" style="cursor:pointer;${isOd?'color:#D85A30;font-weight:600;':''}" onclick="showTask('${t.id}')">${isOd?'[지연] ':''}${t.title}</div>
        <span class="tag ${STATUS_TAG[t.status]||'tag-sub'}" style="font-size:10px">${t.status}</span>
        <div class="task-dates" style="${isOd?'color:#D85A30;font-weight:600;':''}">${fmtDate(t.start)}~${fmtDate(t.end)}</div>
      </div>`;
    }).join('');

    const eventRows = projEvents.map(e=>{
      const a = mb(e.who);
      const sub = e.subtype ? ` [${e.subtype}]` : '';
      return `<div class="task-row">
        <div class="task-assignee">
          ${a ? `<div class="av" style="width:18px;height:18px;font-size:8px;background:${lighten(a.color)};color:${a.color}">${ini(a.name)}</div><span style="font-size:12px">${a.name}</span>` : (e.who==='all' ? '<span style="font-size:12px">전체</span>' : '<span style="font-size:12px">미상</span>')}

function renderGantt(){
  const mappedEvents = events.filter(e=>e.project && ['work','meeting','trip'].includes(e.type))
    .map(e=>({
      id:e.id,
      title:e.title + (e.subtype ? ` [${e.subtype}]` : ''),
      project:e.project,
      assignee:e.who,
      start:e.start,
      end:e.end,
      isEvent:true
    }));

  const allTasks = [...tasks, ...mappedEvents].filter(t=>{
    if(t.assignee !== 'all' && hiddenMb.has(t.assignee)) return false;
    if(selProj !== 'all' && t.project !== selProj) return false;
    if(hidePast && isPast(t.end) && ((!t.isEvent && t.status==='완료') || t.isEvent)) return false;
    return t.start && t.end;
  });

  if(!allTasks.length){
    document.getElementById('overview-container').innerHTML = '<div class="empty">업무나 일정이 없습니다</div>';
    return;
  }

  const dates = allTasks.flatMap(t=>[parseDateSafely(t.start), parseDateSafely(t.end)]);
  let minD = new Date(Math.min(...dates));
  let maxD = new Date(Math.max(...dates));
  minD = new Date(minD.getTime() - 2*86400000);
  maxD = new Date(maxD.getTime() + 3*86400000);
  const totalDays = daysBetween(fmtDateFull(minD), fmtDateFull(maxD)) + 1;

  const pct = (d)=>{
    const diff = daysBetween(fmtDateFull(minD), fmtDateFull(parseDateSafely(d)));
    return Math.max(0, Math.min(100, (diff/totalDays)*100));
  };

  let h = '<div class="gantt-wrap"><div class="gantt">';
  h += '<div class="gantt-header"><div class="gantt-label-col"></div><div class="gantt-timeline">';
  for(let i=0;i<totalDays;i++){
    const dt = new Date(minD.getTime()+i*86400000);
    const show = dt.getDate()===1 || i===0 || i%7===0;
    h += `<div class="gantt-day-hdr" style="width:${100/totalDays}%">${show ? `${dt.getMonth()+1}/${dt.getDate()}` : ''}</div>`;
  }
  h += '</div></div>';

  projects.filter(p=>selProj==='all' || p.id===selProj).forEach(p=>{
    const pt = allTasks.filter(t=>t.project===p.id);
    if(!pt.length) return;

    h += `<div class="gantt-row"><div class="gantt-label" style="font-weight:600;color:${p.color}">${p.name}</div><div class="gantt-bar-area" style="border-top:.5px solid var(--border)"></div></div>`;

    pt.forEach(t=>{
      const a = mb(t.assignee);
      const isOd = !t.isEvent && isOverdue(t);
      const left = pct(t.start).toFixed(2) + '%';
      const width = (pct(t.end)-pct(t.start)+100/totalDays).toFixed(2) + '%';
      h += `<div class="gantt-row">
        <div class="gantt-label">
          ${a ? `<div class="av" style="width:16px;height:16px;font-size:8px;background:${lighten(a.color)};color:${a.color}">${ini(a.name)}</div>` : ''}
          <span class="gantt-label-name" style="${isOd?'color:#D85A30;font-weight:600;':''}">${isOd?'[지연] ':''}${t.title}</span>
        </div>
        <div class="gantt-bar-area">
          <div class="gantt-bar" style="left:${left};width:${width};background:${isOd?'#D85A30':p.color};opacity:${t.isEvent?0.7:1};" onclick="${t.isEvent ? `showEv('${t.id}')` : `showTask('${t.id}')`}" title="${t.title}">${t.title}</div>
        </div>
      </div>`;
    });
  });

  h += '</div></div>';
  document.getElementById('overview-container').innerHTML = h;
}

function renderTodos(){
  const mustList = document.getElementById('todo-must-list');
  const shouldList = document.getElementById('todo-should-list');
  if(!mustList || !shouldList) return;

  let mh = '', sh = '';
  const myTodos = todos.filter(t=>String(t.who)===String(selfId));

  myTodos.forEach(t=>{
    const isDone = t.done === true || t.done === 'TRUE';
    const isOld = !isDone && t.date && t.date < todayStr;
    const warn = (t.type==='must' && isOld) ? `<span style="color:#D85A30;font-weight:600;">[이월]</span> ` : '';
    const html = `<div class="todo-item ${isDone?'done':''}">
      <input type="checkbox" class="todo-cb" ${isDone?'checked':''} onchange="toggleTodo('${t.id}')">
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${t.text}">${warn}${t.text}</span>
      <button class="todo-del" onclick="deleteTodo('${t.id}')">✕</button>
    </div>`;
    if(t.type==='must') mh += html;
    else sh += html;
  });

  mustList.innerHTML = mh || '<div class="empty" style="padding:10px;font-size:11px;">핵심 할일이 없습니다</div>';
  shouldList.innerHTML = sh || '<div class="empty" style="padding:10px;font-size:11px;">서브 할일이 없습니다</div>';
}
window.addTodo = function(type, text){
  if(!text.trim()) return;
  const newTodo = {
    id:'todo_'+Date.now(),
    who:selfId,
    type,
    text:text.trim(),
    done:false,
    date:todayStr
  };
  apiSave({action:'addTodo', ...newTodo}, ()=>{
    todos.push(newTodo);
    document.getElementById('todo-'+type+'-in').value = '';
    persistLocal();
    renderTodos();
    showToast('추가됐어요');
  });
};
window.toggleTodo = function(id){
  const t = todos.find(x=>String(x.id)===String(id));
  if(!t) return;
  const nextDone = !(t.done===true || t.done==='TRUE');
  apiSave({action:'updateTodo', id:t.id, who:t.who, type:t.type, text:t.text, done:nextDone, date:t.date}, ()=>{
    t.done = nextDone;
    persistLocal();
    renderTodos();
  });
};
window.deleteTodo = function(id){
  if(!confirm('할 일을 삭제할까요?')) return;
  apiSave({action:'deleteTodo', id}, ()=>{
    todos = todos.filter(t=>String(t.id)!==String(id));
    persistLocal();
    renderTodos();
    showToast('삭제됐어요');
  });
};

function swatchHTML(selectedColor){
  return PALETTE.map((p,i)=>`<div onclick="selectSwatch(${i})" data-sw="${i}" style="width:22px;height:22px;border-radius:50%;background:${p.color};cursor:pointer;border:2px solid ${p.color===selectedColor?'var(--text)':'transparent'};transition:border-color .12s;flex-shrink:0"></div>`).join('');
}
function selectSwatch(i){
  document.querySelectorAll('[data-sw]').forEach((el,idx)=>{
    el.style.borderColor = idx===i ? getComputedStyle(document.documentElement).getPropertyValue('--text').trim() : 'transparent';
  });
}
function getSelectedPalette(){
  const swatches = document.querySelectorAll('[data-sw]');
  const activeColor = getComputedStyle(document.documentElement).getPropertyValue('--text').trim();
  for(let i=0;i<swatches.length;i++){
    if(swatches[i].style.borderColor===activeColor) return PALETTE[i];
  }
  for(let i=0;i<swatches.length;i++){
    const st = getComputedStyle(swatches[i]).borderColor;
    if(st && st !== 'rgba(0, 0, 0, 0)' && st !== 'transparent') return PALETTE[i];
  }
  return PALETTE[0];
}

  const end = document.getElementById('pf-end').value;

  const updated = {
    ...p,
    name,
    color:pal.color,
    status:document.getElementById('pf-status').value,
    start,
    end
  };

  apiSave({action:'updateProject', updated:JSON.stringify(updated)}, ()=>{
    Object.assign(p, updated);
    persistLocal();
    closeModal();
    refreshAll();
    showToast('수정됐어요');
  });
}
function deleteProject(id){
  const p = pj(id); if(!p) return;
  if(!confirm(`"${p.name}"을 삭제할까요?`)) return;
  apiSave({action:'deleteProject', id}, ()=>{
    projects = projects.filter(pr=>pr.id!==id);
    tasks = tasks.filter(t=>t.project!==id);
    assigns = assigns.filter(a=>a.projectId!==id);
    events.forEach(e=>{ if(e.project===id) e.project=''; });
    if(selProj===id) selProj='all';
    persistLocal();
    refreshAll();
    showToast(`${p.name} 삭제됐어요`);
  });
}

function openChangeSelf(){
  if(!members.length){
    showToast('먼저 팀원을 추가해주세요');
    return;
  }
  const opts = members.map(m=>`<option value="${m.id}" ${m.id===selfId?'selected':''}>${m.name}</option>`).join('');
  document.getElementById('modal-body').innerHTML = `<select id="self-sel" style="margin-bottom:14px">${opts}</select><button class="btn btn-primary" style="width:100%" onclick="changeSelf()">확인</button>`;
  openModal('계정 변경');
}
function changeSelf(){
  selfId = document.getElementById('self-sel').value;
  ls('selfId', selfId);
  closeModal();
  refreshAll();
}

function onTypeChange(){
  const t = document.getElementById('ev-type').value;
  const subRow = document.getElementById('sub-row');
  const subSel = document.getElementById('ev-sub');

  if(t==='work' || t==='vacation'){
    subRow.classList.add('show');
    if(t==='work'){
      subSel.innerHTML = `
        <option value="">— 없음</option>
        <option value="외근">외근</option>
        <option value="연수">연수</option>
        <option value="교육/세미나">교육/세미나</option>
        <option value="custom">직접 입력</option>
      `;
    }else{
      subSel.innerHTML = `
        <option value="연차">연차</option>
        <option value="오전반차">오전반차</option>
        <option value="오후반차">오후반차</option>
        <option value="custom">직접 입력</option>
      `;
    }
  }else{
    subRow.classList.remove('show');
    subSel.innerHTML = '';
  }
  onSubChange();
}
function onSubChange(){
  document.getElementById('sub-custom').style.display = document.getElementById('ev-sub').value === 'custom' ? 'block' : 'none';
}
function resetEventForm(){
  editingEventId = null;
  ['ev-title','ev-start','ev-end','ev-sub-txt'].forEach(id=>{
    const el = document.getElementById(id);
    if(el) el.value = '';
  });
  document.getElementById('ev-type').value = 'vacation';
  document.getElementById('ev-proj').value = '';
  document.getElementById('pub-toggle').classList.add('on');
  onTypeChange();
  document.getElementById('ev-submit-btn').textContent = '추가';
  document.getElementById('ev-cancel-btn').style.display = 'none';
}
function openEditEvent(id){
  const e = events.find(ev=>ev.id===id);
  if(!e) return;

  editingEventId = id;
  document.getElementById('ev-title').value = e.title;
  document.getElementById('ev-start').value = fmtDateFull(e.start);
  document.getElementById('ev-end').value = fmtDateFull(e.end);
  document.getElementById('ev-type').value = e.type;
  document.getElementById('ev-proj').value = e.project || '';
  document.getElementById('pub-toggle').classList.toggle('on', !!e.public);
  onTypeChange();

  if(document.getElementById('ev-sub')){
    const hasOption = [...document.getElementById('ev-sub').options].some(opt=>opt.value === (e.subtype||''));
    if(hasOption) document.getElementById('ev-sub').value = e.subtype || '';
    else if(e.subtype){
      document.getElementById('ev-sub').value = 'custom';
      document.getElementById('ev-sub-txt').value = e.subtype;
      onSubChange();
    }
  }

  document.getElementById('ev-submit-btn').textContent = '수정 저장';
  document.getElementById('ev-cancel-btn').style.display = 'block';
  goPage('personal');
  window.scrollTo({top:0,behavior:'smooth'});
}
async function submitEvent(){
  const title = document.getElementById('ev-title').value.trim();
  const start = document.getElementById('ev-start').value;
  const type = document.getElementById('ev-type').value;
  if(!title || !start){
    showToast('제목과 시작일을 입력해주세요');
    return;
  }

  let subtype = '';
  if(type==='work' || type==='vacation'){
    const sv = document.getElementById('ev-sub').value;
    subtype = sv==='custom' ? document.getElementById('ev-sub-txt').value.trim() : sv;
  }

  const payload = {
    id: editingEventId || ('ev_' + Date.now()),
    title,
    type,
    subtype,
    start,
    end: document.getElementById('ev-end').value || start,
    who: selfId,
    project: document.getElementById('ev-proj').value,
    public: document.getElementById('pub-toggle').classList.contains('on')
  };

  const isEdit = !!editingEventId;

  apiSave({action:isEdit?'updateEvent':'addEvent', event:JSON.stringify(payload)}, ()=>{
    if(isEdit){
      const idx = events.findIndex(e=>e.id===payload.id);
      if(idx>=0) events[idx] = payload;
      else events.push(payload);
    }else{
      events.push(payload);
    }
    persistLocal();
    resetEventForm();
    refreshAll();
    showToast(isEdit ? '수정됐어요' : '추가됐어요');
  });
}
async function deleteEv(id){
  if(!confirm('일정을 삭제할까요?')) return;
  apiSave({action:'deleteEvent', id}, ()=>{
    events = events.filter(e=>e.id!==id);
    persistLocal();
    refreshAll();
    showToast('삭제됐어요');
  });
}

function showEv(id){
  const e = events.find(ev=>ev.id===id);
  if(!e) return;
  const p = pj(e.project || '');
  const isMine = e.who === selfId;
  let editBtnHtml = isMine ? `<div style="margin-top:16px;text-align:right;"><button class="btn btn-secondary btn-sm" onclick="closeModal(); openEditEvent('${e.id}')">내 일정 수정하기</button></div>` : '';
  document.getElementById('modal-body').innerHTML = `
    <div class="dr"><span class="dl">기간</span><span>${fmtDateFull(e.start)} ~ ${fmtDateFull(e.end)}</span></div>
    <div class="dr"><span class="dl">유형</span><span class="tag ${TT[e.type]||''}">${TL[e.type]||e.type}</span></div>
    ${e.subtype ? `<div class="dr"><span class="dl">세부</span><span>${e.subtype}</span></div>` : ''}
    ${p ? `<div class="dr"><span class="dl">사업</span><span>${p.name}</span></div>` : ''}
    <div class="dr"><span class="dl">공개</span><span>${e.public?'공유됨':'비공개'}</span></div>
    ${editBtnHtml}
  `;
  openModal(e.title);
}
function showTask(id){
  const t = tasks.find(tk=>tk.id===id);
  if(!t) return;
  const a = mb(t.assignee);
  document.getElementById('modal-body').innerHTML = `
    <div class="dr"><span class="dl">담당</span><span>${a?a.name:'미배정'}</span></div>
    <div class="dr"><span class="dl">기간</span><span>${fmtDateFull(t.start)} ~ ${fmtDateFull(t.end)}</span></div>
    <div class="dr"><span class="dl">상태</span><span class="tag ${STATUS_TAG[t.status]||'tag-sub'}">${t.status}</span></div>
    <div class="dr"><span class="dl">메모</span><span>${t.note || '-'}</span></div>
  `;
  openModal(t.title);
}
function dayClick(d){
  const vis = getVisEv().filter(e=>inDay(e,curY,curM,d));
  if(!vis.length) return;
  let h = '<div class="list-wrap">';
  vis.forEach(e=>{
    const bgCol = TV[e.type] || '#888';
    h += `<div class="li" style="padding:8px" onclick="closeModal();showEv('${e.id}')">
      <div class="li-dot" style="background:${bgCol}"></div>
      <div class="li-info">
        <div class="li-title" style="font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${e.title}${e.subtype?` [${e.subtype}]`:''}</div>
      </div>
    </div>`;
  });
  h += '</div>';
  document.getElementById('modal-body').innerHTML = h;
  openModal(`${curM+1}월 ${d}일 일정`);
}

function toggleHidePast(val){
  hidePast = val;
  renderOverview();
  renderMembersPage();
}
function toggleProj(id){
  selProj = selProj===id ? 'all' : id;
  buildSidebar();
  renderCal();
  renderOverview();
  renderMembersPage();
}
function changeMonth(dir){
  curM += dir;
  if(curM>11){ curM=0; curY++; }
  if(curM<0){ curM=11; curY--; }
  if(lastFetchNum===null || Math.abs((curY*12+curM)-lastFetchNum)>=2) loadAll();
  else renderCal();
}
function setVM(m){
  vm = m;
  ['cal','list'].forEach(k=>document.getElementById('vm-'+k).classList.toggle('active', k===m));
  renderCal();
}
function setOV(m){
  ovMode = m;
  ['board','gantt'].forEach(k=>document.getElementById('ov-'+k).classList.toggle('active', k===m));
  renderOverview();
}
function filterP(f){
  pFilter = f;
  ['all','public','private'].forEach(k=>document.getElementById('pf-'+k).classList.toggle('active', k===f));
  renderPersonalList();
}
async function saveApiUrl(){
  apiUrl = document.getElementById('api-url-input').value.trim();
  ls('apiUrl', apiUrl);
  document.getElementById('api-status').textContent = apiUrl ? '저장됨' : '';
  await loadAll(true);
}

function goPage(p){
  if(p!=='personal') resetEventForm();

  ['cal','overview','members','personal','todo','setup'].forEach(id=>{
    const pg = document.getElementById('page-'+id);
    if(pg) pg.classList.toggle('active', id===p);
    const nav = document.getElementById('nav-'+id);
    if(nav) nav.classList.toggle('active', id===p);
  });

  if(window.innerWidth<=680){
    toggleSidebar(false);
  }

  if(p==='personal') renderPersonalList();
  if(p==='overview') renderOverview();
  if(p==='members') renderMembersPage();
  if(p==='todo') renderTodos();
  if(p==='setup'){
    renderMemberManageList();
    renderProjectManageList();
  }
}

if(apiUrl) document.getElementById('api-url-input').value = apiUrl;
onTypeChange();
loadAll();
</script>
