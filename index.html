<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>팀 캘린더</title>
<style>
/* ── UI 및 색상 변수 ── */
:root {
  --bg: #ffffff; --bg2: #f7f7f5; --bg3: #f0efe9;
  --text: #1a1a1a; --text2: #6b6b6b; --text3: #a8a8a8;
  --border: rgba(0,0,0,0.09); --border2: rgba(0,0,0,0.16);
  --r: 10px; --r-sm: 6px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1c1c1c; --bg2: #242424; --bg3: #2a2a28;
    --text: #f0efe9; --text2: #9a9a94; --text3: #606060;
    --border: rgba(255,255,255,0.09); --border2: rgba(255,255,255,0.16);
  }
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; }

/* ── 레이아웃 ── */
.layout { display: flex; min-height: 100vh; }
.mobile-header { display: none; padding: 14px 20px; background: var(--bg); border-bottom: 0.5px solid var(--border); align-items: center; gap: 14px; position: sticky; top: 0; z-index: 100; }
.menu-btn { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--text); padding: 0; line-height: 1; }
.sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.38); z-index: 150; }
.sidebar-overlay.show { display: block; }
.sidebar { width: 220px; background: var(--bg); border-right: 0.5px solid var(--border); padding: 20px 14px; flex-shrink: 0; display: flex; flex-direction: column; gap: 20px; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
.main { flex: 1; padding: 24px; overflow: auto; min-width: 0; }

/* ── 타이포 및 공통 컴포넌트 ── */
.logo { font-size: 15px; font-weight: 700; padding: 0 6px; }
.logo-sub { font-size: 12px; color: var(--text3); margin-top: 2px; padding: 0 6px; }
.sb-label { font-size: 10px; font-weight: 700; color: var(--text3); letter-spacing: 0.07em; text-transform: uppercase; padding: 0 6px; margin-bottom: 6px; }
.sb-btn { display: flex; align-items: center; gap: 8px; width: 100%; padding: 7px 8px; border: none; background: none; color: var(--text2); font-size: 13px; border-radius: var(--r-sm); cursor: pointer; text-align: left; transition: all 0.12s; }
.sb-btn:hover { background: var(--bg2); color: var(--text); }
.sb-btn.active { background: var(--bg3); color: var(--text); font-weight: 500; }
.sb-btn .icon { font-size: 14px; width: 18px; text-align: center; }

.mb-chip, .proj-chip { display: flex; align-items: center; gap: 7px; padding: 5px 6px; border-radius: var(--r-sm); cursor: pointer; transition: background 0.12s; font-size: 13px; color: var(--text2); }
.mb-chip:hover, .proj-chip:hover { background: var(--bg2); }
.mb-chip.off { opacity: 0.35; }
.proj-chip.active { color: var(--text); font-weight: 500; }
.av { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; flex-shrink: 0; }
.dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

.page { display: none; }
.page.active { display: block; }
.page-header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
.page-title { font-size: 18px; font-weight: 700; }
.card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--r); padding: 18px; margin-bottom: 14px; }
.card-title { font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.05em; }

.btn { padding: 7px 14px; border-radius: var(--r-sm); font-size: 13px; cursor: pointer; border: none; font-family: inherit; transition: opacity 0.12s; }
.btn-primary { background: var(--text); color: var(--bg); }
.btn-primary:hover { opacity: 0.82; }
.btn-secondary { background: none; color: var(--text); border: 0.5px solid var(--border2); }
.btn-secondary:hover { background: var(--bg2); }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-danger-sm { padding: 3px 8px; background: none; color: #A32D2D; border: 0.5px solid #F09595; border-radius: var(--r-sm); font-size: 11px; cursor: pointer; font-family: inherit; }

.chip { padding: 4px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; border: 0.5px solid var(--border2); background: var(--bg); color: var(--text2); }
.chip.active { background: var(--text); color: var(--bg); border-color: var(--text); }
.empty { padding: 2rem; text-align: center; color: var(--text3); font-size: 13px; }

/* ── 폼 요소 ── */
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.form-row.full { grid-template-columns: 1fr; }
.fl { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
input, select, textarea { width: 100%; padding: 7px 10px; border: 0.5px solid var(--border2); border-radius: var(--r-sm); background: var(--bg); color: var(--text); font-size: 13px; font-family: inherit; }
input:focus, select:focus { outline: none; border-color: #378ADD; }
.toggle-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.toggle { width: 34px; height: 18px; background: var(--border2); border-radius: 9px; cursor: pointer; position: relative; transition: background 0.18s; flex-shrink: 0; }
.toggle.on { background: #1D9E75; }
.toggle::after { content: ''; position: absolute; width: 14px; height: 14px; background: #fff; border-radius: 50%; top: 2px; left: 2px; transition: left 0.18s; }
.toggle.on::after { left: 18px; }
.sub-row { display: none; }
.sub-row.show { display: block; }
.filter-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }

/* ── 태그 및 이벤트 색상 ── */
.tag { font-size: 11px; padding: 1px 7px; border-radius: 10px; font-weight: 500; white-space: nowrap; }
.ev-vacation, .tag-vacation { background: #E1F5EE !important; color: #0F6E56 !important; }
.ev-work, .tag-work { background: #E6F1FB !important; color: #185FA5 !important; }
.ev-trip, .tag-trip { background: #FAEEDA !important; color: #854F0B !important; }
.ev-meeting, .tag-meeting { background: #EEEDFE !important; color: #3C3489 !important; }
.ev-personal, .tag-personal { background: #F1EFE8 !important; color: #5F5E5A !important; }
.tag-project { background: #EAF3DE; color: #2E5A0E; }
.tag-sub, .tag-todo { background: #F1EFE8; color: #5F5E5A; }
.tag-doing { background: #E6F1FB; color: #185FA5; }
.tag-done { background: #E1F5EE; color: #0F6E56; }

/* ── 캘린더 그리드 ── */
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: var(--border); border: 0.5px solid var(--border); border-radius: var(--r); overflow: hidden; width: 100%; }
.cal-hdr { background: var(--bg2); padding: 7px 4px; text-align: center; font-size: 11px; color: var(--text2); font-weight: 600; }
.cal-day { background: var(--bg); min-height: 86px; padding: 5px; cursor: pointer; transition: background 0.1s; min-width: 0; }
.cal-day:hover { background: var(--bg2); }
.cal-day.empty { background: var(--bg2); cursor: default; pointer-events: none; }
.cal-day.today .dn { background: var(--text); color: var(--bg); border-radius: 50%; }
.dn { font-size: 12px; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; margin-bottom: 3px; }
.cal-day:nth-child(7n+1) .dn { color: #D85A30; }
.cal-day:nth-child(7n) .dn { color: #378ADD; }
.ep { font-size: 11px; padding: 2px 5px; border-radius: 3px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; max-width: 100%; font-weight: 500; }
.more-p { font-size: 10px; color: var(--text3); padding: 1px 3px; }

/* ── 리스트 뷰 ── */
.list-wrap { display: flex; flex-direction: column; gap: 7px; }
.li { display: flex; gap: 11px; padding: 11px 14px; background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--r); align-items: flex-start; cursor: pointer; transition: border-color 0.12s; }
.li:hover { border-color: var(--border2); }
.li-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
.li-info { flex: 1; min-width: 0; }
.li-title { font-size: 14px; font-weight: 500; margin-bottom: 3px; }
.li-meta { font-size: 12px; color: var(--text2); }
.tag-row { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }

/* ── 사업 현황 & 멤버 현황 ── */
.overview-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
@media(max-width:900px){ .overview-grid { grid-template-columns: 1fr; } }
.proj-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--r); overflow: hidden; }
.proj-card-header { padding: 12px 16px; display: flex; align-items: center; gap: 10px; border-bottom: 0.5px solid var(--border); }
.proj-color-bar { width: 4px; height: 36px; border-radius: 2px; flex-shrink: 0; }
.proj-card-title { font-size: 14px; font-weight: 600; }
.proj-card-sub { font-size: 12px; color: var(--text2); margin-top: 1px; }
.proj-card-body { padding: 12px 16px; }
.member-tag { display: inline-flex; align-items: center; gap: 5px; padding: 3px 8px; border-radius: 20px; font-size: 12px; margin: 2px; border: 0.5px solid var(--border); }
.task-row { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 0.5px solid var(--border); font-size: 13px; }
.task-row:last-child { border-bottom: none; }
.task-assignee { display: flex; align-items: center; gap: 5px; flex-shrink: 0; min-width: 72px; }
.task-title { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer; }
.task-dates { font-size: 11px; color: var(--text2); flex-shrink: 0; white-space: nowrap; }

.member-overview { display: flex; flex-direction: column; gap: 10px; }
.member-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--r); overflow: hidden; }
.member-card-header { padding: 12px 16px; display: flex; align-items: center; gap: 10px; border-bottom: 0.5px solid var(--border); }
.member-card-info { flex: 1; }
.member-card-name { font-size: 14px; font-weight: 600; }
.member-card-role { font-size: 12px; color: var(--text2); }
.member-card-body { padding: 12px 16px; }
.proj-row { display: flex; align-items: flex-start; gap: 10px; padding: 6px 0; border-bottom: 0.5px solid var(--border); font-size: 13px; }
.proj-row:last-child { border-bottom: none; }
.proj-row-name { min-width: 100px; font-weight: 500; display: flex; align-items: center; gap: 6px; }
.proj-tasks { flex: 1; display: flex; flex-wrap: wrap; gap: 4px; }
.mini-task { font-size: 11px; padding: 2px 8px; border-radius: 10px; border: 0.5px solid var(--border2); background: var(--bg2); color: var(--text2); white-space: nowrap; cursor: pointer; }
.mini-task.doing { background: #E6F1FB; color: #185FA5; border-color: #B5D4F4; }
.mini-task.done { background: #E1F5EE; color: #0F6E56; border-color: #9FE1CB; text-decoration: line-through; opacity: 0.7; }
.mini-task.overdue { background: #FAECE7; color: #D85A30; border-color: #F09595; font-weight: 600; }

/* ── 간트 차트 ── */
.gantt-wrap { overflow-x: auto; }
.gantt { min-width: 700px; }
.gantt-header { display: flex; margin-bottom: 2px; }
.gantt-label-col { width: 200px; flex-shrink: 0; }
.gantt-timeline { flex: 1; display: flex; }
.gantt-day-hdr { text-align: center; font-size: 10px; color: var(--text3); border-left: 0.5px solid var(--border); padding: 3px 0; }
.gantt-row { display: flex; align-items: center; margin-bottom: 4px; }
.gantt-label { width: 200px; flex-shrink: 0; font-size: 12px; padding: 0 8px 0 0; display: flex; align-items: center; gap: 6px; overflow: hidden; }
.gantt-label-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.gantt-bar-area { flex: 1; position: relative; height: 22px; }
.gantt-bg-day { position: absolute; top: 0; bottom: 0; border-left: 0.5px solid var(--border); }
.gantt-bar { position: absolute; top: 2px; bottom: 2px; border-radius: 3px; cursor: pointer; transition: opacity 0.12s; display: flex; align-items: center; padding: 0 6px; font-size: 10px; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 4px; }
.gantt-bar:hover { opacity: 0.82; }

/* ── 투두 리스트 ── */
.todo-item { display: flex; align-items: center; gap: 8px; font-size: 13px; padding: 6px 0; color: var(--text); border-bottom: 0.5px solid var(--border2); }
.todo-item:last-child { border-bottom: none; }
.todo-item.done { text-decoration: line-through; color: var(--text3); }
.todo-cb { width: 16px; height: 16px; cursor: pointer; }
.todo-del { margin-left: auto; cursor: pointer; color: var(--text3); background: none; border: none; font-size: 14px; padding: 0 4px; }
.todo-del:hover { color: #A32D2D; }

/* ── 모달 및 기타 ── */
.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.38); z-index: 200; align-items: center; justify-content: center; }
.modal-bg.show { display: flex; }
.modal { background: var(--bg); border-radius: var(--r); padding: 22px; width: 400px; max-width: 94vw; border: 0.5px solid var(--border2); max-height: 88vh; overflow-y: auto; }
.modal-hdr { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 16px; }
.modal-title { font-size: 15px; font-weight: 700; }
.modal-close { border: none; background: none; cursor: pointer; color: var(--text2); font-size: 18px; line-height: 1; }
.dr { display: flex; gap: 10px; margin-bottom: 9px; font-size: 13px; }
.dl { color: var(--text2); min-width: 52px; flex-shrink: 0; }

.toast { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%); background: var(--text); color: var(--bg); padding: 8px 22px; border-radius: 20px; font-size: 13px; opacity: 0; transition: opacity 0.2s; z-index: 300; pointer-events: none; white-space: nowrap; }
.toast.show { opacity: 1; }
.status-bar { padding: 10px 14px; border-radius: var(--r-sm); font-size: 13px; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.sb-loading { background: #E6F1FB; color: #185FA5; }
.sb-error { background: #FCEBEB; color: #A32D2D; }
.spinner { width: 13px; height: 13px; border: 2px solid currentColor; border-top-color: transparent; border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
@keyframes spin { to { transform: rotate(360deg); } }
.legend { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 14px; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text2); }

@media(max-width:680px) {
  .sidebar { position: fixed; left: -260px; z-index: 200; width: 240px; transition: left 0.25s ease; box-shadow: 2px 0 10px rgba(0,0,0,0.1); }
  .sidebar.show { left: 0; }
  .main { padding: 0; }
  .page { padding: 16px; }
  .mobile-header { display: flex; }
}
</style>
</head>
<body>
<div class="layout">
<div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar(false)"></div>
<div class="sidebar">
  <div>
    <div class="logo">캘린더</div>
    <div class="logo-sub">해외컨설팅</div>
  </div>
  <div>
    <div class="sb-label">메뉴</div>
    <button class="sb-btn active" id="nav-cal" onclick="goPage('cal')"><span class="icon">📅</span>캘린더</button>
    <button class="sb-btn" id="nav-overview" onclick="goPage('overview')"><span class="icon">📊</span>사업 현황</button>
    <button class="sb-btn" id="nav-members" onclick="goPage('members')"><span class="icon">👥</span>멤버 현황</button>
    <button class="sb-btn" id="nav-personal" onclick="goPage('personal')"><span class="icon">👤</span>내 일정</button>
    <button class="sb-btn" id="nav-todo" onclick="goPage('todo')"><span class="icon">✅</span>할일</button>
    <button class="sb-btn" id="nav-setup" onclick="goPage('setup')"><span class="icon">⚙️</span>설정</button>
  </div>
  <div>
    <div class="sb-label">멤버 필터</div>
    <div id="sb-members"></div>
  </div>
  <div>
    <div class="sb-label">사업 필터</div>
    <div id="sb-projects"></div>
  </div>
  
  <div style="margin-top:auto; border-top:0.5px solid var(--border); padding-top:12px;">
    <div class="sb-label" style="margin-bottom:5px">내 계정</div>
    <div style="display:flex; align-items:center; gap:7px; padding:5px 6px; cursor:pointer; border-radius:var(--r-sm)" onclick="openChangeSelf()">
      <div class="av" id="self-av"></div>
      <span style="font-size:13px" id="self-name">—</span>
    </div>
  </div>
</div>

<div class="main">
<div class="mobile-header">
  <button class="menu-btn" onclick="toggleSidebar(true)">☰</button>
  <div style="font-weight:700; font-size:16px">캘린더</div>
</div>
<div id="status-bar" style="display:none"></div>

<div id="page-cal" class="page active">
  <div class="page-header">
    <button class="btn btn-secondary btn-sm" onclick="changeMonth(-1)">◀</button>
    <span class="page-title" id="month-title"></span>
    <button class="btn btn-secondary btn-sm" onclick="changeMonth(1)">▶</button>
    <div style="margin-left:auto; display:flex; gap:6px;">
      <button class="chip active" id="vm-cal" onclick="setVM('cal')">달력</button>
      <button class="chip" id="vm-list" onclick="setVM('list')">목록</button>
      <button class="btn btn-secondary btn-sm" onclick="loadAll(true)">↻ 새로고침</button>
    </div>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="dot" style="background:#1D9E75"></div>휴가</div>
    <div class="legend-item"><div class="dot" style="background:#378ADD"></div>업무</div>
    <div class="legend-item"><div class="dot" style="background:#EF9F27"></div>출장</div>
    <div class="legend-item"><div class="dot" style="background:#533AB7"></div>회의</div>
  </div>
  <div id="cal-container"></div>
</div>

<div id="page-overview" class="page">
  <div class="page-header">
    <span class="page-title">사업 현황</span>
    <div style="margin-left:auto; display:flex; gap:6px; align-items:center;">
      <label style="font-size:12px; color:var(--text2); display:flex; align-items:center; gap:4px; cursor:pointer; margin-right:8px;">
        <input type="checkbox" id="ov-hide-past" onchange="toggleHidePast(this.checked)" checked> 과거 숨기기
      </label>
      <button class="chip active" id="ov-board" onclick="setOV('board')">보드</button>
      <button class="chip" id="ov-gantt" onclick="setOV('gantt')">간트</button>
    </div>
  </div>
  <div id="overview-container"></div>
</div>

<div id="page-members" class="page">
  <div class="page-header">
    <span class="page-title">멤버 현황</span>
    <div style="margin-left:auto; display:flex; gap:6px; align-items:center;">
      <label style="font-size:12px; color:var(--text2); display:flex; align-items:center; gap:4px; cursor:pointer;">
        <input type="checkbox" id="mb-hide-past" onchange="toggleHidePast(this.checked)" checked> 과거 숨기기
      </label>
    </div>
  </div>
  <div id="members-container"></div>
</div>

<div id="page-personal" class="page">
  <div class="page-header"><span class="page-title">내 일정</span></div>
  <div class="card">
    <div class="card-title">일정 추가/수정</div>
    <div class="form-row full"><input type="text" id="ev-title" placeholder="일정 제목"></div>
    <div class="form-row">
      <div><div class="fl">시작일</div><input type="date" id="ev-start"></div>
      <div><div class="fl">종료일</div><input type="date" id="ev-end"></div>
    </div>
    <div class="form-row full">
      <div><div class="fl">유형</div><select id="ev-type" onchange="onTypeChange()">
        <option value="vacation">휴가</option><option value="work">업무</option><option value="trip">출장</option><option value="meeting">회의</option><option value="personal">개인</option>
      </select></div>
    </div>
    <div class="sub-row" id="sub-row">
      <div class="fl">세부 유형</div><select id="ev-sub" onchange="onSubChange()"></select>
      <div id="sub-custom" style="display:none; margin-top:5px;"><input type="text" id="ev-sub-txt" placeholder="직접 입력"></div>
    </div>
    <div class="form-row full"><div><div class="fl">사업 (선택)</div><select id="ev-proj"></select></div></div>
    <div class="toggle-row"><div class="toggle on" id="pub-toggle" onclick="this.classList.toggle('on')"></div><span style="font-size:13px; color:var(--text2);">팀 캘린더에 공유</span></div>
    <div style="display:flex; gap:8px;">
      <button class="btn btn-primary" id="ev-submit-btn" style="flex:1" onclick="submitEvent()">추가</button>
      <button class="btn btn-secondary" id="ev-cancel-btn" style="display:none;" onclick="resetEventForm()">취소</button>
    </div>
  </div>

      <div id="todo-should-list" style="overflow-y:auto; margin-top:10px; display:flex; flex-direction:column;"></div>

  <div class="page-header"><span class="page-title">설정</span></div>
  <div class="card">
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;">

    </div>
    <div id="modal-body"></div>

<div class="toast" id="toast"></div>

<script>
// ==========================================
// 1. 전역 상수 및 상태 변수 정의
// ==========================================
const TL = { vacation: '휴가', work: '업무', trip: '출장', meeting: '회의', personal: '개인' };
const TC = { vacation: 'ev-vacation', work: 'ev-work', trip: 'ev-trip', meeting: 'ev-meeting', personal: 'ev-personal' };
const TT = { vacation: 'tag-vacation', work: 'tag-work', trip: 'tag-trip', meeting: 'tag-meeting', personal: 'tag-personal' };
const TV = { vacation: '#1D9E75', work: '#378ADD', trip: '#EF9F27', meeting: '#533AB7', personal: '#888' };
const STATUS_TAG = { '할 일': 'tag-todo', '진행중': 'tag-doing', '완료': 'tag-done' };
const PALETTE = [
  {color:'#378ADD',bg:'#E6F1FB'}, {color:'#1D9E75',bg:'#E1F5EE'}, {color:'#D85A30',bg:'#FAECE7'}, {color:'#EF9F27',bg:'#FAEEDA'},
  {color:'#533AB7',bg:'#EEEDFE'}, {color:'#993556',bg:'#FBEAF0'}, {color:'#3B6D11',bg:'#EAF3DE'}, {color:'#185FA5',bg:'#B5D4F4'},
  {color:'#E91E63',bg:'#FCE4EC'}, {color:'#9C27B0',bg:'#F3E5F5'}, {color:'#673AB7',bg:'#EDE7F6'}, {color:'#3F51B5',bg:'#E8EAF6'},
  {color:'#03A9F4',bg:'#E1F5FE'}, {color:'#00BCD4',bg:'#E0F7FA'}, {color:'#009688',bg:'#E0F2F1'}, {color:'#4CAF50',bg:'#E8F5E9'},
  {color:'#8BC34A',bg:'#F1F8E9'}, {color:'#CDDC39',bg:'#F9FBE7'}, {color:'#FFC107',bg:'#FFFDE7'}, {color:'#FF9800',bg:'#FFF3E0'},
  {color:'#FF5722',bg:'#FBE9E7'}, {color:'#795548',bg:'#EFEBE9'}, {color:'#9E9E9E',bg:'#FAFAFA'}, {color:'#607D8B',bg:'#ECEFF1'}
];

let apiUrl = localStorage.getItem('tc2_apiUrl') || '';
let selfId = localStorage.getItem('tc2_selfId') || '';

let members = [], projects = [], events = [], tasks = [], assigns = [], todos = [];
let hiddenMb = new Set();
let selProj = 'all';

let curY = new Date().getFullYear();
let curM = new Date().getMonth();
let ovMode = 'board';
let vm = 'cal';
let hidePast = true;
let pFilter = 'all';
let editingEventId = null;


// ==========================================
// 2. 핵심 유틸리티 (날짜 & 데이터 파싱)
// ==========================================

// 구글 시트의 기이한 날짜 문자를 무조건 YYYY-MM-DD 객체로 안전하게 반환
function parseDateSafely(dStr) {
  if (!dStr) return new Date(0); // 1970년으로 초기화 (유효하지 않음)
  
  let str = String(dStr).trim();
  str = str.replace(/\(.*?\)/g, '').trim(); // "(한국 표준시)" 등 괄호 날리기
  
  if (/^\d{4}-\d{2}-\d{2}$/.test(str)) {
    return new Date(str + 'T00:00:00');
  }
  
  const dt = new Date(str);
  if (!isNaN(dt.getTime())) return dt;
  
  // 최후의 정규식 추출
  const match = str.match(/(20\d{2})[-/년 .]*(\d{1,2})[-/월 .]*(\d{1,2})/);
  if (match) {
    return new Date(match[1], parseInt(match[2])-1, match[3]);
  }
  
  return new Date(0);
}

function fmtDateFull(d) {
  const dt = parseDateSafely(d);
  if (dt.getTime() === 0 || isNaN(dt.getTime())) return '';
  return `${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, '0')}-${String(dt.getDate()).padStart(2, '0')}`;
}

const todayStr = fmtDateFull(new Date());

function isPast(dateStr) {
  const target = new Date(new Date().getTime() - (7 * 24 * 60 * 60 * 1000));
  const dt = parseDateSafely(dateStr);
  return dt.getTime() !== 0 && dt < target;
}

function isOverdue(t) {
  if (!t.end || t.status === '완료') return false;
  const dt = parseDateSafely(t.end);
  dt.setHours(23, 59, 59, 999);
  return dt.getTime() !== 0 && dt < new Date();
}

function inDay(e, y, m, d) {
  const start = parseDateSafely(e.start);
  start.setHours(0, 0, 0, 0);
  const end = parseDateSafely(e.end || e.start);
  end.setHours(23, 59, 59, 999);
  
  const currentDay = new Date(y, m, d);
  return currentDay >= start && currentDay <= end;
}

const mb = id => members.find(m => m.id === id);
const pj = id => projects.find(p => p.id === id);
const ini = n => (n || '?').slice(0, 2);

function lighten(hex) {
  const m = PALETTE.find(p => p.color === hex);
  return m ? m.bg : '#eee';
}

function getSelfInfo() {
  return mb(selfId) || members[0] || { name: '—', color: '#888', bg: '#eee', role: '' };
}


// ==========================================
// 3. API 통신 및 데이터 로드
// ==========================================

function showStatus(msg, type) {
  const el = document.getElementById('status-bar');
  el.style.display = 'flex';
  el.className = 'status-bar sb-' + type;
  el.innerHTML = (type === 'loading' ? '<div class="spinner"></div>' : '') + msg;
}

function hideStatus() {
  document.getElementById('status-bar').style.display = 'none';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

async function apiFetch(params) {
  const response = await fetch(apiUrl + '?' + new URLSearchParams(params));
  if (!response.ok) throw new Error('HTTP ' + response.status);
  return response.json();
}

async function apiSave(body, onSuccess) {
  if (!apiUrl) {
    if (onSuccess) onSuccess();
    return true;
  }
  
  showToast('저장 중...');
  try {
    const r = await apiFetch(body); // POST 대신 단순 URL 파라미터로 처리
    if (r.error) throw new Error(r.error);
    await loadAll(true);
    if (onSuccess) onSuccess();
    return true;
  } catch (e) {
    showToast('저장 실패: ' + e.message);
    return false;
  }
}

async function loadAll(force = false) {
  if (!apiUrl) {
    // API 연결 안 되어 있으면 그냥 데모 화면이나 빈 화면 표시
    refreshAll();
    return;
  }
  
  showStatus('데이터 불러오는 중...', 'loading');
  try {
    const d1 = new Date(curY, curM - 2, 1);
    const d2 = new Date(curY, curM + 3, 0);
    
    const params = {
      action: 'all',
      startDate: fmtDateFull(d1),
      endDate: fmtDateFull(d2)
    };
    
    const d = await apiFetch(params);
    
    // 🚨 에러 캐치 (시트가 없거나 코드가 꼬였을 때)
    if (d.error) {
      showStatus('❌ 서버 에러: ' + d.error, 'error');
      alert('구글 시트 연동 오류입니다.\n에러내용: ' + d.error);
      return; 
    }
    
    events = d.events || [];
    members = d.members || [];
    projects = d.projects || [];
    tasks = d.tasks || [];
    assigns = d.assigns || [];
    todos = d.todos || [];
    
    if (!selfId && members.length > 0) {
      selfId = members[0].id;
      localStorage.setItem('tc2_selfId', selfId);
    }
    
    hideStatus();
    refreshAll();
    if (force) showToast('동기화 완료');
    
  } catch (e) {
    showStatus('통신 실패: ' + e.message, 'error');
  }
}


// ==========================================
// 4. 화면 전체 렌더링 컨트롤러
// ==========================================

function refreshAll() {
  buildSidebar();
  refreshProjSelect();
  renderCal();
  renderOverview();
  renderMembersPage();
  renderPersonalList();
  renderTodos();
  renderMemberManageList();
  renderProjectManageList();
}


// ==========================================
// 5. 사이드바 및 공통 레이아웃 렌더링
// ==========================================

function buildSidebar() {
  // 멤버 필터 생성
  const mc = document.getElementById('sb-members');
  if (mc) {
    mc.innerHTML = '';
    members.forEach(m => {
      const d = document.createElement('div');
      d.className = 'mb-chip' + (hiddenMb.has(m.id) ? ' off' : '');
      d.onclick = () => {
        hiddenMb.has(m.id) ? hiddenMb.delete(m.id) : hiddenMb.add(m.id);
        refreshAll();
      };
      d.innerHTML = `<div class="av" style="background:${lighten(m.color)};color:${m.color}">${ini(m.name)}</div><span class="mb-chip-name">${m.name}</span>`;
      mc.appendChild(d);
    });
  }

  // 사업 필터 생성
  const pc = document.getElementById('sb-projects');
  if (pc) {
    pc.innerHTML = `<div class="proj-chip${selProj === 'all' ? ' active' : ''}" onclick="toggleProj('all')"><div class="dot" style="background:var(--text2)"></div>전체</div>`;
    projects.forEach(p => {
      const d = document.createElement('div');
      d.className = 'proj-chip' + (selProj === p.id ? ' active' : '');
      d.innerHTML = `<div class="dot" style="background:${p.color}"></div>${p.name}`;
      d.onclick = () => toggleProj(p.id);
      pc.appendChild(d);
    });
  }

  // 내 계정 표시
  const s = getSelfInfo();
  const av = document.getElementById('self-av');
  if (av) {
    av.textContent = ini(s.name);
    av.style.background = lighten(s.color);
    av.style.color = s.color;
  }
  const nm = document.getElementById('self-name');
  if (nm) nm.textContent = s.name;
}

function refreshProjSelect() {
  const sel = document.getElementById('ev-proj');
  if (!sel) return;
  const currentVal = sel.value;
  sel.innerHTML = '<option value="">— 선택 안함</option>';
  projects.forEach(p => {
    sel.innerHTML += `<option value="${p.id}" ${currentVal === p.id ? 'selected' : ''}>${p.name}</option>`;
  });
}


// ==========================================
// 6. 캘린더 탭 렌더링
// ==========================================

function getVisEv() {
  return events.filter(e => {
    // 비공개면 본인것만
    if (!e.public && e.who !== selfId) return false;
    // 필터 처리
    if (hiddenMb.size && e.who !== 'all' && hiddenMb.has(e.who)) return false;
    if (selProj !== 'all' && e.project !== selProj) return false;
    return true;
  });
}

function renderCal() {
  const mt = document.getElementById('month-title');
  if (mt) mt.textContent = `${curY}년 ${curM + 1}월`;
  
  if (vm === 'cal') renderCalGrid();
  else renderCalList();
}

function renderCalGrid() {
  const container = document.getElementById('cal-container');
  if (!container) return;
  
  const fd = new Date(curY, curM, 1).getDay();
  const ld = new Date(curY, curM + 1, 0).getDate();
  const vis = getVisEv();
  
  let h = '<div class="cal-grid">';
  ['일', '월', '화', '수', '목', '금', '토'].forEach(d => {
    h += `<div class="cal-hdr">${d}</div>`;
  });
  
  for (let i = 0; i < fd; i++) {
    h += '<div class="cal-day empty"></div>';
  }
  
  const now = new Date();
  for (let d = 1; d <= ld; d++) {
    const isToday = (d === now.getDate() && curM === now.getMonth() && curY === now.getFullYear());
    const dayEvents = vis.filter(e => inDay(e, curY, curM, d));
    
    h += `<div class="cal-day${isToday ? ' today' : ''}" onclick="dayClick(${d})"><div class="dn">${d}</div>`;
    
    dayEvents.slice(0, 3).forEach(e => {
      const memberObj = mb(e.who);
      const nameStr = (e.who === 'all') ? '전체' : (memberObj ? memberObj.name : '');
      const cssClass = TC[e.type] || '';
      h += `<div class="ep ${cssClass}" onclick="event.stopPropagation();showEv('${e.id}')" title="${nameStr} ${e.title}">${nameStr} ${e.title}</div>`;
    });
    
    if (dayEvents.length > 3) {
      h += `<div class="more-p">+${dayEvents.length - 3}</div>`;
    }
    h += '</div>';
  }
  
  container.innerHTML = h + '</div>';
}

function renderCalList() {
  const container = document.getElementById('cal-container');
  if (!container) return;
  
  const vis = getVisEv().sort((a, b) => parseDateSafely(a.start).getTime() - parseDateSafely(b.start).getTime());
  
  if (vis.length === 0) {
    container.innerHTML = '<div class="empty">표시할 일정이 없습니다</div>';
    return;
  }
  
  let h = '<div class="list-wrap">';
  vis.forEach(e => {
    const memberObj = mb(e.who);
    const projObj = pj(e.project || '');
    const bgCol = TV[e.type] || '#888';
    
    h += `
    <div class="li" onclick="showEv('${e.id}')">
      <div class="li-dot" style="background:${bgCol}"></div>
      <div class="li-info">
        <div class="li-title">${e.title}</div>
        <div class="li-meta">${fmtDateFull(e.start)} · ${e.who === 'all' ? '전체팀' : (memberObj ? memberObj.name : '')}</div>
        <div class="tag-row">
          <span class="tag ${TT[e.type] || ''}">${TL[e.type] || e.type}</span>
          ${e.subtype ? `<span class="tag tag-sub">${e.subtype}</span>` : ''}
          ${projObj ? `<span class="tag tag-project">${projObj.name}</span>` : ''}
        </div>
      </div>
    </div>`;
  });
  
  container.innerHTML = h + '</div>';
}


// ==========================================
// 7. 사업 현황 (보드 / 간트) 렌더링
// ==========================================

function renderOverview() {
  if (ovMode === 'board') renderBoard();
  else renderGantt();
}

function renderBoard() {
  const container = document.getElementById('overview-container');
  if (!container) return;
  
  const validProjects = projects.filter(p => selProj === 'all' || p.id === selProj);
  if (validProjects.length === 0) {
    container.innerHTML = '<div class="empty">표시할 사업이 없습니다.</div>';
    return;
  }
  
  let h = '<div class="overview-grid">';
  validProjects.forEach(p => {
    const projAssigns = assigns.filter(a => a.projectId === p.id && !hiddenMb.has(a.memberId));
    
    const projTasks = tasks.filter(t => 
      t.project === p.id && 
      !hiddenMb.has(t.assignee) && 
      (!hidePast || !isPast(t.end) || t.status !== '완료')
    );
    
    const projEvents = events.filter(e => 
      e.project === p.id && 
      ['work', 'meeting', 'trip'].includes(e.type) && 
      !hiddenMb.has(e.who) && 
      (!hidePast || !isPast(e.end))
    );

    // 멤버 뱃지
    const memberTags = projAssigns.map(a => {
      const mObj = mb(a.memberId);
      if (!mObj) return '';
      return `<span class="member-tag"><div class="av" style="width:16px;height:16px;font-size:8px;background:${lighten(mObj.color)};color:${mObj.color}">${ini(mObj.name)}</div>${mObj.name}${a.role ? ` <span style="color:var(--text3);font-size:10px">${a.role}</span>` : ''}</span>`;
    }).join('');
    
    // 업무 목록
    const taskRows = projTasks.map(t => {
      const a = mb(t.assignee);
      const isOd = isOverdue(t);
      return `
      <div class="task-row">
        <div class="task-assignee">${a ? `<div class="av" style="width:18px;height:18px;font-size:8px;background:${lighten(a.color)};color:${a.color}">${ini(a.name)}</div><span style="font-size:12px">${a.name}</span>` : '<span style="color:var(--text3);font-size:12px">미배정</span>'}</div>
        <div class="task-title" style="cursor:pointer; ${isOd ? 'color:#D85A30;font-weight:600;' : ''}" onclick="showTask('${t.id}')">${isOd ? '[지연] ' : ''}${t.title}</div>
        <span class="tag ${STATUS_TAG[t.status] || 'tag-sub'}" style="font-size:10px">${t.status}</span>
        <div class="task-dates" style="${isOd ? 'color:#D85A30;font-weight:600;' : ''}">${fmtDateFull(t.end)}</div>
      </div>`;
    }).join('');

    // 이벤트 목록
    const eventRows = projEvents.map(e => {
      const a = mb(e.who);
      const sub = e.subtype ? ` [${e.subtype}]` : '';
      return `
      <div class="task-row">
        <div class="task-assignee">${a ? `<div class="av" style="width:18px;height:18px;font-size:8px;background:${lighten(a.color)};color:${a.color}">${ini(a.name)}</div><span style="font-size:12px">${a.name}</span>` : (e.who === 'all' ? '<span style="font-size:12px">전체</span>' : '<span style="font-size:12px">미상</span>')}</div>
        <div class="task-title" style="cursor:pointer; color:#185FA5;" onclick="showEv('${e.id}')">${e.title}${sub}</div>
        <span class="tag tag-doing" style="font-size:10px">${TL[e.type]}</span>
        <div class="task-dates">${fmtDateFull(e.end)}</div>
      </div>`;
    }).join('');

    const totalCount = projTasks.length + projEvents.length;
    const durationStr = (p.start && p.end) ? `${fmtDateFull(p.start)} ~ ${fmtDateFull(p.end)}` : '기간 미정';

    h += `
    <div class="proj-card">
      <div class="proj-card-header">
        <div class="proj-color-bar" style="background:${p.color}"></div>
        <div>
          <div class="proj-card-title">${p.name}</div>
          <div class="proj-card-sub">${durationStr} · 담당 ${projAssigns.length}명 · 세부 ${totalCount}건</div>
        </div>
      </div>
      <div class="proj-card-body">
        ${memberTags ? `<div style="margin-bottom:10px">${memberTags}</div>` : ''}
        ${taskRows + eventRows || '<div class="empty" style="padding:10px">세부 내역이 없습니다</div>'}
      </div>
    </div>`;
  });
  
  container.innerHTML = h + '</div>';
}

function renderGantt() {
  const container = document.getElementById('overview-container');
  if (!container) return;
  
  // 이벤트를 Task 형태로 변환
  const mappedEvents = events
    .filter(e => e.project && ['work', 'meeting', 'trip'].includes(e.type))
    .map(e => ({
      id: e.id, title: e.title, project: e.project, assignee: e.who,
      start: e.start, end: e.end, isEvent: true, status: '진행중'
    }));
    
  // 필터 적용
  const allTasks = [...tasks, ...mappedEvents].filter(t => {
    if (t.assignee !== 'all' && hiddenMb.has(t.assignee)) return false;
    if (selProj !== 'all' && t.project !== selProj) return false;
    if (hidePast && isPast(t.end) && (!t.isEvent && t.status === '완료' || t.isEvent)) return false;
    return t.start && t.end;
  });
  
  // 🔥 가장 강력한 날짜 보호 처리: 1970년이나 이상한 날짜는 간트 연산에서 통째로 버림
  const validDates = allTasks
    .flatMap(t => [parseDateSafely(t.start).getTime(), parseDateSafely(t.end).getTime()])
    .filter(ts => ts > 0 && !isNaN(ts));
    
  if (validDates.length === 0) {
    container.innerHTML = '<div class="empty">유효한 일정이 없습니다 (간트 차트 렌더링 불가)</div>';
    return;
  }
  
  const minT = Math.min(...validDates);
  const maxT = Math.max(...validDates);
  
  // 혹시라도 차이가 너무 커서 브라우저가 다운되는 것을 방지 (최대 3년까지만)
  const daysDiff = (maxT - minT) / 86400000;
  if (daysDiff > 1000) {
    container.innerHTML = '<div class="empty">일정 기간이 너무 방대하여 간트 차트를 그릴 수 없습니다 (데이터 오입력 확인 요망).</div>';
    return;
  }
  
  const totalDays = Math.ceil(daysDiff) + 4;
  const minD = new Date(minT - (2 * 86400000)); // 시작일 2일 전부터 여유있게 그림
  
  let h = '<div class="gantt-wrap"><div class="gantt"><div class="gantt-header"><div class="gantt-label-col"></div><div class="gantt-timeline">';
  
  // 날짜 헤더 그리기
  for(let i = 0; i < totalDays; i++){
    const dt = new Date(minD.getTime() + (i * 86400000));
    const showLabel = (dt.getDate() === 1 || i === 0 || i % 7 === 0);
    h += `<div class="gantt-day-hdr" style="width:${100/totalDays}%">${showLabel ? (dt.getMonth()+1)+'/'+dt.getDate() : ''}</div>`;
  }
  h += '</div></div>';

  // 프로젝트별 바 그리기
  projects.filter(p => selProj === 'all' || p.id === selProj).forEach(p => {
    const projTasks = allTasks.filter(t => t.project === p.id);
    if (projTasks.length === 0) return;
    
    h += `<div class="gantt-row"><div class="gantt-label" style="font-weight:600;color:${p.color}">${p.name}</div><div class="gantt-bar-area" style="border-top:0.5px solid var(--border)"></div></div>`;
    
    projTasks.forEach(t => {
      const sTime = parseDateSafely(t.start).getTime();
      const eTime = parseDateSafely(t.end).getTime();
      
      // 불량 날짜 건너뛰기
      if (sTime === 0 || eTime === 0) return;
      
      const isOd = !t.isEvent && isOverdue(t);
      const mObj = mb(t.assignee);
      
      const leftPct = ((sTime - minD.getTime()) / 86400000 / totalDays * 100).toFixed(2);
      const widthPct = ((eTime - sTime + 86400000) / 86400000 / totalDays * 100).toFixed(2);
      
      const avatar = mObj ? `<div class="av" style="width:16px;height:16px;font-size:8px;background:${lighten(mObj.color)};color:${mObj.color}">${ini(mObj.name)}</div>` : '';
      
      h += `
      <div class="gantt-row">
        <div class="gantt-label">
          ${avatar}
          <span class="gantt-label-name" style="${isOd ? 'color:#D85A30;font-weight:600;' : ''}">${isOd ? '[지연] ' : ''}${t.title}</span>
        </div>
        <div class="gantt-bar-area">
          <div class="gantt-bar" style="left:${leftPct}%; width:${widthPct}%; background:${isOd ? '#D85A30' : p.color}; opacity:${t.isEvent ? 0.7 : 1}" onclick="${t.isEvent ? `showEv('${t.id}')` : `showTask('${t.id}')`}" title="${t.title}"></div>
        </div>
      </div>`;
    });
  });
  
  container.innerHTML = h + '</div></div>';
}

function renderMembersPage() {
  const container = document.getElementById('members-container');
  if (!container) return;
  
  const validMembers = members.filter(m => !hiddenMb.has(m.id));
  if (validMembers.length === 0) {
    container.innerHTML = '<div class="empty">표시할 멤버가 없습니다</div>';
    return;
  }
  
  let h = '<div class="member-overview">';
  validMembers.forEach(mObj => {
    const mAssigns = assigns.filter(a => a.memberId === mObj.id && (selProj === 'all' || a.projectId === selProj));
    const allMemberEvents = events.filter(e => (e.who === mObj.id || e.who === 'all') && e.public && (!hidePast || !isPast(e.end)));

    const projRows = mAssigns.map(a => {
      const p = pj(a.projectId);
      if (!p) return '';
      
      const mTasks = tasks.filter(t => t.assignee === mObj.id && t.project === p.id && (!hidePast || !isPast(t.end) || t.status !== '완료'));
      const mProjEvents = allMemberEvents.filter(e => e.project === p.id);
      
      const taskHtml = mTasks.map(t => {
        const isOd = isOverdue(t);
        const cls = isOd ? 'overdue' : (t.status === '진행중' ? 'doing' : 'done');
        return `<span class="mini-task ${cls}" onclick="showTask('${t.id}')">${isOd ? '[지연] ' : ''}${t.title}</span>`;
      }).join('');
      
      const eventHtml = mProjEvents.map(e => `<span class="mini-task doing" onclick="showEv('${e.id}')">${e.title}</span>`).join('');
      
      return `
      <div class="proj-row" style="flex-wrap:wrap">
        <div class="proj-row-name" style="flex:1 1 100%; margin-bottom:4px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">
          <div class="dot" style="background:${p.color}"></div>${p.name}
        </div>
        <div class="proj-tasks" style="width:100%">${taskHtml + eventHtml || '<span style="font-size:12px;color:var(--text3)">내역 없음</span>'}</div>
      </div>`;
    }).join('');

    const otherEvents = allMemberEvents.filter(e => !e.project).map(e => `<span class="mini-task" style="background:var(--bg2)" onclick="showEv('${e.id}')">${e.title}</span>`).join('');

    h += `
    <div class="member-card">
      <div class="member-card-header">
        <div class="av" style="width:36px;height:36px;font-size:13px;background:${lighten(mObj.color)};color:${mObj.color}">${ini(mObj.name)}</div>
        <div class="member-card-info">
          <div class="member-card-name">${mObj.name}${mObj.id === selfId ? ' (나)' : ''}</div>
          <div class="member-card-role">${mObj.role || '역할 없음'}</div>
        </div>
      </div>
      <div class="member-card-body">
        ${projRows}
        ${otherEvents ? `<div class="proj-row" style="border-top:1px dashed var(--border); padding-top:8px; margin-top:8px;"><div class="proj-row-name" style="font-size:11px; color:var(--text2)">기타 일정</div><div class="proj-tasks">${otherEvents}</div></div>` : ''}
      </div>
    </div>`;
  });
  
  container.innerHTML = h + '</div>';
}

function renderTodos() {
  const mustList = document.getElementById('todo-must-list');
  const shouldList = document.getElementById('todo-should-list');
  if (!mustList || !shouldList) return;

  const myTodos = todos.filter(t => String(t.who) === String(selfId));
  let mh = '', sh = '';
  
  myTodos.forEach(t => {
    const isDone = t.done === "TRUE";
    const isOld = (!isDone && t.date < todayStr);
    const warnHtml = (t.type === 'must' && isOld) ? `<span style="color:#D85A30;font-weight:600;">[이월]</span> ` : '';
    
    const html = `
    <div class="todo-item ${isDone ? 'done' : ''}">
      <input type="checkbox" class="todo-cb" ${isDone ? 'checked' : ''} onchange="toggleTodo('${t.id}')"> 
      <span style="flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" title="${t.text}">${warnHtml}${t.text}</span>
      <button class="todo-del" onclick="deleteTodo('${t.id}')">✕</button>
    </div>`;
    
    if (t.type === 'must') mh += html; 
    else sh += html;
  });
  
  mustList.innerHTML = mh || '<div class="empty" style="padding:10px; font-size:11px;">핵심 할일이 없습니다</div>';
  shouldList.innerHTML = sh || '<div class="empty" style="padding:10px; font-size:11px;">서브 할일이 없습니다</div>';
}

window.addTodo = function(type, text) {
  if (!text.trim()) return;
  const newTodo = { action: 'addTodo', who: selfId, type: type, text: text.trim(), date: todayStr };
  apiSave(newTodo, () => { 
    document.getElementById('todo-' + type + '-in').value = ''; 
  });
};

window.toggleTodo = function(id) {
  const t = todos.find(x => String(x.id) === String(id));
  if (!t) return;
  const nextDone = t.done === "TRUE" ? "FALSE" : "TRUE";
  apiSave({ action: 'updateTodo', id: t.id, who: t.who, type: t.type, text: t.text, done: nextDone, date: t.date });
};

window.deleteTodo = function(id) {
  if (confirm('이 할 일을 정말 삭제하시겠습니까?')) {
    apiSave({ action: 'deleteTodo', id: id });
  }
};

function toggleSidebar(val) {
  document.querySelector('.sidebar').classList.toggle('show', val);
  document.getElementById('sidebar-overlay').classList.toggle('show', val);
}

function toggleProj(id) {
  selProj = (selProj === id) ? 'all' : id;
  refreshAll();
}

function changeMonth(dir) {
  curM += dir;
  if (curM > 11) { curM = 0; curY++; }
  if (curM < 0) { curM = 11; curY--; }
  
  const curNum = curY * 12 + curM;
  if (lastFetchNum === null || Math.abs(curNum - lastFetchNum) >= 2) {
    loadAll();
  } else {
    renderCal();
  }
}

function filterP(f) {
  pFilter = f;
  ['all', 'public', 'private'].forEach(k => document.getElementById('pf-' + k).classList.toggle('active', k === f));
  renderPersonalList();
}

function toggleHidePast(val) {
  hidePast = val;
  renderOverview();
  renderMembersPage();
}

function goPage(p) {
  if (p !== 'personal') resetEventForm();
  
  ['cal', 'overview', 'members', 'personal', 'todo', 'setup'].forEach(id => {
    const pageEl = document.getElementById('page-' + id);
    if (pageEl) pageEl.classList.toggle('active', id === p);
    
    const navEl = document.getElementById('nav-' + id);
    if (navEl) navEl.classList.toggle('active', id === p);
  });
  
  if (window.innerWidth <= 680) toggleSidebar(false);
  refreshAll();
}

function openModal(title) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal').classList.add('show');
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
}
document.getElementById('modal').onclick = function(e) { if (e.target === this) closeModal(); };

async function saveApiUrl() {
  const val = document.getElementById('api-url-input').value.trim();
  if (!val) { showToast('URL을 입력해주세요.'); return; }
  apiUrl = val;
  localStorage.setItem('tc2_apiUrl', apiUrl);
  await loadAll(true);
}

function onTypeChange() {
  const t = document.getElementById('ev-type').value;
  const row = document.getElementById('sub-row');
  const sel = document.getElementById('ev-sub');
  
  if (t === 'work' || t === 'vacation') {
    row.classList.add('show');
    if (t === 'work') sel.innerHTML = '<option value="">— 없음</option><option value="외근">외근</option><option value="연수">연수</option><option value="교육/세미나">교육/세미나</option><option value="custom">직접 입력</option>';
    else sel.innerHTML = '<option value="연차">연차</option><option value="오전반차">오전반차</option><option value="오후반차">오후반차</option><option value="custom">직접 입력</option>';
  } else {
    row.classList.remove('show');
    sel.innerHTML = '';
  }
}

function onSubChange() {
  document.getElementById('sub-custom').style.display = document.getElementById('ev-sub').value === 'custom' ? 'block' : 'none';
}

function resetEventForm() {
  editingEventId = null;
  ['ev-title', 'ev-start', 'ev-end', 'ev-sub-txt'].forEach(id => {
    if (document.getElementById(id)) document.getElementById(id).value = '';
  });
  document.getElementById('ev-type').value = 'vacation';
  document.getElementById('ev-proj').value = '';
  document.getElementById('pub-toggle').classList.add('on');
  onTypeChange();
  document.getElementById('ev-submit-btn').textContent = '추가';
  document.getElementById('ev-cancel-btn').style.display = 'none';
}

function openEditEvent(id) {
  const e = events.find(ev => ev.id === id);
  if (!e) return;
  editingEventId = id;
  
  document.getElementById('ev-title').value = e.title;
  document.getElementById('ev-start').value = fmtDateFull(e.start);
  document.getElementById('ev-end').value = fmtDateFull(e.end);
  document.getElementById('ev-type').value = e.type;
  document.getElementById('ev-proj').value = e.project || '';
  document.getElementById('pub-toggle').classList.toggle('on', !!e.public);
  
  onTypeChange();
  if (document.getElementById('ev-sub')) document.getElementById('ev-sub').value = e.subtype || '';
  
  document.getElementById('ev-submit-btn').textContent = '수정 저장';
  document.getElementById('ev-cancel-btn').style.display = 'block';
  
  goPage('personal');
  window.scrollTo(0, 0);
}

function submitEvent() {
  const title = document.getElementById('ev-title').value.trim();
  const start = document.getElementById('ev-start').value;
  const type = document.getElementById('ev-type').value;
  
  if (!title || !start) { showToast('제목과 시작일을 입력해주세요'); return; }
  
  let subtype = '';
  if (type === 'work' || type === 'vacation') {
    const sv = document.getElementById('ev-sub').value;
    subtype = (sv === 'custom') ? document.getElementById('ev-sub-txt').value.trim() : sv;
  }
  
  const payload = {
    action: editingEventId ? 'updateEvent' : 'addEvent',
    id: editingEventId || ('ev_' + Date.now()),
    title: title,
    type: type,
    subtype: subtype,
    start: start,
    end: document.getElementById('ev-end').value || start,
    who: selfId,
    project: document.getElementById('ev-proj').value,
    public: document.getElementById('pub-toggle').classList.contains('on')
  };
  
  apiSave(payload, () => resetEventForm());
}

function deleteEv(id) {

// 팔레트 색상 관리
function swatchHTML(selColor) {
  return PALETTE.map((p, i) => `<div onclick="selectSwatch(${i})" data-sw="${i}" style="width:22px;height:22px;border-radius:50%;background:${p.color};cursor:pointer;border:2px solid ${p.color === selColor ? 'var(--text)' : 'transparent'};flex-shrink:0"></div>`).join('');
}
function selectSwatch(i) {
  document.querySelectorAll('[data-sw]').forEach((el, idx) => {
    el.style.borderColor = idx === i ? 'var(--text)' : PALETTE[idx].color;
  });
}
function getSelectedPalette() {
  const sw = document.querySelectorAll('[data-sw]');
  for (let i = 0; i < sw.length; i++) {
    if (sw[i].style.borderColor === 'var(--text)' || sw[i].style.borderColor === getComputedStyle(document.documentElement).getPropertyValue('--text').trim()) {
      return PALETTE[i];
    }
  }
  return PALETTE[0];
}

// 팀원 및 사업 설정 관리
function openChangeSelf() {
  const opts = members.map(m => `<option value="${m.id}"${m.id === selfId ? ' selected' : ''}>${m.name}</option>`).join('');
  document.getElementById('modal-body').innerHTML = `<select id="self-sel" style="margin-bottom:14px">${opts}</select><button class="btn btn-primary" style="width:100%" onclick="changeSelf()">확인</button>`;
  openModal('계정 변경');
}
function changeSelf() {
  selfId = document.getElementById('self-sel').value;
  localStorage.setItem('tc2_selfId', selfId);
  closeModal();
  refreshAll();
}

function openManageProjectMembers(projectId) {
  const p = pj(projectId);
  const pAsgn = assigns.filter(a => a.projectId === projectId);
  
  let h = '<div style="max-height:200px;overflow-y:auto;margin-bottom:14px">';
  h += pAsgn.map(a => {
    const memberName = mb(a.memberId) ? mb(a.memberId).name : '?';
    return `<div style="display:flex;justify-content:space-between;padding:8px;border-bottom:0.5px solid var(--border2)"><span>${memberName} <small>${a.role}</small></span><button class="btn-danger-sm" onclick="if(confirm('해제할까요?')) apiSave({action:'deleteAssign',id:'${a.id}'},()=>openManageProjectMembers('${projectId}'))">해제</button></div>`;
  }).join('');
  h += '</div>';
  
  const unassigned = members.filter(m => !pAsgn.find(a => a.memberId === m.id));
  if (unassigned.length > 0) {
    h += `<div class="form-row"><div><select id="pm-sel">${unassigned.map(m => `<option value="${m.id}">${m.name}</option>`).join('')}</select></div><div><input type="text" id="pm-role" placeholder="역할 입력"></div></div><button class="btn btn-primary" style="width:100%;margin-top:8px" onclick="apiSave({action:'addAssign', memberId:document.getElementById('pm-sel').value, projectId:'${projectId}', role:document.getElementById('pm-role').value}, ()=>openManageProjectMembers('${projectId}'))">배정 추가</button>`;
  } else {
    h += '<div style="text-align:center; font-size:12px; color:var(--text3);">추가로 배정할 멤버가 없습니다.</div>';
  }
  
  document.getElementById('modal-body').innerHTML = h;
  openModal(`[${p.name}] 멤버 관리`);
}
