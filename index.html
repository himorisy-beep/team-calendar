<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>캘린더</title>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<style>
:root, html[data-theme="light"] { --bg:#fff; --bg2:#f7f7f5; --bg3:#f0efe9; --text:#1a1a1a; --text2:#6b6b6b; --text3:#a8a8a8; --border:rgba(0,0,0,0.09); --border2:rgba(0,0,0,0.16); --r:10px; --r-sm:6px; }
html[data-theme="dark"] { --bg:#1c1c1c;--bg2:#242424;--bg3:#2a2a28; --text:#f0efe9;--text2:#9a9a94;--text3:#606060; --border:rgba(255,255,255,0.09);--border2:rgba(255,255,255,0.16); }
@media (prefers-color-scheme: dark) { html:not([data-theme="light"]) { --bg:#1c1c1c;--bg2:#242424;--bg3:#2a2a28; --text:#f0efe9;--text2:#9a9a94;--text3:#606060; --border:rgba(255,255,255,0.09);--border2:rgba(255,255,255,0.16); } }
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:var(--bg3);color:var(--text);min-height:100vh}
.layout{display:flex;min-height:100vh}
.mobile-header { display: none; padding: 14px 20px; background: var(--bg); border-bottom: .5px solid var(--border); align-items: center; gap: 14px; position: sticky; top: 0; z-index: 100; }
.menu-btn { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--text); padding: 0; line-height: 1; }
.sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.38); z-index: 150; }
.sidebar-overlay.show { display: block; }
.sidebar{width:220px;background:var(--bg);border-right:.5px solid var(--border);padding:20px 14px;flex-shrink:0;display:flex;flex-direction:column;gap:20px;position:sticky;top:0;height:100vh;overflow-y:auto}
.logo{font-size:15px;font-weight:700;padding:0 6px}
.logo-sub{font-size:12px;color:var(--text3);font-weight:400;margin-top:2px;padding:0 6px}
.sb-label{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;padding:0 6px;margin-bottom:6px}
.sb-btn{display:flex;align-items:center;gap:8px;width:100%;padding:7px 8px;border:none;background:none;color:var(--text2);font-size:13px;border-radius:var(--r-sm);cursor:pointer;text-align:left;transition:all .12s}
.sb-btn:hover{background:var(--bg2);color:var(--text)}
.sb-btn.active{background:var(--bg3);color:var(--text);font-weight:500}
.sb-btn .icon{font-size:14px;width:18px;text-align:center}
.mb-chip{display:flex;align-items:center;gap:7px;padding:5px 6px;border-radius:var(--r-sm);cursor:pointer;transition:all .12s}
.mb-chip:hover{background:var(--bg2)}
.mb-chip.off{opacity:.35}
.av{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0}
.mb-chip-name{font-size:13px}
.proj-chip{display:flex;align-items:center;gap:7px;padding:5px 6px;border-radius:var(--r-sm);cursor:pointer;font-size:13px;color:var(--text2);transition:all .12s}
.proj-chip:hover{background:var(--bg2)}
.proj-chip.active{color:var(--text);font-weight:500}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.main{flex:1;padding:24px;overflow:auto;min-width:0}
.page{display:none}.page.active{display:block}
.page-header{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:nowrap;justify-content:space-between}
.page-title{font-size:18px;font-weight:700;white-space:nowrap}
.card{background:var(--bg);border:.5px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:14px}
.card-title{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:14px;text-transform:uppercase;letter-spacing:.05em}
.btn{padding:7px 14px;border-radius:var(--r-sm);font-size:13px;cursor:pointer;border:none;font-family:inherit;transition:opacity .12s;white-space:nowrap}
.btn-primary{background:var(--text);color:var(--bg)}.btn-primary:hover{opacity:.82}
.btn-secondary{background:none;color:var(--text);border:.5px solid var(--border2)}.btn-secondary:hover{background:var(--bg2)}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-danger-sm{padding:3px 8px;background:none;color:#A32D2D;border:.5px solid #F09595;border-radius:var(--r-sm);font-size:11px;cursor:pointer;font-family:inherit}
.chip{padding:4px 12px;border-radius:20px;font-size:12px;cursor:pointer;border:.5px solid var(--border2);background:var(--bg);color:var(--text2);transition:all .12s}
.chip.active{background:var(--text);color:var(--bg);border-color:var(--text)}
.tag{font-size:11px;padding:1px 7px;border-radius:10px;font-weight:500;white-space:nowrap}
.tag-vacation{background:#E1F5EE;color:#0F6E56} .tag-work{background:#E6F1FB;color:#185FA5} .tag-trip{background:#FAEEDA;color:#854F0B} .tag-meeting{background:#EEEDFE;color:#3C3489} .tag-personal{background:#F1EFE8;color:#5F5E5A} .tag-project{background:#EAF3DE;color:#2E5A0E} .tag-proposal{background:#FBEAF0;color:#993556}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.form-row.full{grid-template-columns:1fr}
.fl{font-size:11px;color:var(--text2);margin-bottom:4px}
input,select,textarea{width:100%;padding:7px 10px;border:.5px solid var(--border2);border-radius:var(--r-sm);background:var(--bg);color:var(--text);font-size:13px;font-family:inherit}
input:focus,select:focus{outline:none;border-color:#378ADD}
.cal-grid{display:grid;grid-template-columns:repeat(7, 1fr);gap:1px;background:var(--border);border:.5px solid var(--border);border-radius:var(--r);overflow:hidden; width:100%;}
.cal-hdr{background:var(--bg2);padding:7px 4px;text-align:center;font-size:11px;color:var(--text2);font-weight:600}
.cal-day{background:var(--bg);min-height:86px;padding:5px;cursor:pointer;transition:background .1s; min-width: 0;}
.cal-day.today .dn{background:var(--text);color:var(--bg);border-radius:50%}
.dn{font-size:12px;width:20px;height:20px;display:flex;align-items:center;justify-content:center;margin-bottom:3px}
.cal-day.sun .dn{color:#D85A30}.cal-day.sat .dn{color:#378ADD}
.ep{font-size:11px;padding:2px 5px;border-radius:3px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer; max-width: 100%; font-weight: 500;}
.overview-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
@media(max-width:900px){.overview-grid{grid-template-columns:1fr}}
.proj-card{background:var(--bg);border:.5px solid var(--border);border-radius:var(--r);overflow:hidden}
.proj-card-header{padding:12px 16px;display:flex;align-items:center;gap:10px;border-bottom:.5px solid var(--border)}
.proj-color-bar{width:4px;height:36px;border-radius:2px;flex-shrink:0}
.proj-card-title{font-size:14px;font-weight:600}
.proj-card-body{padding:12px 16px}
.member-tag{display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:20px;font-size:11px;margin:2px;border:.5px solid var(--border)}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:200;align-items:center;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:var(--bg);border-radius:var(--r);padding:22px;width:400px;max-width:94vw;border:.5px solid var(--border2);max-height:88vh;overflow-y:auto}
.modal-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px}
.modal-title{font-size:15px;font-weight:700}
.modal-close{border:none;background:none;cursor:pointer;color:var(--text2);font-size:18px;line-height:1}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:8px 22px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .2s;z-index:300;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px}
.legend-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2)}
@media(max-width:680px){
  .sidebar { position: fixed; left: -260px; z-index: 200; width: 240px; transition: left .25s ease; box-shadow: 2px 0 10px rgba(0,0,0,.1); }
  .sidebar.show { left: 0; }
  .main { padding: 0; }
  .page { padding: 16px; }
  .mobile-header { display: flex; }
}
</style>
</head>
<body>
<div class="layout">
<div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>
<div class="sidebar">
<div><div class="logo">캘린더</div><div class="logo-sub" id="sb-teamname">해외컨설팅</div></div>
<div>
<div class="sb-label">메뉴</div>
<button class="sb-btn active" id="nav-cal" onclick="goPage('cal')"><span class="icon">📅</span>캘린더</button>
<button class="sb-btn" id="nav-overview" onclick="goPage('overview')"><span class="icon">📊</span>사업 현황</button>
<button class="sb-btn" id="nav-proposal" onclick="goPage('proposal')"><span class="icon">📝</span>제안 현황</button>
<button class="sb-btn" id="nav-members" onclick="goPage('members')"><span class="icon">👥</span>멤버 현황</button>
<button class="sb-btn" id="nav-personal" onclick="goPage('personal')"><span class="icon">👤</span>내 일정</button>
<button class="sb-btn" id="nav-todo" onclick="goPage('todo')"><span class="icon">✅</span>할일</button>
<button class="sb-btn" id="nav-setup" onclick="goPage('setup')"><span class="icon">⚙️</span>설정</button>
</div>
<div><div class="sb-label">멤버 필터</div><div id="sb-members"></div></div>
<div><div class="sb-label">사업 필터</div><div id="sb-projects"></div></div>
<div style="margin-top:auto; border-top:.5px solid var(--border); padding-top:12px;"><div class="sb-label">내 계정</div><div style="display:flex;align-items:center;gap:7px;padding:5px 6px;cursor:pointer;" onclick="openChangeSelf()"><div class="av" id="self-av"></div><span style="font-size:13px" id="self-name">—</span></div></div>
</div>
<div class="main">
<div class="mobile-header"><button class="menu-btn" onclick="toggleSidebar()">☰</button><div style="font-weight:700;">캘린더</div></div>
<div id="status-bar" style="display:none"></div>
<div id="page-cal" class="page active"><div class="page-header"><button class="btn btn-secondary btn-sm" onclick="changeMonth(-1)">◀</button><span style="font-size:18px;font-weight:700" id="month-title"></span><button class="btn btn-secondary btn-sm" onclick="changeMonth(1)">▶</button><div style="margin-left:auto;display:flex;gap:6px"><button class="chip active" id="vm-cal" onclick="setVM('cal')">달력</button><button class="chip" id="vm-list" onclick="setVM('list')">목록</button></div></div><div class="legend"><div class="legend-item"><div class="dot" style="background:#1D9E75"></div>휴가</div><div class="legend-item"><div class="dot" style="background:#378ADD"></div>업무</div><div class="legend-item"><div class="dot" style="background:#EF9F27"></div>출장</div><div class="legend-item"><div class="dot" style="background:#533AB7"></div>회의</div><div class="legend-item"><div class="dot" style="background:#993556"></div>제안</div></div><div id="cal-container"></div></div>
<div id="page-overview" class="page"><div class="page-header"><span class="page-title">사업 현황</span><button class="btn btn-primary btn-sm" onclick="openAddProject(false)">+ 사업 추가</button></div><div id="overview-container" class="overview-grid"></div></div>
<div id="page-proposal" class="page"><div class="page-header"><span class="page-title">제안 현황</span><button class="btn btn-primary btn-sm" onclick="openAddProject(true)">+ 제안 추가</button></div><div id="proposal-container" class="overview-grid"></div></div>
<div id="page-members" class="page"><div class="page-header"><span class="page-title">멤버 현황</span></div><div id="members-container"></div></div>
<div id="page-personal" class="page"><div class="page-header"><span class="page-title">내 일정</span><div style="margin-left:auto; display:flex; align-items:center; gap:10px;"><button class="btn btn-primary btn-sm" onclick="openAddEvent()">+ 일정 추가</button></div></div><div id="personal-list"></div></div>
<div id="page-todo" class="page"><div class="page-header"><span class="page-title">할일</span></div><div class="overview-grid"><div class="card"><div class="card-title" style="color:#D85A30">Must-Do</div><div id="todo-must-list"></div></div><div class="card"><div class="card-title" style="color:#185FA5">Should-Do</div><div id="todo-should-list"></div></div></div></div>
<div id="page-setup" class="page"><div class="page-header"><span class="page-title">설정</span></div><div class="card"><div class="card-title">팀원 관리</div><div id="member-manage-list"></div><button class="btn btn-secondary btn-sm" onclick="openAddMember()">+ 팀원 추가</button></div><div class="card"><div class="card-title">사업 관리</div><div id="project-manage-list"></div></div></div>
</div>
</div>
<div class="modal-bg" id="modal"><div class="modal"><div class="modal-hdr"><div class="modal-title" id="modal-title"></div><button class="modal-close" onclick="closeModal()">✕</button></div><div id="modal-body"></div></div></div>
<div class="toast" id="toast"></div>
<script>
const SK = 'tc2_'; function ls(k,v){if(v===undefined)return localStorage.getItem(SK+k);v===null?localStorage.removeItem(SK+k):localStorage.setItem(SK+k,v);}
const firebaseConfig = { apiKey: "AIzaSyCTAM7S7UhrjZBWnF1_-u9EazhRtZZorNQ", authDomain: "team-calendar-e30d3.firebaseapp.com", projectId: "team-calendar-e30d3", storageBucket: "team-calendar-e30d3.firebasestorage.app", messagingSenderId: "211860835628", appId: "1:211860835628:web:87e84b5cdbc4387bd1b089" };
firebase.initializeApp(firebaseConfig); const db = firebase.firestore();
let selfId = ls('selfId')||''; let members=[], projects=[], events=[], todos=[], assigns=[];
let hiddenMb = new Set(); let selProj = 'all'; let vm = 'cal'; let curY = new Date().getFullYear(), curM = new Date().getMonth();
const mb = id => members.find(m=>m.id===id); const pj = id => projects.find(p=>p.id===id); const ini = n => (n||'?').slice(0,2);
function lighten(h){ return h+'20'; }
function parseDateSafely(d){ if(!d)return new Date(0); return new Date(d+'T00:00:00'); }

async function apiSave(p, cb){
    const {action,id,...data}=p;
    let col = action.includes('Event')?'events':action.includes('Project')?'projects':action.includes('Member')?'members':action.includes('Todo')?'todos':'assigns';
    if(action.startsWith('add')||action.startsWith('update')) await db.collection(col).doc(id).set(data,{merge:true});
    else await db.collection(col).doc(id).delete();
    if(cb) cb();
}

function startRealtimeListeners(){
    db.collection("events").onSnapshot(s=>{events=s.docs.map(d=>({id:d.id,...d.data()})); refreshAll();});
    db.collection("members").onSnapshot(s=>{members=s.docs.map(d=>({id:d.id,...d.data()})); if(!selfId&&members.length)selfId=members[0].id; refreshAll();});
    db.collection("projects").onSnapshot(s=>{projects=s.docs.map(d=>({id:d.id,...d.data()})); refreshAll();});
    db.collection("todos").onSnapshot(s=>{todos=s.docs.map(d=>({id:d.id,...d.data()})); refreshAll();});
    db.collection("assigns").onSnapshot(s=>{assigns=s.docs.map(d=>({id:d.id,...d.data()})); refreshAll();});
}

function refreshAll(){ buildSidebar(); renderCal(); renderOverview(); renderProposals(); renderMembersPage(); renderPersonalList(); renderTodos(); renderMemberManageList(); renderProjectManageList(); }

function buildSidebar(){
    const mc=document.getElementById('sb-members'); mc.innerHTML='';
    members.forEach(m=>{
        const d=document.createElement('div'); d.className='mb-chip'+(hiddenMb.has(m.id)?' off':'');
        d.onclick=()=>{hiddenMb.has(m.id)?hiddenMb.delete(m.id):hiddenMb.add(m.id); refreshAll();};
        d.innerHTML=`<div class="av" style="background:${m.color};color:white">${ini(m.name)}</div><span class="mb-chip-name">${m.name}</span>`;
        mc.appendChild(d);
    });
    const s=mb(selfId)||{name:'-',color:'#888'}; document.getElementById('self-av').textContent=ini(s.name); document.getElementById('self-av').style.background=s.color; document.getElementById('self-name').textContent=s.name;
    const pc=document.getElementById('sb-projects'); pc.innerHTML=`<div class="proj-chip ${selProj==='all'?'active':''}" onclick="selProj='all';refreshAll()"><div class="dot" style="background:#888"></div>전체</div>`;
    projects.filter(p=>!p.isProposal).forEach(p=>{
        pc.innerHTML+=`<div class="proj-chip ${selProj===p.id?'active':''}" onclick="selProj='${p.id}';refreshAll()"><div class="dot" style="background:${p.color}"></div>${p.name}</div>`;
    });
}

function renderCal(){
    document.getElementById('month-title').textContent=`${curY}년 ${curM+1}월`;
    const fd=new Date(curY,curM,1).getDay(), ld=new Date(curY,curM+1,0).getDate();
    let h='<div class="cal-grid">'; ['일','월','화','수','목','금','토'].forEach(d=>h+=`<div class="cal-hdr">${d}</div>`);
    for(let i=0;i<fd;i++)h+='<div class="cal-day" style="background:var(--bg2)"></div>';
    
    // 사업 일정 + 제안 정보 통합
    const visEvents = events.filter(e=>!hiddenMb.has(e.who));
    const visProps = projects.filter(p=>p.isProposal);

    for(let d=1;d<=ld;d++){
        const isT=d===new Date().getDate()&&curM===new Date().getMonth();
        h+=`<div class="cal-day ${isT?'today':''}" onclick="dayClick(${d})"><div class="dn">${d}</div>`;
        
        // 일반 일정
        visEvents.filter(e=>{
            const s=new Date(e.start), en=new Date(e.end||e.start), day=new Date(curY,curM,d);
            return day>=s && day<=en;
        }).forEach(e=>h+=`<div class="ep" style="background:${mb(e.who)?.color||'#888'};color:white">${e.title}</div>`);

        // 제안 정보 (시작/마감만)
        visProps.forEach(p=>{
            const s=new Date(p.start), en=new Date(p.end), day=new Date(curY,curM,d);
            if(s.getDate()===d && s.getMonth()===curM) h+=`<div class="ep" style="background:#993556;color:white">[제안시작] ${p.name}</div>`;
            if(en.getDate()===d && en.getMonth()===curM) h+=`<div class="ep" style="background:#993556;color:white">[입찰마감] ${p.name}</div>`;
        });
        h+='</div>';
    }
    document.getElementById('cal-container').innerHTML=h+'</div>';
}

function renderOverview(){
    const c=document.getElementById('overview-container'); c.innerHTML='';
    projects.filter(p=>!p.isProposal).forEach(p=>{
        const pa=assigns.filter(a=>a.projectId===p.id).map(a=>mb(a.memberId)?.name).join(', ');
        c.innerHTML+=`<div class="proj-card"><div class="proj-card-header"><div class="proj-color-bar" style="background:${p.color}"></div><div><div class="proj-card-title">${p.name}</div><div style="font-size:11px;color:var(--text2)">${p.start}~${p.end}</div></div></div><div class="proj-card-body"><div style="font-size:12px;margin-bottom:5px">참여자: ${pa||'없음'}</div><button class="btn btn-secondary btn-sm" onclick="openEditProject('${p.id}')">수정</button></div></div>`;
    });
}

function renderProposals(){
    const c=document.getElementById('proposal-container'); c.innerHTML='';
    projects.filter(p=>p.isProposal).forEach(p=>{
        c.innerHTML+=`<div class="proj-card"><div class="proj-card-header"><div class="proj-color-bar" style="background:#993556"></div><div><div class="proj-card-title">${p.name}</div><div style="font-size:11px;color:var(--text2)">제안시작: ${p.start} | 마감: ${p.end}</div></div></div><div class="proj-card-body"><div style="font-size:12px;margin-bottom:8px">참여자: ${p.participants||'없음'}</div><button class="btn btn-secondary btn-sm" onclick="openEditProject('${p.id}')">수정</button></div></div>`;
    });
}

function renderMembersPage(){
    const c=document.getElementById('members-container'); c.innerHTML='';
    members.forEach(m=>{
        const myP = assigns.filter(a=>a.memberId===m.id).map(a=>pj(a.projectId)?.name).filter(n=>n).join(', ');
        c.innerHTML+=`<div class="card"><div style="display:flex;align-items:center;gap:10px"><div class="av" style="background:${m.color};color:white">${ini(m.name)}</div><div><b>${m.name}</b><div style="font-size:12px;color:var(--text2)">${myP||'참여중인 사업 없음'}</div></div></div></div>`;
    });
}

function openAddProject(isProp){
    const t = isProp ? '제안' : '사업';
    document.getElementById('modal-body').innerHTML=`
        <div class="form-row full"><div class="fl">${t}명</div><input type="text" id="pj-name"></div>
        <div class="form-row">
            <div><div class="fl">시작일</div><input type="date" id="pj-start"></div>
            <div><div class="fl">${isProp?'마감일시':'종료일'}</div><input type="date" id="pj-end"></div>
        </div>
        <div class="form-row full"><div class="fl">참여자 (수동 입력)</div><textarea id="pj-parts" rows="2"></textarea></div>
        <button class="btn btn-primary" style="width:100%;margin-top:10px" onclick="saveProject(${isProp})">저장</button>
    `;
    openModal(t+' 추가');
}

async function saveProject(isProp){
    const name=document.getElementById('pj-name').value, s=document.getElementById('pj-start').value, en=document.getElementById('pj-end').value, pt=document.getElementById('pj-parts').value;
    if(!name||!s||!en) return alert('필수 항목을 입력하세요');
    await apiSave({action:'addProject', id:'pj_'+Date.now(), name, start:s, end:en, participants:pt, isProposal:isProp, color:'#378ADD'}, closeModal);
}

function openEditProject(id){
    const p = pj(id); if(!p) return;
    document.getElementById('modal-body').innerHTML=`
        <div class="form-row full"><div class="fl">명칭</div><input type="text" id="epj-name" value="${p.name}"></div>
        <div class="form-row">
            <div><div class="fl">시작일</div><input type="date" id="epj-start" value="${p.start}"></div>
            <div><div class="fl">종료/마감</div><input type="date" id="epj-end" value="${p.end}"></div>
        </div>
        <div class="form-row full"><div class="fl">참여자</div><textarea id="epj-parts" rows="2">${p.participants||''}</textarea></div>
        <div style="display:flex;gap:8px">
            <button class="btn btn-primary" style="flex:1" onclick="updateProject('${id}')">수정 완료</button>
            <button class="btn btn-danger-sm" onclick="apiSave({action:'deleteProject',id:'${id}'},closeModal)">삭제</button>
        </div>
    `;
    openModal('항목 수정');
}

async function updateProject(id){
    const name=document.getElementById('epj-name').value, s=document.getElementById('epj-start').value, en=document.getElementById('epj-end').value, pt=document.getElementById('epj-parts').value;
    await apiSave({action:'updateProject', id, name, start:s, end:en, participants:pt}, closeModal);
}

// 기본 유틸리티 함수들
function goPage(p){ ['cal','overview','proposal','members','personal','todo','setup'].forEach(id=>{ const pg=document.getElementById('page-'+id); if(pg) pg.classList.toggle('active',id===p); const nav=document.getElementById('nav-'+id); if(nav) nav.classList.toggle('active',id===p); }); refreshAll(); }
function toggleSidebar(){ document.querySelector('.sidebar').classList.toggle('show'); document.getElementById('sidebar-overlay').classList.toggle('show'); }
function changeMonth(v){ curM+=v; if(curM>11){curM=0;curY++;} if(curM<0){curM=11;curY--;} renderCal(); }
function openModal(t){ document.getElementById('modal-title').textContent=t; document.getElementById('modal').classList.add('show'); }
function closeModal(){ document.getElementById('modal').classList.remove('show'); }
function showToast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000); }
function showStatus(m,t){ console.log(m); } function hideStatus(){}

// 초기 구동
startRealtimeListeners();
</script>
