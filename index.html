<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>캘린더</title>
<style>
:root {
  --bg:#fff; --bg2:#f7f7f5; --bg3:#f0efe9;
  --text:#1a1a1a; --text2:#6b6b6b; --text3:#a8a8a8;
  --border:rgba(0,0,0,0.09); --border2:rgba(0,0,0,0.16);
  --r:10px; --r-sm:6px;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#1c1c1c;--bg2:#242424;--bg3:#2a2a28;--text:#f0efe9;--text2:#9a9a94;--text3:#606060;--border:rgba(255,255,255,0.09);--border2:rgba(255,255,255,0.16)}
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:var(--bg3);color:var(--text);min-height:100vh}
.layout{display:flex;min-height:100vh}
.mobile-header { display: none; padding: 14px 20px; background: var(--bg); border-bottom: .5px solid var(--border); align-items: center; gap: 14px; position: sticky; top: 0; z-index: 100; }
.menu-btn { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--text); padding: 0; line-height: 1; }
.sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.38); z-index: 150; }
.sidebar-overlay.show { display: block; }
.sidebar{width:220px;background:var(--bg);border-right:.5px solid var(--border);padding:20px 14px;flex-shrink:0;display:flex;flex-direction:column;gap:20px;position:sticky;top:0;height:100vh;overflow-y:auto}
.logo{font-size:15px;font-weight:700;padding:0 6px}
.logo-sub{font-size:12px;color:var(--text3);font-weight:400;margin-top:2px;padding:0 6px}
.sb-label{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;padding:0 6px;margin-bottom:6px}
.sb-btn{display:flex;align-items:center;gap:8px;width:100%;padding:7px 8px;border:none;background:none;color:var(--text2);font-size:13px;border-radius:var(--r-sm);cursor:pointer;text-align:left;transition:all .12s}
.sb-btn:hover{background:var(--bg2);color:var(--text)}
.sb-btn.active{background:var(--bg3);color:var(--text);font-weight:500}
.sb-btn .icon{font-size:14px;width:18px;text-align:center}
.mb-chip{display:flex;align-items:center;gap:7px;padding:5px 6px;border-radius:var(--r-sm);cursor:pointer;transition:all .12s}
.mb-chip:hover{background:var(--bg2)}
.mb-chip.off{opacity:.35}
.av{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0}
.mb-chip-name{font-size:13px}
.proj-chip{display:flex;align-items:center;gap:7px;padding:5px 6px;border-radius:var(--r-sm);cursor:pointer;font-size:13px;color:var(--text2);transition:all .12s}
.proj-chip:hover{background:var(--bg2)}
.proj-chip.active{color:var(--text);font-weight:500}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.main{flex:1;padding:24px;overflow:auto;min-width:0}
.page{display:none}.page.active{display:block}
.page-header{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.page-title{font-size:18px;font-weight:700}
.card{background:var(--bg);border:.5px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:14px}
.card-title{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:14px;text-transform:uppercase;letter-spacing:.05em}
.btn{padding:7px 14px;border-radius:var(--r-sm);font-size:13px;cursor:pointer;border:none;font-family:inherit;transition:opacity .12s}
.btn-primary{background:var(--text);color:var(--bg)}.btn-primary:hover{opacity:.82}
.btn-secondary{background:none;color:var(--text);border:.5px solid var(--border2)}.btn-secondary:hover{background:var(--bg2)}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-danger-sm{padding:3px 8px;background:none;color:#A32D2D;border:.5px solid #F09595;border-radius:var(--r-sm);font-size:11px;cursor:pointer;font-family:inherit}
.chip{padding:4px 12px;border-radius:20px;font-size:12px;cursor:pointer;border:.5px solid var(--border2);background:var(--bg);color:var(--text2);transition:all .12s}
.chip.active{background:var(--text);color:var(--bg);border-color:var(--text)}
.tag{font-size:11px;padding:1px 7px;border-radius:10px;font-weight:500;white-space:nowrap}

/* ── 캘린더 색상 디자인 (복구 완료) ── */
.ev-vacation{background:#E1F5EE!important;color:#0F6E56!important}
.ev-work{background:#E6F1FB!important;color:#185FA5!important}
.ev-trip{background:#FAEEDA!important;color:#854F0B!important}
.ev-meeting{background:#EEEDFE!important;color:#3C3489!important}
.ev-personal{background:#F1EFE8!important;color:#5F5E5A!important}

.tag-vacation{background:#E1F5EE;color:#0F6E56}
.tag-work{background:#E6F1FB;color:#185FA5}
.tag-trip{background:#FAEEDA;color:#854F0B}
.tag-meeting{background:#EEEDFE;color:#3C3489}
.tag-personal{background:#F1EFE8;color:#5F5E5A}
.tag-project{background:#EAF3DE;color:#2E5A0E}
.tag-doing{background:#E6F1FB;color:#185FA5}
.tag-done{background:#E1F5EE;color:#0F6E56}

.cal-grid{display:grid;grid-template-columns:repeat(7, 1fr);gap:1px;background:var(--border);border:.5px solid var(--border);border-radius:var(--r);overflow:hidden; width:100%;}
.cal-hdr{background:var(--bg2);padding:7px 4px;text-align:center;font-size:11px;color:var(--text2);font-weight:600}
.cal-day{background:var(--bg);min-height:86px;padding:5px;cursor:pointer;transition:background .1s; min-width: 0;}
.cal-day.empty{background:var(--bg2);cursor:default;pointer-events:none}
.cal-day.today .dn{background:var(--text);color:var(--bg);border-radius:50%}
.dn{font-size:12px;width:20px;height:20px;display:flex;align-items:center;justify-content:center;margin-bottom:3px}
.cal-day.sun .dn{color:#D85A30}.cal-day.sat .dn{color:#378ADD}
.ep{font-size:11px;padding:2px 5px;border-radius:3px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer; max-width: 100%;}

.list-wrap{display:flex;flex-direction:column;gap:7px}
.li{display:flex;gap:11px;padding:11px 14px;background:var(--bg);border:.5px solid var(--border);border-radius:var(--r);align-items:flex-start;cursor:pointer;transition:border-color .12s}
.li:hover{border-color:var(--border2)}
.li-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:5px}
.li-info{flex:1;min-width:0}
.li-title{font-size:14px;font-weight:500;margin-bottom:3px}
.li-meta{font-size:12px;color:var(--text2)}

.overview-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
@media(max-width:900px){.overview-grid{grid-template-columns:1fr}}
.proj-card{background:var(--bg);border:.5px solid var(--border);border-radius:var(--r);overflow:hidden}
.proj-card-header{padding:12px 16px;display:flex;align-items:center;gap:10px;border-bottom:.5px solid var(--border)}
.proj-color-bar{width:4px;height:36px;border-radius:2px;flex-shrink:0}
.proj-card-title{font-size:14px;font-weight:600}
.proj-card-sub{font-size:12px;color:var(--text2);margin-top:1px}
.proj-card-body{padding:12px 16px}
.member-tag{display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:20px;font-size:12px;margin:2px;border:.5px solid var(--border)}
.task-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:.5px solid var(--border);font-size:13px}
.task-row:last-child{border-bottom:none}
.task-assignee{display:flex;align-items:center;gap:5px;flex-shrink:0;min-width:72px}
.task-title{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.task-dates{font-size:11px;color:var(--text2);flex-shrink:0;white-space:nowrap}

.mini-task{font-size:11px;padding:2px 8px;border-radius:10px;border:.5px solid var(--border2);background:var(--bg2);color:var(--text2);white-space:nowrap; cursor:pointer;}
.mini-task.doing{background:#E6F1FB;color:#185FA5;border-color:#B5D4F4}
.mini-task.done{background:#E1F5EE;color:#0F6E56;border-color:#9FE1CB; text-decoration:line-through; opacity:0.7;}
.mini-task.overdue{background:#FAECE7;color:#D85A30;border-color:#F09595; font-weight:600;}

.gantt-wrap{overflow-x:auto}
.gantt{min-width:700px}
.gantt-header{display:flex;margin-bottom:2px}
.gantt-label-col{width:200px;flex-shrink:0}
.gantt-timeline{flex:1;display:flex}
.gantt-day-hdr{text-align:center;font-size:10px;color:var(--text3);border-left:.5px solid var(--border);padding:3px 0}
.gantt-row{display:flex;align-items:center;margin-bottom:4px}
.gantt-label{width:200px;flex-shrink:0;font-size:12px;padding:0 8px 0 0;display:flex;align-items:center;gap:6px;overflow:hidden}
.gantt-label-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gantt-bar-area{flex:1;position:relative;height:22px}
.gantt-bg-day{position:absolute;top:0;bottom:0;border-left:.5px solid var(--border)}
.gantt-bar{position:absolute;top:2px;bottom:2px;border-radius:3px;cursor:pointer;transition:opacity .12s;display:flex;align-items:center;padding:0 6px;font-size:10px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:4px}
.gantt-bar:hover{opacity:.82}
.gantt-today-line{position:absolute;top:0;bottom:0;width:1.5px;background:#D85A30;z-index:2}

/* 투두리스트 스타일 */
.todo-item { display:flex; align-items:center; gap:8px; font-size:13px; padding:6px 0; color:var(--text); border-bottom:.5px solid var(--border2); }
.todo-item:last-child { border-bottom:none; }
.todo-item.done { text-decoration:line-through; color:var(--text3); }
.todo-cb { width:16px; height:16px; cursor:pointer; }
.todo-del { margin-left:auto; cursor:pointer; color:var(--text3); background:none; border:none; font-size:14px; padding:0 4px; }
.todo-del:hover { color:#A32D2D; }

.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:200;align-items:center;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:var(--bg);border-radius:var(--r);padding:22px;width:400px;max-width:94vw;border:.5px solid var(--border2);max-height:88vh;overflow-y:auto}
.modal-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px}
.modal-title{font-size:15px;font-weight:700}
.modal-close{border:none;background:none;cursor:pointer;color:var(--text2);font-size:18px;line-height:1}
.dr{display:flex;gap:10px;margin-bottom:9px;font-size:13px}
.dl{color:var(--text2);min-width:52px;flex-shrink:0}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:8px 22px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .2s;z-index:300;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.status-bar{padding:10px 14px;border-radius:var(--r-sm);font-size:13px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.sb-loading{background:#E6F1FB;color:#185FA5}
.sb-error{background:#FCEBEB;color:#A32D2D}
.spinner{width:13px;height:13px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:680px){
  .sidebar { position: fixed; left: -260px; z-index: 200; width: 240px; transition: left .25s ease; box-shadow: 2px 0 10px rgba(0,0,0,.1); }
  .sidebar.show { left: 0; }
  .main { padding: 0; }
  .page { padding: 16px; }
  .mobile-header { display: flex; }
}
</style>
</head>
<body>
<div class="layout">
<div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>
<div class="sidebar">
  <div><div class="logo">캘린더</div><div class="logo-sub">해외컨설팅</div></div>
  <div>
    <div class="sb-label">메뉴</div>
    <button class="sb-btn active" id="nav-cal"      onclick="goPage('cal')"><span class="icon">📅</span>캘린더</button>
    <button class="sb-btn"        id="nav-overview" onclick="goPage('overview')"><span class="icon">📊</span>사업 현황</button>
    <button class="sb-btn"        id="nav-members"  onclick="goPage('members')"><span class="icon">👥</span>멤버 현황</button>
    <button class="sb-btn"        id="nav-personal" onclick="goPage('personal')"><span class="icon">👤</span>내 일정</button>
    <button class="sb-btn"        id="nav-todo"     onclick="goPage('todo')"><span class="icon">✅</span>할일</button>
    <button class="sb-btn"        id="nav-setup"    onclick="goPage('setup')"><span class="icon">⚙️</span>설정</button>
  </div>
  <div><div class="sb-label">멤버 필터</div><div id="sb-members"></div></div>
  <div><div class="sb-label">사업 필터</div><div id="sb-projects"></div></div>
  <div style="margin-top:auto; border-top:.5px solid var(--border); padding-top:12px;">
    <div class="sb-label">내 계정</div>
    <div style="display:flex;align-items:center;gap:7px;padding:5px 6px;cursor:pointer;border-radius:var(--r-sm)" onclick="openChangeSelf()">
      <div class="av" id="self-av"></div>
      <span style="font-size:13px" id="self-name">—</span>
    </div>
  </div>
</div>

<div class="main">
<div class="mobile-header">
  <button class="menu-btn" onclick="toggleSidebar()">☰</button>
  <div style="font-weight:700;font-size:16px">캘린더</div>
</div>
<div id="status-bar" style="display:none"></div>

<div id="page-cal" class="page active">
  <div class="page-header">
    <button class="btn btn-secondary btn-sm" onclick="changeMonth(-1)">◀</button>
    <span style="font-size:18px;font-weight:700" id="month-title"></span>
    <button class="btn btn-secondary btn-sm" onclick="changeMonth(1)">▶</button>
    <div style="margin-left:auto;display:flex;gap:6px">
      <button class="chip active" id="vm-cal" onclick="setVM('cal')">달력</button>
      <button class="chip" id="vm-list" onclick="setVM('list')">목록</button>
      <button class="btn btn-secondary btn-sm" onclick="loadAll(true)">↻</button>
    </div>
  </div>
  <div id="cal-container"></div>
</div>

<div id="page-overview" class="page">
  <div class="page-header">
    <span class="page-title">사업 현황</span>
    <div style="margin-left:auto;display:flex;gap:6px;align-items:center;">
      <label style="font-size:12px;color:var(--text2);display:flex;align-items:center;gap:4px;cursor:pointer;margin-right:8px;">
        <input type="checkbox" id="ov-hide-past" onchange="toggleHidePast(this.checked)" checked> 과거 숨기기
      </label>
      <button class="chip active" id="ov-board" onclick="setOV('board')">보드</button>
      <button class="chip"        id="ov-gantt" onclick="setOV('gantt')">간트</button>
    </div>
  </div>
  <div id="overview-container"></div>
</div>

<div id="page-members" class="page">
  <div class="page-header">
    <span class="page-title">멤버 현황</span>
    <div style="margin-left:auto;display:flex;gap:6px;align-items:center;">
      <label style="font-size:12px;color:var(--text2);display:flex;align-items:center;gap:4px;cursor:pointer;">
        <input type="checkbox" id="mb-hide-past" onchange="toggleHidePast(this.checked)" checked> 과거 숨기기
      </label>
    </div>
  </div>
  <div id="members-container"></div>
</div>

<div id="page-personal" class="page">
  <div class="page-header"><span class="page-title">내 일정</span></div>
  <div class="card">
    <div class="card-title">일정 추가/수정</div>
    <div class="form-row full"><input type="text" id="ev-title" placeholder="일정 제목"></div>
    <div class="form-row">
      <div><div class="fl">시작일</div><input type="date" id="ev-start"></div>
      <div><div class="fl">종료일</div><input type="date" id="ev-end"></div>
    </div>
    <div class="form-row full">
      <div><div class="fl">유형</div><select id="ev-type" onchange="onTypeChange()">
        <option value="vacation">휴가</option><option value="work">업무</option><option value="trip">출장</option><option value="meeting">회의</option><option value="personal">개인</option>
      </select></div>
    </div>
    <div class="sub-row" id="sub-row">
      <div class="fl">세부 유형</div><select id="ev-sub" onchange="onSubChange()"></select>
      <div id="sub-custom" style="display:none;margin-top:5px"><input type="text" id="ev-sub-txt" placeholder="직접 입력"></div>
    </div>
    <div class="form-row full"><div><div class="fl">사업 (선택)</div><select id="ev-proj"></select></div></div>
    <div class="toggle-row"><div class="toggle on" id="pub-toggle" onclick="this.classList.toggle('on')"></div><span style="font-size:13px;color:var(--text2)">팀 캘린더에 공유</span></div>
    <div style="display:flex; gap:8px;"><button class="btn btn-primary" id="ev-submit-btn" style="flex:1" onclick="submitEvent()">추가</button><button class="btn btn-secondary" id="ev-cancel-btn" style="display:none;" onclick="resetEventForm()">취소</button></div>
  </div>
  <div class="card"><div class="card-title">내 일정 목록</div><div class="filter-chips"><button class="chip active" id="pf-all" onclick="filterP('all')">전체</button><button class="chip" id="pf-public" onclick="filterP('public')">공유됨</button><button class="chip" id="pf-private" onclick="filterP('private')">비공개</button></div><div id="personal-list"></div></div>
</div>

<div id="page-todo" class="page">
  <div class="page-header"><span class="page-title">할일</span></div>
  <div class="overview-grid">
    <div class="card" style="display:flex; flex-direction:column; max-height:80vh;"><div class="card-title" style="color:#D85A30">🔥 Must-Do</div><input type="text" id="todo-must-in" placeholder="+ 핵심 추가 (Enter)" onkeypress="if(event.key==='Enter') addTodo('must', this.value)"><div id="todo-must-list" style="overflow-y:auto; margin-top:10px"></div></div>
    <div class="card" style="display:flex; flex-direction:column; max-height:80vh;"><div class="card-title" style="color:#185FA5">☕ Should-Do</div><input type="text" id="todo-should-in" placeholder="+ 서브 추가 (Enter)" onkeypress="if(event.key==='Enter') addTodo('should', this.value)"><div id="todo-should-list" style="overflow-y:auto; margin-top:10px"></div></div>
  </div>
</div>

<div id="page-setup" class="page">
  <div class="page-header"><span class="page-title">설정</span></div>
  <div class="card"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px"><div class="card-title" style="margin:0">팀원 관리 <span id="mb-count"></span></div><button class="btn btn-primary btn-sm" onclick="openAddMember()">+ 추가</button></div><div id="member-manage-list"></div></div>
  <div class="card"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px"><div class="card-title" style="margin:0">사업 관리 <span id="proj-count"></span></div><button class="btn btn-primary btn-sm" onclick="openAddProject()">+ 추가</button></div><div id="project-manage-list"></div></div>
  <div class="card"><div class="card-title">API URL</div><div style="display:flex;gap:8px"><input type="text" id="api-url-input" placeholder="https://script.google.com/macros/s/..."><button class="btn btn-primary" onclick="saveApiUrl()">저장</button></div><div id="api-status" style="font-size:12px;color:var(--text2);margin-top:6px"></div></div>
</div>
</div>
</div>

<div class="modal-bg" id="modal"><div class="modal"><div class="modal-hdr"><div class="modal-title" id="modal-title"></div><button class="modal-close" onclick="closeModal()">✕</button></div><div id="modal-body"></div></div></div>
<div class="toast" id="toast"></div>

<script>
// 1. 핵심 데이터 및 팔레트 (누락 복구)
const TL = {vacation:'휴가',work:'업무',trip:'출장',meeting:'회의',personal:'개인'};
const TC = {vacation:'ev-vacation',work:'ev-work',trip:'ev-trip',meeting:'ev-meeting',personal:'ev-personal'};
const TT = {vacation:'tag-vacation',work:'tag-work',trip:'tag-trip',meeting:'tag-meeting',personal:'tag-personal'};
const TV = {vacation:'#1D9E75',work:'#378ADD',trip:'#EF9F27',meeting:'#533AB7',personal:'#888'};
const STATUS_TAG = {'할 일':'tag-todo','진행중':'tag-doing','완료':'tag-done'};
const PALETTE=[{color:'#378ADD',bg:'#E6F1FB'},{color:'#1D9E75',bg:'#E1F5EE'},{color:'#D85A30',bg:'#FAECE7'},{color:'#EF9F27',bg:'#FAEEDA'},{color:'#533AB7',bg:'#EEEDFE'},{color:'#993556',bg:'#FBEAF0'},{color:'#3B6D11',bg:'#EAF3DE'},{color:'#185FA5',bg:'#B5D4F4'},{color:'#E91E63',bg:'#FCE4EC'},{color:'#9C27B0',bg:'#F3E5F5'},{color:'#673AB7',bg:'#EDE7F6'},{color:'#3F51B5',bg:'#E8EAF6'},{color:'#03A9F4',bg:'#E1F5FE'},{color:'#00BCD4',bg:'#E0F7FA'},{color:'#009688',bg:'#E0F2F1'},{color:'#4CAF50',bg:'#E8F5E9'},{color:'#8BC34A',bg:'#F1F8E9'},{color:'#CDDC39',bg:'#F9FBE7'},{color:'#FFC107',bg:'#FFFDE7'},{color:'#FF9800',bg:'#FFF3E0'},{color:'#FF5722',bg:'#FBE9E7'},{color:'#795548',bg:'#EFEBE9'},{color:'#9E9E9E',bg:'#FAFAFA'},{color:'#607D8B',bg:'#ECEFF1'}];

let apiUrl = localStorage.getItem('tc2_apiUrl') || '';
let selfId = localStorage.getItem('tc2_selfId') || '';
let members=[], projects=[], events=[], tasks=[], assigns=[], todos=[];
let curY = today.getFullYear(), curM = today.getMonth(), ovMode = 'board', vm = 'cal', hidePast = true, pFilter = 'all', lastFetchNum = null;

// 2. 유틸리티 (날짜 파싱 강화)
function parseDateSafely(dStr) {
  if (!dStr) return new Date(0);
  let str = String(dStr).trim().replace(/\(.*\)/g, '').trim();
  if (/^\d{4}-\d{2}-\d{2}$/.test(str)) return new Date(str + 'T00:00:00');
  const dt = new Date(str);
  return isNaN(dt.getTime()) ? new Date(0) : dt;
}
function fmtDate(d) { const dt = parseDateSafely(d); return isNaN(dt.getTime()) ? d : `${dt.getMonth()+1}/${dt.getDate()}`; }
function fmtDateFull(d) { const dt = parseDateSafely(d); return isNaN(dt.getTime()) ? d : `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`; }
const todayStr = fmtDateFull(new Date());
function inDay(e,y,m,d) { const s = parseDateSafely(e.start); s.setHours(0,0,0,0); const en = parseDateSafely(e.end || e.start); en.setHours(23,59,59,999); const day = new Date(y,m,d); return day >= s && day <= en; }
function isPast(dateStr) { const target = new Date(new Date().getTime() - (7 * 24 * 60 * 60 * 1000)); return parseDateSafely(dateStr) < target; }
function isOverdue(t) { return (!t.end || t.status === '완료') ? false : parseDateSafely(t.end) < new Date(); }
function ini(n) { return (n||'?').slice(0,2); }
const mb = id => members.find(m=>m.id===id);
const pj = id => projects.find(p=>p.id===id);
const self = () => mb(selfId)||members[0]||{name:'—',color:'#888'};
function lighten(hex) { const m = PALETTE.find(p=>p.color===hex); return m ? m.bg : '#eee'; }

// 3. API 및 로드
async function apiPost(b){ const r=await fetch(apiUrl+'?'+new URLSearchParams(b)); return r.json(); }
async function loadAll(f = false){
  showStatus('데이터 불러오는 중...','loading');
  try {
    const d1 = new Date(curY, curM - 2, 1); const d2 = new Date(curY, curM + 3, 0);
    const d = await (await fetch(apiUrl+'?action=all&startDate='+fmtDateFull(d1)+'&endDate='+fmtDateFull(d2))).json();
    events=d.events||[]; members=d.members||[]; projects=d.projects||[]; tasks=d.tasks||[]; assigns=d.assigns||[]; todos=d.todos||[];
    if(!selfId && members.length) { selfId = members[0].id; localStorage.setItem('tc2_selfId', selfId); }
    lastFetchNum = curY * 12 + curM; hideStatus(); refreshAll(); if(f) showToast('동기화 완료');
  } catch(e) { showStatus('오류: '+e.message,'error'); }
}
function refreshAll(){ buildSidebar(); renderCal(); renderOverview(); renderMembersPage(); renderPersonalList(); renderTodos(); renderMemberManageList(); renderProjectManageList(); refreshProjSelect(); }

// 4. 페이지 제어 (버튼 활성화 로직 복구)
function setOV(m){ ovMode=m; ['board','gantt'].forEach(k=>document.getElementById('ov-'+k).classList.toggle('active',k===m)); renderOverview(); }
function setVM(m){ vm=m; ['cal','list'].forEach(k=>document.getElementById('vm-'+k).classList.toggle('active',k===m)); renderCal(); }
function goPage(p){
  if(p!=='personal') resetEventForm();
  ['cal','overview','members','personal','todo','setup'].forEach(id=>{
    const pg=document.getElementById('page-'+id); if(pg) pg.classList.toggle('active',id===p);
    const nav=document.getElementById('nav-'+id); if(nav) nav.classList.toggle('active',id===p);
  });
  if(window.innerWidth<=680) toggleSidebar(false);
  refreshAll();
}

// 5. 렌더링 함수들 (핵심 복구)
function renderCalGrid(){
  const fd=new Date(curY,curM,1).getDay(), ld=new Date(curY,curM+1,0).getDate();
  const vis=getVisEv(); let h='<div class="cal-grid">';
  ['일','월','화','수','목','금','토'].forEach(d=>h+=`<div class="cal-hdr">${d}</div>`);
  for(let i=0;i<fd;i++) h+='<div class="cal-day empty"></div>';
  for(let d=1;d<=ld;d++){
    const isT = d===today.getDate()&&curM===today.getMonth()&&curY===today.getFullYear();
    const de=vis.filter(e=>inDay(e,curY,curM,d));
    h+=`<div class="cal-day${isT?' today':''}" onclick="dayClick(${d})"><div class="dn">${d}</div>`;
    de.slice(0,3).forEach(e=>{
      const m2=mb(e.who); const nm=e.who==='all'?'전체':(m2?m2.name:'');
      h+=`<div class="ep ${TC[e.type]||''}" onclick="event.stopPropagation();showEv('${e.id}')">${nm} ${e.title}</div>`;
    });
    if(de.length>3) h+=`<div class="more-p">+${de.length-3}</div>`;
    h+='</div>';
  }
  document.getElementById('cal-container').innerHTML=h+'</div>';
}

function renderGantt(){
  const combined = [...tasks, ...events.filter(e=>e.project && ['work','meeting','trip'].includes(e.type)).map(e=>({id:e.id,title:e.title,project:e.project,assignee:e.who,start:e.start,end:e.end,isEvent:true}))];
  const allTasks = combined.filter(t=> (t.assignee==='all'||!mb(t.assignee)||!new Set().has(t.assignee)) && (selProj==='all'||t.project===selProj) && (!hidePast || !isPast(t.end) || t.status!=='완료') && t.start && t.end);
  if(!allTasks.length) { document.getElementById('overview-container').innerHTML='<div class="empty">내역 없음</div>'; return; }
  const dates = allTasks.flatMap(t=>[parseDateSafely(t.start).getTime(), parseDateSafely(t.end).getTime()]);
  const minT=Math.min(...dates), maxT=Math.max(...dates), totalD = Math.ceil((maxT-minT)/864e5)+4;
  const minD = new Date(minT - 2*864e5);
  let h='<div class="gantt-wrap"><div class="gantt"><div class="gantt-header"><div class="gantt-label-col"></div><div class="gantt-timeline">';
  for(let i=0;i<totalD;i++){ const dt=new Date(minD.getTime()+i*864e5); h+=`<div class="gantt-day-hdr" style="width:${100/totalD}%">${(dt.getDate()===1||i%7===0)?(dt.getMonth()+1)+'/'+dt.getDate():''}</div>`; }
  h+='</div></div>';
  projects.filter(p=>selProj==='all'||p.id===selProj).forEach(p=>{
    const pt=allTasks.filter(t=>t.project===p.id); if(!pt.length) return;
    h+=`<div class="gantt-row"><div class="gantt-label" style="font-weight:600;color:${p.color}">${p.name}</div><div class="gantt-bar-area" style="border-top:.5px solid var(--border)"></div></div>`;
    pt.forEach(t=>{
      const isOd = !t.isEvent && isOverdue(t); const left = ((parseDateSafely(t.start)-minD)/864e5/totalD*100).toFixed(2);
      const width = ((parseDateSafely(t.end)-parseDateSafely(t.start)+864e5)/864e5/totalD*100).toFixed(2);
      h+=`<div class="gantt-row"><div class="gantt-label">${mb(t.assignee)?`<div class="av" style="width:16px;height:16px;font-size:8px;background:${lighten(mb(t.assignee).color)};color:${mb(t.assignee).color}">${ini(mb(t.assignee).name)}</div>`:''}<span style="${isOd?'color:#D85A30':''}">${t.title}</span></div><div class="gantt-bar-area"><div class="gantt-bar" style="left:${left}%;width:${width}%;background:${isOd?'#D85A30':p.color};opacity:${t.isEvent?0.7:1}" onclick="${t.isEvent?`showEv('${t.id}')`:`showTask('${t.id}')`}"></div></div></div>`;
    });
  });
  document.getElementById('overview-container').innerHTML=h+'</div></div>';
}

function renderTodos() {
  const mList=document.getElementById('todo-must-list'), sList=document.getElementById('todo-should-list');
  if(!mList) return; let mh='', sh='';
  todos.filter(t=>t.who===selfId).forEach(t=>{
    const isD=t.done==='TRUE', isO=!isD && t.date<todayStr;
    const html=`<div class="todo-item ${isD?'done':''}"><input type="checkbox" class="todo-cb" ${isD?'checked':''} onchange="toggleTodo('${t.id}')"><span style="flex:1">${isO?'[이월] ':''}${t.text}</span><button class="todo-del" onclick="deleteTodo('${t.id}')">✕</button></div>`;
    if(t.type==='must') mh+=html; else sh+=html;
  });
  mList.innerHTML=mh||'내역 없음'; sList.innerHTML=sh||'내역 없음';
}

function renderMemberManageList(){
  const list=document.getElementById('member-manage-list'); if(!list) return;
  document.getElementById('mb-count').textContent=`(${members.length}명)`;
  list.innerHTML=members.map(m2=>`<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:.5px solid var(--border)"><div class="av" style="background:${lighten(m2.color)};color:white">${ini(m2.name)}</div><div style="flex:1"><b>${m2.name}</b><br><small>${m2.role||''}</small></div><button class="btn btn-secondary btn-sm" onclick="openEditMember('${m2.id}')">수정</button></div>`).join('');
}
function renderProjectManageList(){
  const list=document.getElementById('project-manage-list'); if(!list) return;
  document.getElementById('proj-count').textContent=`(${projects.length}개)`;
  list.innerHTML=projects.map(p=>`<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:.5px solid var(--border)"><div class="dot" style="background:${p.color}"></div><div style="flex:1"><b>${p.name}</b><br><small>${fmtDateFull(p.start)}~${fmtDateFull(p.end)}</small></div><button class="btn btn-secondary btn-sm" onclick="openEditProject('${p.id}')">수정</button></div>`).join('');
}

// 6. 나머지 보조 함수들
function toggleSidebar(v) { document.querySelector('.sidebar').classList.toggle('show', v); document.getElementById('sidebar-overlay').classList.toggle('show', v); }
function showStatus(m,t){ const s=document.getElementById('status-bar'); s.style.display='flex'; s.className='status-bar sb-'+t; s.innerHTML=m; }
function hideStatus(){ document.getElementById('status-bar').style.display='none'; }
function showToast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000); }
function openModal(t){ document.getElementById('modal-title').textContent=t; document.getElementById('modal').classList.add('show'); }
function closeModal(){ document.getElementById('modal').classList.remove('show'); }
function saveApiUrl(){ apiUrl=document.getElementById('api-url-input').value.trim(); localStorage.setItem('tc2_apiUrl',apiUrl); loadAll(); }
function changeMonth(d){ curM+=d; if(curM>11){curM=0;curY++;}if(curM<0){curM=11;curY--;} loadAll(); }
function onTypeChange(){
  const t=document.getElementById('ev-type').value, r=document.getElementById('sub-row'), s=document.getElementById('ev-sub');
  if(t==='work'||t==='vacation'){ r.classList.add('show'); s.innerHTML=(t==='work')?'<option value="외근">외근</option><option value="연수">연수</option><option value="custom">직접입력</option>':'<option value="연차">연차</option><option value="오전반차">오전반차</option><option value="오후반차">오후반차</option>'; }
  else r.classList.remove('show');
}
function renderCal() { vm==='cal'?renderCalGrid():renderCalList(); document.getElementById('month-title').textContent=`${curY}년 ${curM+1}월`; }
function renderOverview() { ovMode==='board'?renderBoard():renderGantt(); }
function getVisEv() { return events.filter(e=>(e.public||e.who===selfId)&&(selProj==='all'||e.project===selProj)); }
function resetEventForm(){ editingEventId=null; document.getElementById('ev-title').value=''; document.getElementById('ev-submit-btn').textContent='추가'; document.getElementById('ev-cancel-btn').style.display='none'; }

// 7. 초기화 실행
if(apiUrl) document.getElementById('api-url-input').value=apiUrl;
const sAv=document.getElementById('self-av'); if(selfId) { sAv.textContent=ini(self().name); sAv.style.background=lighten(self().color); document.getElementById('self-name').textContent=self().name; }
loadAll();
</script>
